<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bieu Mau Dang Nhap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="bg-light">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-12 col-md-6 clo-ig-4">
                <div class="card shadow p-4 rounded-3">
                    <div class="text-center mb-4 text-primary">Đăng nhập</div>
                    <form bindsubmit="" nethod="post" acstion="">
                        <div class="mb-3">
                            <label for="inputEmail" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="inputEmail" placeholder="nhập địa chỉ email" required>
                        </div>
                        <div class="mb-3">
                            <label for="inputPassword" class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" id="inputPassword" placeholder="nhập mật khẩu">
                        </div>
                                                <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">
                                Ghi nhớ đăng nhập
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">

                        </div>
                    </form>
                </div>

            </div>

        </div>
    </div>
