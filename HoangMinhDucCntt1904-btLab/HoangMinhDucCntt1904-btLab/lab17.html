<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<h2>Sản phẩm</h2>
<p>Giá: 100</p>
<button id="minus">-</button>
<span id="qty">1</span>
<button id="plus">+</button>

<h3>Tổng: <span id="total">100</span></h3>

<script>
let qty = 1;
let price = 100;

function update(){
    $('#qty').text(qty);
    $('#total').text(qty * price);
}

$('#plus').click(function(){
    qty++;
    update();
});

$('#minus').click(function(){
    if(qty > 1){
        qty--;
        update();
    }
});
</script>
