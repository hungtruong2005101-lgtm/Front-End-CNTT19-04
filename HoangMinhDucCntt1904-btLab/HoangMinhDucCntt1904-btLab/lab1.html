<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
}
input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
}
#result{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>
<body>
<div class="box">
<h2>Tính BMI</h2>
<input type="number" id="height" placeholder="Chiều cao (m)">
<input type="number" id="weight" placeholder="Cân nặng (kg)">
<button onclick="calcBMI()">Tính</button>
<div id="result"></div>
</div>

<script>
function calcBMI(){
    let h = Number(document.getElementById('height').value);
    let w = Number(document.getElementById('weight').value);

    if(h <= 0 || w <= 0){
        result.innerHTML = 'Dữ liệu không hợp lệ';
        return;
    }

    let bmi = (w / (h*h)).toFixed(2);
    let type = '';

    if(bmi < 18.5) type = 'Gầy';
    else if(bmi < 25) type = 'Bình thường';
    else if(bmi < 30) type = 'Thừa cân';
    else type = 'Béo phì';

    result.innerHTML = `BMI: ${bmi} - ${type}`;
}
</script>
</body>
</html>
