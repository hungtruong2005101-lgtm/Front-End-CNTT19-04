<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 19 - AJAX GET</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        h1{
            text-align: center;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th{
            background: #007bff;
            color: white;
        }

        tr:hover{
            background: #f5f5f5;
        }

        button{
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background: #0056b3;
        }

        #loading{
            margin-top: 15px;
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>LAB 19 - AJAX GET</h1>

    <button id="loadData">Tải dữ liệu</button>

    <div id="loading"></div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Thành phố</th>
            </tr>
        </thead>

        <tbody id="data"></tbody>
    </table>

    <script>

        $("#loadData").click(function(){

            $("#loading").text("Đang tải dữ liệu...");

            $.ajax({
                url: "https://jsonplaceholder.typicode.com/users",
                method: "GET",

                success: function(users){

                    $("#loading").text("");

                    let html = "";

                    users.forEach(function(user){

                        html += `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.name}</td>
                                <td>${user.email}</td>
                                <td>${user.address.city}</td>
                            </tr>
                        `;
                    });

                    $("#data").html(html);
                },

                error: function(){
                    $("#loading").text("Lỗi tải dữ liệu!");
                }

            });

        });

    </script>

</body>
</html>
