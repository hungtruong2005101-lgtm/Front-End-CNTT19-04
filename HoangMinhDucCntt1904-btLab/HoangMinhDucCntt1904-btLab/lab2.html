<!DOCTYPE html>
<html>
<head>
<title>Khuyến mãi</title>
</head>
<body>
<h2>Tính khuyến mãi</h2>
<input type="number" id="money" placeholder="Nhập tiền">
<select id="member">
<option value="0">Thường</option>
<option value="5">Bạc</option>
<option value="10">Vàng</option>
</select>
<button onclick="calc()">Tính</button>

<h3 id="result"></h3>

<script>
function calc(){
    let money = Number(document.getElementById('money').value);
    let member = Number(document.getElementById('member').value);
    let sale = 0;

    if(money >= 500000) sale += 15;
    else if(money >= 300000) sale += 10;
    else if(money >= 100000) sale += 5;

    sale += member;

    let discount = money * sale / 100;
    let total = money - discount;

    result.innerHTML = `Giảm: ${sale}% <br>
    Tiền giảm: ${discount} <br>
    Thành tiền: ${total}`;
}
</script>
</body>
</html>
