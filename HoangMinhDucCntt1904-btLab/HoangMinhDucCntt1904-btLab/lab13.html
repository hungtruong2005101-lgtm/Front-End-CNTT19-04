<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<div id="box">Nội dung</div>
<button id="hide">Ẩn</button>
<button id="show">Hiện</button>

<script>
$('#hide').click(function(){
    $('#box').hide();
});

$('#show').click(function(){
    $('#box').show();
});
</script>
