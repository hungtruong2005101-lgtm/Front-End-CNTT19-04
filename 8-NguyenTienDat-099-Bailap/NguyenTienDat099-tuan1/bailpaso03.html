<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Dự Đoán Số</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        h2{
            color: #333;
            margin-bottom: 20px;
        }

        input{
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button{
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        #thongBao{
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        #lichSu{
            margin-top: 15px;
            text-align: left;
            background: #f2f2f2;
            padding: 10px;
            border-radius: 5px;
            max-height: 120px;
            overflow-y: auto;
        }

        .dung{
            color: green;
        }

        .sai{
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>🎯 TRÒ CHƠI DỰ ĐOÁN SỐ</h2>

        <p>Đoán số từ <strong>1 đến 100</strong></p>

        <input type="number" id="duDoan" placeholder="Nhập số bạn đoán">

        <br>

        <button onclick="kiemTra()">Kiểm Tra</button>

        <button onclick="choiLai()">Chơi Lại</button>

        <div id="thongBao"></div>

        <div id="lichSu">
            <strong>Lịch sử đoán:</strong>
            <ul id="danhSach"></ul>
        </div>

    </div>

    <script>

        // Sinh số bí mật từ 1 -> 100
        let soBiMat = Math.floor(Math.random() * 100) + 1;

        // Đếm số lần đoán
        let soLanDoan = 0;

        // Giới hạn số lần chơi
        let gioiHan = 10;

        function kiemTra(){

            let duDoan = Number(document.getElementById("duDoan").value);

            let thongBao = document.getElementById("thongBao");

            let danhSach = document.getElementById("danhSach");

            // Kiểm tra dữ liệu
            if(duDoan < 1 || duDoan > 100){
thongBao.innerHTML = "⚠ Vui lòng nhập số từ 1 đến 100!";
                thongBao.className = "sai";
                return;
            }

            soLanDoan++;

            // Thêm lịch sử
            let item = document.createElement("li");
            item.innerHTML = "Lần " + soLanDoan + ": " + duDoan;
            danhSach.appendChild(item);

            // So sánh kết quả
            if(duDoan < soBiMat){

                thongBao.innerHTML = "📉 Số bạn đoán nhỏ hơn!";
                thongBao.className = "sai";
            }

            else if(duDoan > soBiMat){

                thongBao.innerHTML = "📈 Số bạn đoán lớn hơn!";
                thongBao.className = "sai";
            }

            else{

                thongBao.innerHTML =
                    "🎉 Chính xác! Bạn đoán đúng sau " +
                    soLanDoan + " lần.";

                thongBao.className = "dung";
            }

            // Kiểm tra giới hạn số lần chơi
            if(soLanDoan >= gioiHan && duDoan != soBiMat){

                thongBao.innerHTML =
                    "❌ Bạn đã hết lượt chơi! <br> " +
                    "Số bí mật là: " + soBiMat;

                thongBao.className = "sai";
            }
        }

        // Hàm chơi lại
        function choiLai(){

            soBiMat = Math.floor(Math.random() * 100) + 1;

            soLanDoan = 0;

            document.getElementById("duDoan").value = "";

            document.getElementById("thongBao").innerHTML = "";

            document.getElementById("danhSach").innerHTML = "";
        }

    </script>

</body>
</html>
