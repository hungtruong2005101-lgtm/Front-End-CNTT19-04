<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Bài Lab 13 - Ẩn/Hiện nội dung bằng jQuery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
body{
    font-family: Arial, sans-serif;
    padding: 30px;
    background-color: #f0f4f8;
}
h2{
    color:#333;
}
#noi-dung{
    background-color:#fff;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 20px;
    margin: 20px 0;
    max-width: 300px;
}
.btn-group{
    margin-top: 10px;
}
button{
    padding: 8px 18px;
    margin-right: 10px;
    font-size: 14px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
#btn-an{background-color: #e74c3c; color: white;}
#btn-hien{background-color: #2ecc71; color: white;}
#btn-toggle{background-color: #3498db; color: white;}
#trang-thai{
    margin-top: 15px;
    font-weight: bold;
    color: #555;
}
</style>
</head>
<body>
    <h2>Ẩn/Hiện nội dung bằng jQuery</h2>
<!--Khối nội dung cần điều khiển-->
    <div id="noi-dung">
        <h3>Thông tin sinh viên</h3>
        <p>Họ tên: Đặng Minh Hiếu</p>
        <p>Lớp: CNTT-1904</p>
        <p>Trường: Đại học Đại Nam</p>
    </div>
<!--Các nút điều khiển-->
    <div class="btn-group">
        <button id="btn-an">Ẩn</button>
        <button id="btn-hien">Hiện</button>
        <button id="btn-toggle">Ẩn/Hiện</button>
    </div>
<script>
    $(document).ready(function(){
    // Nút Ẩn
    $("#btn-an").click(function(){
        $("#noi-dung").hide();
        $("#trang-thai").text("Trạng thái: Đang ẩn");
    });
    // Nút Hiện
    $("#btn-hien").click(function(){
        $("#noi-dung").show();
        $("#trang-thai").text("Trạng thái: Đang hiển thị");
    });
    // Nút Ẩn/Hiện
    $("#btn-toggle").click(function(){
        $("#noi-dung").toggle();
        if ($("#noi-dung").is(":visible")){
            $("#trang-thai").text("Trạng thái: Đang hiển thị");
        } else{
            $("#trang-thai").text("Trạng thái: Đang ẩn");
        }
    });
});
</script>
</body>
</html>
