<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài lab 23</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Danh sách sản phẩm</h2>
        
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            
            <div class="col">
                <div class="card h-100 shadow-sm rounded">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Sản phẩm 1">
                    <div class="card-body">
                        <span class="badge bg-danger mb-2">Giảm 10%</span>
                        <h5 class="card-title">Tai nghe chụp tai</h5>
                        <p class="card-text text-primary fw-bold">500.000 đ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm rounded">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Sản phẩm 2">
                    <div class="card-body">
                        <span class="badge bg-danger mb-2">Giảm 20%</span>
                        <h5 class="card-title">Đồng hồ thông minh</h5>
                        <p class="card-text text-primary fw-bold">600.000 đ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm rounded">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Sản phẩm 3">
                    <div class="card-body">
                        <span class="badge bg-danger mb-2">Giảm 15%</span>
                        <h5 class="card-title">Giày thể thao</h5>
                        <p class="card-text text-primary fw-bold">700.000 đ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm rounded">
                    <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Sản phẩm 4">
                    <div class="card-body">
                        <span class="badge bg-danger mb-2">Giảm 5%</span>
                        <h5 class="card-title">Kính mát thời trang</h5>
                        <p class="card-text text-primary fw-bold">800.000 đ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm rounded">
                    <img src="https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Sản phẩm 5">
                    <div class="card-body">
                        <span class="badge bg-danger mb-2">Giảm 30%</span>
                        <h5 class="card-title">Tai nghe không dây</h5>
                        <p class="card-text text-primary fw-bold">900.000 đ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm rounded">
                    <img src="https://images.unsplash.com/photo-1545454675-3531b543be5d?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Sản phẩm 6">
                    <div class="card-body">
                        <span class="badge bg-danger mb-2">Giảm 25%</span>
                        <h5 class="card-title">Loa Bluetooth</h5>
                        <p class="card-text text-primary fw-bold">1.000.000 đ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

</html>
