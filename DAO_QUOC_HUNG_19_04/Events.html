<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h1>Vi du jQuery</h1>
    <button id="btn">Click me</button>
    <script>
    $(document).ready(function(){
        // Gắn sự kiện click vao nut button
        $("#btn").click(function(){
            alert("Ban da click vao nut!");
        });
    });
    </script>
</body>
</html>
