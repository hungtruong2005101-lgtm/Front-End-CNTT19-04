<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 07 - Thao tác DOM cơ bản</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            transition: all 0.3s ease;
        }
        /* Class sẽ được thêm động bằng JavaScript classList */
        .highlight-theme {
            background: #e3f2fd;
            border: 2px solid #2196f3;
        }
        h2 { color: #333; margin-top: 15px; }
        p { color: #666; font-size: 15px; line-height: 1.5; }
        img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ddd;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-change { background-color: #28a745; color: white; }
        .btn-change:hover { background-color: #218838; }
        .btn-reset { background-color: #6c757d; color: white; }
        .btn-reset:hover { background-color: #5a6268; }
    </style>
</head>
<body>

    <div class="card" id="myCard">
        <img id="avatar" src=https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWzNjcFW0hxYh_oEakHjOkTdjE9j6B1lyWjw&s"" alt="Hình ảnh mặc định">
        <h2 id="title">Xin chào, đây là Tiêu đề gốc</h2>
        <p class="description">Đây là đoạn văn mô tả ban đầu của bài lab. Nội dung này sẽ bị thay đổi khi bạn nhấn nút phía dưới.</p>
        
        <div class="btn-group">
            <button class="btn-change" id="btnChange">Thay đổi nội dung</button>
            <button class="btn-reset" id="btnReset">Khôi phục</button>
        </div>
    </div>

<script>
    // 2. Dùng JavaScript lấy tham chiếu đến các phần tử cần chỉnh sửa
    const cardElement = document.getElementById('myCard');       // Lấy bằng ID
    const imageElement = document.getElementById('avatar');       // Lấy bằng ID
    const titleElement = document.getElementById('title');        // Lấy bằng ID
    const descElement = document.querySelector('.description');   // Lấy bằng querySelector (class)
    
    const btnChange = document.getElementById('btnChange');
    const btnReset = document.getElementById('btnReset');

    // 3. Gắn sự kiện click cho nút "Thay đổi nội dung"
    btnChange.addEventListener('click', function() {
        // 4. Thay đổi nội dung bằng innerText, thuộc tính src và classList
        titleElement.innerText = "Giao diện đã thay đổi!";
        descElement.textContent = "Nội dung đoạn văn và hình ảnh đã được cập nhật thành công nhờ vào sức mạnh của DOM thuần trong JavaScript.";
        
        // Thay đổi thuộc tính src của thẻ img (Đổi sang ảnh con mèo)
        imageElement.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWzNjcFW0hxYh_oEakHjOkTdjE9j6B1lyWjw&s"; 
        
        // Thêm một class mới để đổi màu nền giao diện
        cardElement.classList.add('highlight-theme');
    });

    // 5. Yêu cầu mở rộng: Khôi phục trạng thái ban đầu
    btnReset.addEventListener('click', function() {
        titleElement.innerText = "Xin chào, đây là Dũng";
        descElement.innerText = "Đây là đoạn văn mô tả ban đầu của bài lab. Nội dung này sẽ bị thay đổi khi bạn nhấn nút phía dưới.";
        
        // Trả lại ảnh ban đầu (Ảnh chú chó)
        imageElement.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWzNjcFW0hxYh_oEakHjOkTdjE9j6B1lyWjw&s"; 
        
        // Xóa class đổi màu nền để về trạng thái cũ
        cardElement.classList.remove('highlight-theme');
    });
</script>

</body>
</html>
