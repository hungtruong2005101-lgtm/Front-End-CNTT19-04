<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container py-4">
    <h2 class="text-center mb-4">Danh Sách Sản Phẩm</h2>

    <div class="row g-4">

        <!-- Sản phẩm 1 -->
        <div class="col-md-4 col-sm-6">
            <div class="card shadow">
                <img src="img/chuột.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">chuột gaming</h5>
                    <p class="text-danger">5.000.000đ</p>
                    <button class="btn btn-primary">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- Sản phẩm 2 -->
        <div class="col-md-4 col-sm-6">
            <div class="card shadow">
                <img src="img/lap.webp" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Laptop gaming</h5>
                    <p class="text-danger">12.000.000đ</p>
                    <button class="btn btn-primary">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- Sản phẩm 3 -->
        <div class="col-md-4 col-sm-6">
            <div class="card shadow">
                <img src="img/tai nghe.webp" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Tai nghe gaming</h5>
                    <p class="text-danger">800.000đ</p>
                    <button class="btn btn-primary">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- Sản phẩm 4 -->
        <div class="col-md-4 col-sm-6">
            <div class="card shadow">
                <img src="img/lót.webp" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">lót chuột gaming</h5>
                    <p class="text-danger">300.000đ</p>
                    <button class="btn btn-primary">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- Sản phẩm 5 -->
        <div class="col-md-4 col-sm-6">
            <div class="card shadow">
                <img src="img/bàn phím.webp" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Bàn phím cơ</h5>
                    <p class="text-danger">600.000đ</p>
                    <button class="btn btn-primary">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- Sản phẩm 6 -->
        <div class="col-md-4 col-sm-6">
            <div class="card shadow">
                <img src="img/loa.avif" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">loa gaming</h5>
                    <p class="text-danger">3.500.000đ</p>
                    <button class="btn btn-primary">Mua ngay</button>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
