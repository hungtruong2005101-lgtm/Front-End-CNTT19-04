<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Khuyến Mãi - Phiên bản Đơn Giản</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #218838; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Tính Khuyến Mãi</h1>
        
        <label>Giá trị đơn hàng (VND):</label>
        <input type="number" id="amount" placeholder="Nhập số tiền">

        <label>Hạng thành viên:</label>
        <select id="level">
            <option value="0">Khách thường</option>
            <option value="1">Silver</option>
            <option value="2">Gold</option>
        </select>

        <button onclick="tinhKhuyenMai()">Tính toán</button>

        <div id="result"></div>
    </div>

    <script>
        function tinhKhuyenMai() {
            let tien = parseFloat(document.getElementById('amount').value);
            let hang = document.getElementById('level').value;
            let result = document.getElementById('result');

            if (isNaN(tien) || tien <= 0) {
                result.innerHTML = "<p style='color:red'>Vui lòng nhập số tiền hợp lệ!</p>";
                result.style.display = "block";
                return;
            }

            let giam = 0;

            // Tính giảm theo tiền
            if (tien >= 5000000) {
                giam = 15;
            } else if (tien >= 2000000) {
                giam = 10;
            } else if (tien >= 500000) {
                giam = 5;
            }

            // Tăng giảm theo hạng thành viên
            if (hang == 1) giam += 3;        // Silver
            if (hang == 2) giam += 7;        // Gold

            // Giới hạn tối đa 25%
            if (giam > 25) giam = 25;

            let tienGiam = tien * giam / 100;
            let thanhToan = tien - tienGiam;

            // Miễn phí ship nếu > 3 triệu
            let ship = 0;
            if (tien <= 3000000) {
                ship = 50000;
                thanhToan += ship;
            }

            // Hiển thị kết quả
            result.innerHTML = `
                <b>Kết quả:</b><br>
                Giá trị đơn hàng: ${tien.toLocaleString('vi-VN')} ₫<br>
                Hạng thành viên: ${getHang(hang)}<br>
                Tỷ lệ giảm: ${giam}%<br>
                Tiền được giảm: ${tienGiam.toLocaleString('vi-VN')} ₫<br>
                ${ship === 0 ? '🚚 Miễn phí vận chuyển<br>' : 'Phí vận chuyển: 50.000 ₫<br>'}
                <hr>
                <b style="color:green; font-size:18px">
                    Tổng thanh toán: ${thanhToan.toLocaleString('vi-VN')} ₫
                </b>
            `;
            result.style.display = "block";
        }

        function getHang(hang) {
            if (hang == 1) return "Silver";
            if (hang == 2) return "Gold";
            return "Khách thường";
        }
    </script>
</body>
</html>
