<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 10 - Lấy Dữ Liệu Từ API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #333; }
        #loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        #error {
            color: red;
            text-align: center;
            padding: 15px;
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th { background: #2575fc; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 Danh Sách Người Dùng</h1>
        
        <div id="loading">Đang tải dữ liệu...</div>
        <div id="error"></div>
        
        <table id="userTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>Thành phố</th>
                </tr>
            </thead>
            <tbody id="userBody"></tbody>
        </table>
    </div>

    <script>
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const tbody = document.getElementById('userBody');

        // Hàm lấy dữ liệu từ API
        async function fetchUsers() {
            try {
                // Sử dụng JSONPlaceholder - API miễn phí, không cần tạo tài khoản
                const response = await fetch('https://jsonplaceholder.typicode.com/users');
                
                if (!response.ok) {
                    throw new Error('Không thể lấy dữ liệu');
                }

                const users = await response.json();
                
                loading.style.display = 'none';
                renderUsers(users);

            } catch (error) {
                loading.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `❌ Lỗi: ${error.message}<br>Thử tải lại trang.`;
                console.error(error);
            }
        }

        // Hàm hiển thị danh sách
        function renderUsers(users) {
            tbody.innerHTML = '';

            users.forEach((user, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${user.name}</strong></td>
                    <td>${user.email}</td>
                    <td>${user.phone}</td>
                    <td>${user.address.city}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Tự động chạy khi tải trang
        window.onload = fetchUsers;
    </script>
</body>
</html>
