<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 17 - Giỏ Hàng Đơn Giản</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .product {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .product-info {
            flex: 1;
        }
        .product-name {
            font-size: 18px;
            font-weight: bold;
        }
        .product-price {
            color: #007bff;
            font-size: 16px;
        }
        .quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 20px;
        }
        button {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
        .btn-minus { background: #dc3545; color: white; }
        .btn-plus { background: #28a745; color: white; }
        .subtotal {
            font-weight: bold;
            min-width: 120px;
            text-align: right;
        }
        .total {
            margin-top: 20px;
            padding: 15px;
            background: #e9f7ef;
            border-radius: 8px;
            font-size: 20px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Giỏ Hàng Của Bạn</h1>

        <!-- Sản phẩm 1 -->
        <div class="product" data-price="2500000">
            <div class="product-info">
                <div class="product-name">iPhone 15 128GB</div>
                <div class="product-price">2.500.000 ₫</div>
            </div>
            <div class="quantity">
                <button class="btn-minus">-</button>
                <span class="qty">1</span>
                <button class="btn-plus">+</button>
            </div>
            <div class="subtotal">2.500.000 ₫</div>
        </div>

        <!-- Sản phẩm 2 -->
        <div class="product" data-price="18900000">
            <div class="product-info">
                <div class="product-name">Samsung Galaxy S24</div>
                <div class="product-price">18.900.000 ₫</div>
            </div>
            <div class="quantity">
                <button class="btn-minus">-</button>
                <span class="qty">1</span>
                <button class="btn-plus">+</button>
            </div>
            <div class="subtotal">18.900.000 ₫</div>
        </div>

        <!-- Sản phẩm 3 -->
        <div class="product" data-price="6500000">
            <div class="product-info">
                <div class="product-name">Tai nghe Sony WH-1000XM5</div>
                <div class="product-price">6.500.000 ₫</div>
            </div>
            <div class="quantity">
                <button class="btn-minus">-</button>
                <span class="qty">1</span>
                <button class="btn-plus">+</button>
            </div>
            <div class="subtotal">6.500.000 ₫</div>
        </div>

        <div class="total">
            <strong>Tổng tiền: <span id="grandTotal">27.900.000</span> ₫</strong>
        </div>
    </div>

    <script>
        $(document).ready(function() {

            // Xử lý sự kiện cho tất cả nút tăng/giảm
            $(".btn-plus, .btn-minus").click(function() {
                const product = $(this).closest('.product');
                const qtyElement = product.find('.qty');
                let quantity = parseInt(qtyElement.text());
                const price = parseFloat(product.data('price'));

                // Tăng hoặc giảm số lượng
                if ($(this).hasClass('btn-plus')) {
                    quantity++;
                } else {
                    if (quantity > 1) quantity--;   // Không cho nhỏ hơn 1
                }

                qtyElement.text(quantity);

                // Tính thành tiền của sản phẩm
                const subtotal = quantity * price;
                product.find('.subtotal').text(subtotal.toLocaleString('vi-VN') + ' ₫');

                // Cập nhật tổng tiền giỏ hàng
                updateGrandTotal();
            });

            // Hàm tính tổng tiền toàn bộ giỏ hàng
            function updateGrandTotal() {
                let total = 0;

                $('.product').each(function() {
                    const qty = parseInt($(this).find('.qty').text());
                    const price = parseFloat($(this).data('price'));
                    total += qty * price;
                });

                $('#grandTotal').text(total.toLocaleString('vi-VN'));
            }

            // Khởi tạo tổng tiền ban đầu
            updateGrandTotal();
        });
    </script>
</body>
</html>
