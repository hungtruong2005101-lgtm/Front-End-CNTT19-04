<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th { background: #f8f9fa; }
        input, select, button {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            cursor: pointer;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .total {
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            background: #e9f7ef;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Quản Lý Danh Sách Sản Phẩm</h1>

        <!-- Thanh tìm kiếm và lọc -->
        <div>
            <input type="text" id="searchInput" placeholder="Tìm theo tên sản phẩm...">
            <button class="btn-primary" onclick="searchProduct()">Tìm Kiếm</button>
            
            <select id="priceFilter" onchange="filterByPrice()">
                <option value="0">Tất cả sản phẩm</option>
                <option value="5000000">Giá dưới 5 triệu</option>
                <option value="10000000">Giá dưới 10 triệu</option>
                <option value="20000000">Giá dưới 20 triệu</option>
            </select>

            <button onclick="sortProducts(1)">Giá ↑ Tăng dần</button>
            <button onclick="sortProducts(-1)">Giá ↓ Giảm dần</button>
            <button onclick="resetAll()">Reset</button>
        </div>

        <table id="productTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá (VND)</th>
                    <th>Số lượng</th>
                    <th>Giá trị tồn kho</th>
                </tr>
            </thead>
            <tbody id="productBody"></tbody>
        </table>

        <div class="total" id="totalValue">
            Tổng giá trị tồn kho: <span id="totalAmount">0</span> ₫
        </div>
    </div>

    <script>
        // Mảng đối tượng sản phẩm (ít nhất 5 sản phẩm)
        let products = [
            { id: 1, name: "iPhone 15", price: 24900000, quantity: 12 },
            { id: 2, name: "Samsung Galaxy S24", price: 18900000, quantity: 15 },
            { id: 3, name: "Laptop Dell Inspiron", price: 14500000, quantity: 8 },
            { id: 4, name: "Tai nghe Sony WH-1000XM5", price: 6500000, quantity: 25 },
            { id: 5, name: "Chuột Logitech MX Master", price: 1200000, quantity: 40 },
            { id: 6, name: "Bàn phím cơ Keychron", price: 1850000, quantity: 30 }
        ];

        // Render danh sách sản phẩm
        function renderProducts(data) {
            const tbody = document.getElementById('productBody');
            tbody.innerHTML = '';

            data.forEach((product, index) => {
                const value = product.price * product.quantity;
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${product.name}</strong></td>
                        <td>${product.price.toLocaleString('vi-VN')} ₫</td>
                        <td>${product.quantity}</td>
                        <td>${value.toLocaleString('vi-VN')} ₫</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Tính tổng giá trị tồn kho
            let total = 0;
            data.forEach(p => total += p.price * p.quantity);
            document.getElementById('totalAmount').textContent = total.toLocaleString('vi-VN');
        }

        // Tìm kiếm theo tên
        function searchProduct() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (keyword === "") {
                renderProducts(products);
                return;
            }

            const result = products.filter(product => 
                product.name.toLowerCase().includes(keyword)
            );

            renderProducts(result);
        }

        // Lọc theo giá
        function filterByPrice() {
            const maxPrice = parseInt(document.getElementById('priceFilter').value);
            
            if (maxPrice === 0) {
                renderProducts(products);
                return;
            }

            const filtered = products.filter(product => product.price <= maxPrice);
            renderProducts(filtered);
        }

        // Sắp xếp theo giá
        function sortProducts(direction) {
            const sorted = [...products].sort((a, b) => 
                (a.price - b.price) * direction
            );
            renderProducts(sorted);
        }

        // Reset về trạng thái ban đầu
        function resetAll() {
            document.getElementById('searchInput').value = "";
            document.getElementById('priceFilter').value = "0";
            renderProducts(products);
        }

        // Khởi chạy khi tải trang
        window.onload = function() {
            renderProducts(products);
        };
    </script>
</body>
</html>
