<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 19 - Tải Dữ Liệu bằng Ajax</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        #loading {
            text-align: center;
            padding: 20px;
            color: #666;
            font-style: italic;
        }
        #error {
            color: red;
            text-align: center;
            padding: 15px;
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Tải Danh Sách Sinh Viên bằng Ajax</h1>
        
        <div style="text-align: center; margin: 20px 0;">
            <button onclick="loadStudents()">🔄 Tải Danh Sách Sinh Viên</button>
        </div>

        <div id="loading">Đang tải dữ liệu từ server...</div>
        <div id="error"></div>

        <table id="studentTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Mã SV</th>
                    <th>Họ và Tên</th>
                    <th>Email</th>
                    <th>Lớp</th>
                </tr>
            </thead>
            <tbody id="studentBody"></tbody>
        </table>
    </div>

    <script>
        function loadStudents() {
            const loading = $("#loading");
            const errorDiv = $("#error");
            const tbody = $("#studentBody");

            loading.show();
            errorDiv.hide();
            tbody.html('');

            $.ajax({
                url: "https://jsonplaceholder.typicode.com/users",
                method: "GET",
                dataType: "json",
                success: function(data) {
                    loading.hide();
                    renderStudents(data);
                },
                error: function() {
                    loading.hide();
                    errorDiv.html("❌ Lỗi kết nối! Không thể tải dữ liệu từ server.").show();
                }
            });
        }

        function renderStudents(students) {
            const tbody = $("#studentBody");
            tbody.html('');

            students.forEach((student, index) => {
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>SV${1000 + index}</td>
                        <td>${student.name}</td>
                        <td>${student.email}</td>
                        <td>${student.address.city}</td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        // Tự động tải dữ liệu khi trang load
        $(document).ready(function() {
            loadStudents();
        });
    </script>
</body>
</html>
