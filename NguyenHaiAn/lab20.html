<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 20 - Thêm Sinh Viên bằng Ajax</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Thêm Sinh Viên Mới (Ajax POST)</h1>

        <form id="addForm" class="form">
            <input type="text" id="maSV" placeholder="Mã sinh viên" required>
            <input type="text" id="hoTen" placeholder="Họ và tên" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="lop" placeholder="Lớp" required>
            <button type="submit">Thêm Sinh Viên</button>
        </form>

        <div class="success" id="successMsg">
            ✅ Thêm sinh viên thành công!
        </div>

        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Mã SV</th>
                    <th>Họ và Tên</th>
                    <th>Email</th>
                    <th>Lớp</th>
                </tr>
            </thead>
            <tbody id="studentBody"></tbody>
        </table>
    </div>

    <script>
        const API_URL = "https://jsonplaceholder.typicode.com/users";

        // Tải danh sách ban đầu
        function loadStudents() {
            $.get(API_URL, function(data) {
                renderStudents(data);
            });
        }

        function renderStudents(students) {
            const tbody = $("#studentBody");
            tbody.html("");

            students.forEach((student, index) => {
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${student.id || 'SV' + (1000 + index)}</td>
                        <td>${student.name || student.hoTen}</td>
                        <td>${student.email}</td>
                        <td>${student.lop || 'CNTT K18'}</td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        // Xử lý form submit
        $("#addForm").submit(function(e) {
            e.preventDefault();

            const maSV = $("#maSV").val().trim();
            const hoTen = $("#hoTen").val().trim();
            const email = $("#email").val().trim();
            const lop = $("#lop").val().trim();

            // Kiểm tra dữ liệu rỗng
            if (!maSV || !hoTen || !email || !lop) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            const newStudent = {
                maSV: maSV,
                hoTen: hoTen,
                email: email,
                lop: lop
            };

            // Gửi dữ liệu bằng Ajax POST
            $.ajax({
                url: API_URL,
                method: "POST",
                data: newStudent,
                dataType: "json",
                success: function(response) {
                    $("#successMsg").fadeIn(300).delay(2000).fadeOut(300);
                    
                    // Thêm sinh viên mới vào bảng (giả lập)
                    const tbody = $("#studentBody");
                    const newRow = `
                        <tr>
                            <td>${tbody.children().length + 1}</td>
                            <td>${maSV}</td>
                            <td>${hoTen}</td>
                            <td>${email}</td>
                            <td>${lop}</td>
                        </tr>
                    `;
                    tbody.append(newRow);

                    // Reset form
                    $("#addForm")[0].reset();
                },
                error: function() {
                    alert("❌ Có lỗi xảy ra khi thêm sinh viên!");
                }
            });
        });

        // Tự động tải danh sách khi mở trang
        $(document).ready(function() {
            loadStudents();
        });
    </script>
</body>
</html>
