<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>Quản Lý Công Việc</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 460px; margin: 50px auto; padding: 0 20px; }
    h2 { text-align: center; }
    .input-row { display: flex; gap: 8px; margin: 16px 0; }
    .input-row input {
      flex: 1; padding: 9px; font-size: 1rem;
      border: 1px solid #ccc; border-radius: 4px;
    }
    .input-row button {
      padding: 9px 16px; background: #4CAF50; color: white;
      border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;
    }
    .input-row button:hover { background: #45a049; }
    .filters { display: flex; gap: 6px; margin-bottom: 12px; }
    .filters button {
      padding: 5px 12px; border: 1px solid #ccc; background: white;
      border-radius: 99px; cursor: pointer; font-size: 0.85rem;
    }
    .filters button.active { background: #4CAF50; color: white; border-color: #4CAF50; }
    #todo-list { list-style: none; padding: 0; margin: 0; }
    #todo-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 8px; border-bottom: 1px solid #eee;
    }
    #todo-list li:last-child { border-bottom: none; }
    #todo-list li span {
      flex: 1; font-size: 0.95rem; cursor: pointer;
    }
    #todo-list li.done span { text-decoration: line-through; color: #aaa; }
    .btn-del {
      background: none; border: none; color: #e57373;
      cursor: pointer; font-size: 1.1rem; padding: 2px 6px;
    }
    .btn-del:hover { color: #c62828; }
    #summary { font-size: 0.82rem; color: #999; margin-top: 10px; text-align: right; }
    #empty { text-align: center; color: #bbb; padding: 20px 0; display: none; }
  </style>
</head>
<body>
<h2> Quản Lý Công Việc</h2>
<div class="input-row">
  <input type="text" id="new-task" placeholder="Nhập công việc mới..."/>
  <button onclick="addTask()">Thêm</button>
</div>
<div class="filters">
  <button class="active" onclick="setFilter('all', this)">Tất cả</button>
  <button onclick="setFilter('pending', this)">Chưa xong</button>
  <button onclick="setFilter('done', this)">Hoàn thành</button>
</div>
<ul id="todo-list"></ul>
<p id="empty">Không có công việc nào.</p>
<p id="summary"></p>
<script>
  var tasks  = JSON.parse(localStorage.getItem('tasks') || '[]');
  var filter = 'all';
  var nextId = tasks.length ? Math.max.apply(null, tasks.map(function(t){ return t.id; })) + 1 : 1;
  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }
  function render() {
    var list = document.getElementById('todo-list');
    var empty = document.getElementById('empty');
    list.innerHTML = '';
    var filtered = tasks.filter(function(t) {
      if (filter === 'done')    return t.done;
      if (filter === 'pending') return !t.done;
      return true;
    });
    empty.style.display = filtered.length === 0 ? 'block' : 'none';
    filtered.forEach(function(t) {
      var li = document.createElement('li');
      if (t.done) li.classList.add('done');
      var chk = document.createElement('input');
      chk.type    = 'checkbox';
      chk.checked = t.done;
      chk.addEventListener('change', function() { toggleTask(t.id); });
      var span = document.createElement('span');
      span.textContent = t.text;
      span.addEventListener('click', function() { toggleTask(t.id); });
      var del = document.createElement('button');
      del.className   = 'btn-del';
      del.textContent = '✕';
      del.title       = 'Xoá';
      del.addEventListener('click', function() { deleteTask(t.id); });
      li.appendChild(chk);
      li.appendChild(span);
      li.appendChild(del);
      list.appendChild(li);
    });
    var done = tasks.filter(function(t){ return t.done; }).length;
    document.getElementById('summary').textContent =
      'Hoàn thành: ' + done + '/' + tasks.length + ' công việc';
  }
  function addTask() {
    var input = document.getElementById('new-task');
    var text  = input.value.trim();
    if (!text) return;
    tasks.push({ id: nextId++, text: text, done: false });
    save();
    render();
    input.value = '';
    input.focus();
  }
  function toggleTask(id) {
    var t = tasks.find(function(t){ return t.id === id; });
    if (t) t.done = !t.done;
    save();
    render();
  }
  function deleteTask(id) {
    tasks = tasks.filter(function(t){ return t.id !== id; });
    save();
    render();
  }
  function setFilter(val, btn) {
    filter = val;
    document.querySelectorAll('.filters button').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    render();
  }
  document.getElementById('new-task').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTask();
  });
  render();
</script>
</body>
</html>
