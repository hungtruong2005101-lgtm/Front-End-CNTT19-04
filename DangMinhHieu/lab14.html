<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 14</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
 <style>
    body{
        font-family: Arial;
        margin: 40px;
    }

    h1{
        text-align: center;
        border-bottom: 2px solid gray;
        padding-bottom: 10px;
    }

    .container{
        width: 900px;
        margin-top: 40px;
    }

    .buttons{
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
    }

    button{
        padding: 10px 15px;
        border: 2px solid #3399ff;
        background: white;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover{
        background: #e6f2ff;
    }

    #box{
        margin-top: 20px;
        width: 350px;
        padding: 20px;
        border: 2px solid #66a3ff;
        background: #cce6ff;
    }
</style>
</head>
<body>
    <div class="container">
        <h2>Bài tập jQuery Hiệu ứng giao diện</h2>

        <button id="fadeout">Fade Out</button>
        <button id="fadein">Fade In</button>
        <button id="slideup">Slide Up</button>
        <button id="slidedown">Slide Down</button>
        <button id="toggle">Toggle</button>
        <button id="effect">Hiệu ứng</button>

        <div id="box">
            <h3>Thông báo</h3>
            <p>Đây là nội dung được điều khiển bằng hiệu ứng jQuery.</p>
        </div>
    </div>

    <script>
        $(document).ready(function(){

            $("#fadeout").click(function(){
                $("#box").fadeOut(1000);
            });

            $("#fadein").click(function(){
                $("#box").fadeIn(1000);
            });

            $("#slideup").click(function(){
                $("#box").slideUp(1000);
            });

            $("#slidedown").click(function(){
                $("#box").slideDown(1000);
            });

            $("#toggle").click(function(){
                $("#box").slideToggle(1000);
            });

            // mở rộng: hiệu ứng liên tiếp
            $("#effect").click(function(){
                $("#box")
                    .fadeOut(1000)
                    .fadeIn(1000)
                    .slideUp(1000)
                    .slideDown(1000);
            });

        });
    </script>

</body>
</html>
