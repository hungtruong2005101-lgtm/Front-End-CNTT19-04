<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>Tính BMI</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 0 20px; }
    h2 { text-align: center; }
    label { display: block; margin-top: 15px; }
    input { width: 100%; padding: 8px; margin-top: 5px; font-size: 1rem; box-sizing: border-box; }
    button { width: 100%; margin-top: 20px; padding: 10px; font-size: 1rem; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #45a049; }
    #result { margin-top: 20px; padding: 15px; border-radius: 4px; font-size: 1.1rem; display: none; }
  </style>
</head>
<body>
<h2>Tính Chỉ Số BMI</h2>
<label>Chiều cao (m):
  <input type="number" id="height" placeholder="Ví dụ: 1.70" step="0.01"/>
</label>
<label>Cân nặng (kg):
  <input type="number" id="weight" placeholder="Ví dụ: 65"/>
</label>
<button onclick="tinhBMI()">Tính BMI</button>
<div id="result"></div>
<script>
  function tinhBMI() {
    var chieuCao = Number(document.getElementById('height').value);
    var canNang  = Number(document.getElementById('weight').value);
    var result   = document.getElementById('result');
    if (!chieuCao || !canNang) {
      result.style.display = 'block';
      result.style.background = '#ffe0e0';
      result.innerHTML = 'Vui lòng nhập đầy đủ chiều cao và cân nặng!';
      return;
    }
    if (chieuCao <= 0 || canNang <= 0) {
      result.style.display = 'block';
      result.style.background = '#ffe0e0';
      result.innerHTML = 'Chiều cao và cân nặng phải lớn hơn 0!';
      return;
    }
    var bmi = canNang / (chieuCao * chieuCao);
    bmi = Math.round(bmi * 100) / 100;
    var phanLoai, mauNen;
    if (bmi < 18.5) {
      phanLoai = 'Thiếu cân (Gầy)';
      mauNen = '#cce5ff';
    } else if (bmi < 25) {
      phanLoai = 'Bình thường';
      mauNen = '#d4edda';
    } else if (bmi < 30) {
      phanLoai = 'Thừa cân';
      mauNen = '#fff3cd';
    } else {
      phanLoai = 'Béo phì';
      mauNen = '#ffe0e0';
    }
    result.style.display = 'block';
    result.style.background = mauNen;
    result.innerHTML = 'Chỉ số BMI: <strong>' + bmi + '</strong><br/>Phân loại: <strong>' + phanLoai + '</strong>';
  }
</script>
</body>
</html>
