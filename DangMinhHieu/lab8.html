<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>Bộ Đếm Tương Tác</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 360px; margin: 60px auto; padding: 0 20px; text-align: center; }
    h2 { margin-bottom: 24px; }
    #count {
      font-size: 5rem; font-weight: bold;
      margin: 0 0 8px;
      transition: color 0.2s;
    }
    #count.positive { color: #2e7d32; }
    #count.negative { color: #c62828; }
    #count.zero     { color: #333; }
    #status { color: #999; font-size: 0.85rem; margin-bottom: 24px; }
    .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
    button {
      padding: 10px 18px; font-size: 1rem;
      border: none; border-radius: 4px; cursor: pointer; color: white;
    }
    .btn-inc   { background: #4CAF50; }
    .btn-dec   { background: #f44336; }
    .btn-inc5  { background: #66bb6a; font-size: 0.85rem; }
    .btn-dec5  { background: #ef5350; font-size: 0.85rem; }
    .btn-reset { background: #9e9e9e; }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
<h2> Bộ Đếm Tương Tác</h2>
<p id="count">0</p>
<p id="status">Giá trị bằng 0</p>
<div class="btn-row">
  <button class="btn-dec5"  id="btn-dec5">− 5</button>
  <button class="btn-dec"   id="btn-dec">− 1</button>
  <button class="btn-reset" id="btn-reset">↩ Reset</button>
  <button class="btn-inc"   id="btn-inc">+ 1</button>
  <button class="btn-inc5"  id="btn-inc5">+ 5</button>
</div>
<script>
  var count = 0;
  function render() {
    var el = document.getElementById('count');
    el.textContent = count;
    el.className = count > 0 ? 'positive' : count < 0 ? 'negative' : 'zero';
    var status = count > 0 ? 'Giá trị dương' : count < 0 ? 'Giá trị âm' : 'Giá trị bằng 0';
    document.getElementById('status').textContent = status;
  }
  document.getElementById('btn-inc').addEventListener('click', function() { count += 1; render(); });
  document.getElementById('btn-dec').addEventListener('click', function() { count -= 1; render(); });
  document.getElementById('btn-inc5').addEventListener('click', function() { count += 5; render(); });
  document.getElementById('btn-dec5').addEventListener('click', function() { count -= 5; render(); });
  document.getElementById('btn-reset').addEventListener('click', function() { count = 0; render(); });
  render();
</script>
</body>
</html>
