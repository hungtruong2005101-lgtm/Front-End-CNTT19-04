<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>Tra Cứu Theo Mã</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 460px; margin: 50px auto; padding: 0 20px; }
    h2 { text-align: center; }
    label { display: block; margin-top: 14px; font-weight: bold; }
    input {
      width: 100%; padding: 8px; margin-top: 5px;
      font-size: 1rem; box-sizing: border-box;
      border: 1px solid #ccc; border-radius: 4px;
    }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    button {
      flex: 1; padding: 9px; font-size: 1rem;
      border: none; border-radius: 4px; cursor: pointer; color: white;
    }
    #btn-search { background: #2196F3; }
    #btn-search:hover { background: #1976D2; }
    #btn-clear  { background: #9e9e9e; }
    #btn-clear:hover  { background: #757575; }
    #result { margin-top: 20px; display: none; }
    .row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid #eee; font-size: 0.93rem; }
    .row:last-child { border-bottom: none; }
    .row .key { width: 120px; color: #888; flex-shrink: 0; }
    .row .val { font-weight: bold; word-break: break-all; }
    #msg { margin-top: 16px; padding: 10px; border-radius: 4px; display: none; font-size: 0.9rem; }
    #msg.error   { background: #ffebee; color: #c62828; }
    #msg.loading { background: #e3f2fd; color: #1565c0; }
  </style>
</head>
<body>
<h2> Tra Cứu Thông Tin</h2>
<label>Base URL (mockapi.io hoặc jsonplaceholder):
  <input type="text" id="base-url" value="https://jsonplaceholder.typicode.com/users"/>
</label>
<label>Mã định danh (ID):
  <input type="number" id="lookup-id" placeholder="Nhập ID, ví dụ: 1" min="1"/>
</label>
<div class="btn-row">
  <button id="btn-search" onclick="lookupById()">Tra cứu</button>
  <button id="btn-clear"  onclick="clearResult()">Xoá</button>
</div>
<div id="msg"></div>
<div id="result"></div>
<script>
  function renderObject(obj) {
    var result = document.getElementById('result');
    result.innerHTML = '';
    Object.keys(obj).forEach(function(key) {
      var val = obj[key];
      if (typeof val === 'object' && val !== null) {
        val = JSON.stringify(val);
      }
      var row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = '<span class="key">' + key + '</span><span class="val">' + val + '</span>';
      result.appendChild(row);
    });
    result.style.display = 'block';
  }
  function showMsg(text, type) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = type;
    el.style.display = 'block';
  }
  function clearResult() {
    document.getElementById('lookup-id').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
  }
  function lookupById() {
    var base = document.getElementById('base-url').value.trim().replace(/\/$/, '');
    var id   = document.getElementById('lookup-id').value.trim();
    if (!id) { showMsg('Vui lòng nhập mã định danh!', 'error'); return; }
    var url = `${base}/${id}`;
    document.getElementById('result').style.display = 'none';
    showMsg(' Đang tải...', 'loading');
    fetch(url)
      .then(function(res) {
        if (res.status === 404) throw new Error('Không tìm thấy đối tượng với ID = ' + id);
        if (!res.ok) throw new Error('Lỗi HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) {
        document.getElementById('msg').style.display = 'none';
        renderObject(data);
      })
      .catch(function(err) {
        document.getElementById('result').style.display = 'none';
        showMsg(' ' + err.message, 'error');
      });
  }
  document.getElementById('lookup-id').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') lookupById();
  });
</script>
</body>
</html>
