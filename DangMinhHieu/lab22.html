<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bài Lab 22 – Form Đăng nhập</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-12 col-sm-8 col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="text-center mb-4">Đăng nhập</h4>
          <form>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" class="form-control" placeholder="example@email.com"/>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Mật khẩu</label>
              <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu"/>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input type="checkbox" id="remember" class="form-check-input"/>
                <label for="remember" class="form-check-label">Ghi nhớ đăng nhập</label>
              </div>
              <a href="#" class="small">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
