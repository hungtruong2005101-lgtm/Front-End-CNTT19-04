<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab03 - Guess Number Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Trò Chơi Đoán Số</h1>

        <p>Hãy đoán số từ 1 đến 100</p>

        <input type="number" id="guessInput" placeholder="Nhập số dự đoán">

        <button onclick="checkGuess()">
            Kiểm Tra
        </button>

        <button class="reset-btn" onclick="resetGame()">
            Chơi Lại
        </button>

        <div id="message"></div>

        <div id="count"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
