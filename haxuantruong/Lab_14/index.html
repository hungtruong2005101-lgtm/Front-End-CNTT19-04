<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Lab 14</title>

    <link rel="stylesheet" href="style.css">

    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <h1>
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            Hiệu Ứng jQuery
        </h1>

        <div class="button-box">

            <button id="fadeOutBtn">
                Fade Out
            </button>

            <button id="fadeInBtn">
                Fade In
            </button>

            <button id="slideUpBtn">
                Slide Up
            </button>

            <button id="slideDownBtn">
                Slide Down
            </button>

            <button id="toggleBtn">
                Toggle
            </button>

        </div>

        <div class="box">

            <img
                src="https://picsum.photos/500/250"
                alt=""
            >

            <h2>Lab 14 jQuery</h2>

            <p>
                Demo hiệu ứng fade và slide bằng jQuery.
            </p>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
