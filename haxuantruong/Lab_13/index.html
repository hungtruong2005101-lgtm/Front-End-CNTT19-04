<!DOCTYPE html>
<html lang="vi">

<head>

    <link rel="stylesheet" href="style.css">

        src="https://code.jquery.com/jquery-3.7.1.min.js">

<body>

    <div class="container">

        <h1>

            <button id="hideBtn">
                Ẩn
            </button>

            <button id="showBtn">
                Hiện
            </button>

            <button id="toggleBtn">
                Toggle
            </button>

        </div>

        <div class="content-box">

            <img
                src="https://picsum.photos/500/250"
                alt=""
            >

            <h2>jQuery Lab 13</h2>

            <p>
                Đây là bài thực hành thao tác
                ẩn hiện nội dung bằng jQuery.
            </p>

        </div>

    </div>

    <script src="app.js"></script>
