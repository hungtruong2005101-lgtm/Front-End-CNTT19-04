<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Lab 20</title>

    <link rel="stylesheet" href="style.css">

    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <h1>
            <i class="fa-solid fa-user-plus"></i>
            Thêm Người Dùng
        </h1>

        <div class="form-box">

            <input
                type="text"
                id="name"
                placeholder="Nhập họ tên"
            >

            <input
                type="email"
                id="email"
                placeholder="Nhập email"
            >

            <input
                type="text"
                id="city"
                placeholder="Nhập thành phố"
            >

            <button id="addBtn">
                <i class="fa-solid fa-plus"></i>
                Thêm Dữ Liệu
            </button>

        </div>

        <table>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Họ tên</th>

                    <th>Email</th>

                    <th>Thành phố</th>

                </tr>

            </thead>

            <tbody id="userList">

            </tbody>

        </table>

    </div>

    <script src="app.js"></script>

</body>

</html>
