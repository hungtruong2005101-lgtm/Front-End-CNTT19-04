<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab07 - DOM Content</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <h1>Quản Lý Nội Dung DOM</h1>

            <div class="form-group">

                <input 
                    type="text"
                    id="contentInput"
                    placeholder="Nhập nội dung mới..."
                >

                <button onclick="addContent()">
                    Thêm Nội Dung
                </button>

            </div>

            <div class="toolbar">

                <button class="clear-btn" onclick="clearAll()">
                    Xóa Tất Cả
                </button>

                <button class="random-btn" onclick="randomColor()">
                    Đổi Màu Ngẫu Nhiên
                </button>

            </div>

            <div class="content-list" id="contentList">

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
