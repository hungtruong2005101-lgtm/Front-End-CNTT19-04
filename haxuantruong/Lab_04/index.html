<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab04 - Student Score Manager</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <h1>Quản Lý Điểm Sinh Viên</h1>

            <div class="input-group">

                <input 
                    type="number" 
                    id="scoreInput" 
                    placeholder="Nhập điểm sinh viên"
                >

                <button onclick="addScore()">
                    Thêm Điểm
                </button>

            </div>

            <div class="score-list" id="scoreList">

            </div>

            <button class="calculate-btn" onclick="calculateResult()">
                Tính Kết Quả
            </button>

            <div class="result-box" id="result">

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
