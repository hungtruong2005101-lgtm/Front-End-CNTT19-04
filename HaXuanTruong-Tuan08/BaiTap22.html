<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIỂU MẪU ĐĂNG NHẬP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg.light">
<div class="'container mt-5">
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card p-4 rounded-3">
            <h3 class="text-center mb-4 text-primary">Đăng Nhập</h3>
            <form bindsubmit="" method="post" action="#">
                <div class="mb-3">
                    <label for="inpurEmail" class="form-label fw-bold">Email</label>
                    <input type="email" class="form-control" id="inputEmail" placeholder="Nhập Địa Chỉ Email">
                </div>
                <div class="mb-3">
                    <label for="inputPassword" class="from-label fw-bold">Mật Khẩu </label>
                    <input type="password" class="form-control" id="inputPassword" placeholder="Nhập Mật Khẩu">
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check"> 
                        <input type="checkbox" class="form-check-input" id="rememberMe"><label for="rememberMe" class="form-check-label">Ghi Nhớ</label>
                    </div>
                    <a href="#" class="text-decoration-none small">Quên Mật Khẩu</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Đăng Nhập</button>
                
            </form>

        </div>

    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
