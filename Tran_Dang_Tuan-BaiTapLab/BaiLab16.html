<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Form Đăng Ký jQuery</title>

    <!-- Nhúng jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            width: 420px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .form-group{
            margin-bottom: 15px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .error{
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        .success{
            color: green;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        .valid{
            border-color: green;
        }

        .invalid{
            border-color: red;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #2563eb;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background-color: #1d4ed8;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>FORM ĐĂNG KÝ</h1>

        <form id="registerForm">

            <!-- Họ tên -->
            <div class="form-group">

                <label>Họ tên</label>

                <input
                    type="text"
                    id="fullName"
                    placeholder="Nhập họ tên"
                >

                <div class="error" id="nameError"></div>

            </div>

            <!-- Email -->
            <div class="form-group">

                <label>Email</label>

                <input
                    type="text"
                    id="email"
                    placeholder="Nhập email"
                >

                <div class="error" id="emailError"></div>

            </div>

            <!-- Mật khẩu -->
            <div class="form-group">

                <label>Mật khẩu</label>

                <input
                    type="password"id="password"
                    placeholder="Nhập mật khẩu"
                >

                <div class="error" id="passwordError"></div>

            </div>

            <!-- Xác nhận mật khẩu -->
            <div class="form-group">

                <label>Xác nhận mật khẩu</label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Nhập lại mật khẩu"
                >

                <div class="error" id="confirmError"></div>

            </div>

            <button type="submit">
                Đăng ký
            </button>

        </form>

        <!-- Thông báo -->
        <div class="success" id="successMessage"></div>

    </div>

    <script>

        // Bắt sự kiện submit form
        $("#registerForm").submit(function(event){

            // Chặn reload trang
            event.preventDefault();

            // Xóa lỗi cũ
            $(".error").text("");

            $("#successMessage").text("");

            $("input")
                .removeClass("valid invalid");

            // Lấy dữ liệu
            let fullName =
                $("#fullName").val().trim();

            let email =
                $("#email").val().trim();

            let password =
                $("#password").val().trim();

            let confirmPassword =
                $("#confirmPassword")
                .val()
                .trim();

            // Regex email
            let emailRegex =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            let isValid = true;

            // Kiểm tra họ tên
            if(fullName === ""){

                $("#nameError").text(
                    "Vui lòng nhập họ tên!"
                );

                $("#fullName")
                    .addClass("invalid");

                isValid = false;

            }
            else{

                $("#fullName")
                    .addClass("valid");

            }

            // Kiểm tra email
            if(email === ""){

                $("#emailError").text(
                    "Vui lòng nhập email!"
                );

                $("#email")
                    .addClass("invalid");

                isValid = false;

            }
            else if(!emailRegex.test(email)){

                $("#emailError").text(
                    "Email không đúng định dạng!"
                );

                $("#email")
                    .addClass("invalid");

                isValid = false;

            }
            else{

                $("#email")
                    .addClass("valid");

            }

            // Kiểm tra mật khẩu
            if(password === ""){

                $("#passwordError").text(
                    "Vui lòng nhập mật khẩu!"
                );

                $("#password")
                    .addClass("invalid");
isValid = false;

            }
            else if(password.length < 6){

                $("#passwordError").text(
                    "Mật khẩu phải từ 6 ký tự!"
                );

                $("#password")
                    .addClass("invalid");

                isValid = false;

            }
            else{

                $("#password")
                    .addClass("valid");

            }

            // Kiểm tra xác nhận mật khẩu
            if(confirmPassword === ""){

                $("#confirmError").text(
                    "Vui lòng xác nhận mật khẩu!"
                );

                $("#confirmPassword")
                    .addClass("invalid");

                isValid = false;

            }
            else if(confirmPassword !== password){

                $("#confirmError").text(
                    "Mật khẩu không trùng khớp!"
                );

                $("#confirmPassword")
                    .addClass("invalid");

                isValid = false;

            }
            else{

                $("#confirmPassword")
                    .addClass("valid");

            }

            // Thành công
            if(isValid){

                $("#successMessage").text(
                    "Đăng ký thành công!"
                );

                // Reset form
                $("#registerForm")[0].reset();

                $("input")
                    .removeClass("valid");

            }

        });

    </script>

</body>
</html>
