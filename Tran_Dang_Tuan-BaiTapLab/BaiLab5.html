<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f6;
            padding: 20px;
        }

        h1{
            text-align: center;
            color: #1f2937;
        }

        .container{
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, button, select{
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            background-color: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background-color: #1d4ed8;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td{
            border: 1px solid #ddd;
        }

        th{
            background-color: #2563eb;
            color: white;
        }

        th, td{
            padding: 10px;
            text-align: center;
        }

        .total{
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>QUẢN LÝ SẢN PHẨM</h1>

        <!-- Tìm kiếm -->
        <div>
            <input type="text" id="searchName" placeholder="Nhập tên sản phẩm">
            <button onclick="timSanPham()">Tìm kiếm</button>
        </div>

        <!-- Lọc giá -->
        <div>
            <input type="number" id="minPrice" placeholder="Giá nhỏ nhất">
            <input type="number" id="maxPrice" placeholder="Giá lớn nhất">
            <button onclick="locTheoGia()">Lọc giá</button>
        </div>

        <!-- Sắp xếp -->
        <div>
            <button onclick="sapXepTang()">Sắp xếp giá tăng</button>
            <button onclick="sapXepGiam()">Sắp xếp giá giảm</button>
            <button onclick="hienThiTatCa()">Hiển thị tất cả</button>
        </div>

        <!-- Bảng sản phẩm -->
        <table>
            <thead>
                <tr>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                </tr>
            </thead>

            <tbody id="productList">

            </tbody>
        </table>

        <div class="total" id="tongKho"></div>

    </div>

    <script>

        // Mảng sản phẩm
        let products = [
            {
                name: "Laptop",
                price: 15000000,
                quantity: 5
            },

            {
name: "Điện thoại",
                price: 8000000,
                quantity: 10
            },

            {
                name: "Tai nghe",
                price: 500000,
                quantity: 20
            },

            {
                name: "Chuột",
                price: 300000,
                quantity: 15
            },

            {
                name: "Bàn phím",
                price: 700000,
                quantity: 8
            }
        ];

        // Hàm hiển thị sản phẩm
        function renderProducts(list){

            let html = "";

            list.map(product => {

                html += `
                    <tr>
                        <td>${product.name}</td>
                        <td>${product.price.toLocaleString()} VNĐ</td>
                        <td>${product.quantity}</td>
                    </tr>
                `;
            });

            document.getElementById("productList").innerHTML = html;

            tinhTongKho(list);
        }

        // Tìm sản phẩm theo tên
        function timSanPham(){

            let keyword = document
                .getElementById("searchName")
                .value
                .toLowerCase();

            let result = products.find(product =>
                product.name.toLowerCase() === keyword
            );

            if(result){
                renderProducts([result]);
            }
            else{
                alert("Không tìm thấy sản phẩm!");
            }
        }

        // Lọc theo giá
        function locTheoGia(){

            let min = Number(document.getElementById("minPrice").value);
            let max = Number(document.getElementById("maxPrice").value);

            let result = products.filter(product =>
                product.price >= min &&
                product.price <= max
            );

            renderProducts(result);
        }

        // Sắp xếp tăng dần
        function sapXepTang(){

            let sorted = [...products].sort((a,b) =>
                a.price - b.price
            );

            renderProducts(sorted);
        }

        // Sắp xếp giảm dần
        function sapXepGiam(){

            let sorted = [...products].sort((a,b) =>
                b.price - a.price
            );

            renderProducts(sorted);
        }

        // Tổng giá trị tồn kho
        function tinhTongKho(list){

            let total = 0;

            list.forEach(product => {
                total += product.price * product.quantity;
            });

            document.getElementById("tongKho").innerHTML =
                "Tổng giá trị tồn kho: " +
                total.toLocaleString() +
                " VNĐ";
        }

        // Hiển thị tất cả
        function hienThiTatCa(){
            renderProducts(products);
        }

        // Gọi lần đầu
        renderProducts(products);

    </script>

</body>
</html>
