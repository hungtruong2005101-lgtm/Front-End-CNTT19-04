<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CRUD Sinh Viên - jQuery Ajax</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f6;
            padding: 20px;
        }

        .container{
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .form-group{
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input{
            flex: 1;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        button{
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        .add-btn{
            background-color: #2563eb;
        }

        .update-btn{
            background-color: #f59e0b;
        }

        .edit-btn{
            background-color: #16a34a;
        }

        .delete-btn{
            background-color: #dc2626;
        }

        button:hover{
            opacity: 0.8;
        }

        .message{
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td{
            border: 1px solid #ddd;
        }

        th{
            background-color: #2563eb;
            color: white;
        }

        th, td{
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even){
            background-color: #f9fafb;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>QUẢN LÝ SINH VIÊN CRUD</h1>

        <!-- Thông báo -->
        <div id="message" class="message"></div>

        <!-- Form -->
        <form id="studentForm">

            <div class="form-group">

                <input
                    type="text"
                    id="name"
                    placeholder="Nhập họ tên"
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Nhập email"
                >

                <input
                    type="text"
                    id="className"
                    placeholder="Nhập lớp"
                >
<button
                    type="submit"
                    class="add-btn"
                    id="saveBtn"
                >
                    Thêm
                </button>

            </div>

        </form>

        <!-- Bảng dữ liệu -->
        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Lớp</th>
                    <th>Hành động</th>

                </tr>

            </thead>

            <tbody id="studentList">

            </tbody>

        </table>

    </div>

    <script>

        // API MockAPI
        const API_URL =
            "https://6826e799397e48c91315f7f4.mockapi.io/students";

        // ID đang sửa
        let editingId = null;

        // Load danh sách sinh viên
        function loadStudents(){

            $.ajax({

                url: API_URL,

                method: "GET",

                success: function(data){

                    renderStudents(data);

                },

                error: function(){

                    showMessage(
                        "Không thể tải dữ liệu!",
                        "red"
                    );

                }

            });

        }

        // Hiển thị danh sách
        function renderStudents(students){

            let html = "";

            $.each(students, function(index, student){

                html += `
                    <tr>

                        <td>${student.id}</td>

                        <td>${student.name}</td>

                        <td>${student.email}</td>

                        <td>${student.className}</td>

                        <td>

                            <button
                                class="edit-btn edit"
                                data-id="${student.id}"
                                data-name="${student.name}"
                                data-email="${student.email}"
                                data-class="${student.className}"
                            >
                                Sửa
                            </button>

                            <button
                                class="delete-btn delete"
                                data-id="${student.id}"
                            >
                                Xóa
                            </button>

                        </td>

                    </tr>
                `;

            });

            $("#studentList").html(html);

        }

        // Hiển thị thông báo
        function showMessage(text, color){

            $("#message")

                .text(text)

                .css("color", color);

        }

        // Reset form
        function resetForm(){

            $("#studentForm")[0].reset();

            editingId = null;

            $("#saveBtn")

                .text("Thêm")
.removeClass("update-btn")

                .addClass("add-btn");

        }

        // Submit form
        $("#studentForm").submit(function(event){

            event.preventDefault();

            // Lấy dữ liệu
            let name =
                $("#name").val().trim();

            let email =
                $("#email").val().trim();

            let className =
                $("#className").val().trim();

            // Kiểm tra rỗng
            if(
                name === "" ||
                email === "" ||
                className === ""
            ){

                showMessage(
                    "Vui lòng nhập đầy đủ thông tin!",
                    "red"
                );

                return;

            }

            // Object sinh viên
            let student = {

                name: name,

                email: email,

                className: className

            };

            // Nếu đang sửa
            if(editingId){

                $.ajax({

                    url: `${API_URL}/${editingId}`,

                    method: "PUT",

                    contentType: "application/json",

                    data: JSON.stringify(student),

                    success: function(){

                        showMessage(
                            "Cập nhật thành công!",
                            "green"
                        );

                        loadStudents();

                        resetForm();

                    },

                    error: function(){

                        showMessage(
                            "Lỗi cập nhật dữ liệu!",
                            "red"
                        );

                    }

                });

            }

            // Nếu thêm mới
            else{

                $.ajax({

                    url: API_URL,

                    method: "POST",

                    contentType: "application/json",

                    data: JSON.stringify(student),

                    success: function(){

                        showMessage(
                            "Thêm sinh viên thành công!",
                            "green"
                        );

                        loadStudents();

                        resetForm();

                    },

                    error: function(){

                        showMessage(
                            "Lỗi thêm dữ liệu!",
                            "red"
                        );

                    }

                });

            }

        });

        // Xóa sinh viên
        $("#studentList").on(
            "click",
            ".delete",
            function(){

                let id =
                    $(this).data("id");

                if(confirm(
                    "Bạn có chắc muốn xóa?"
                )){

                    $.ajax({

                        url: `${API_URL}/${id}`,
method: "DELETE",

                        success: function(){

                            showMessage(
                                "Xóa thành công!",
                                "green"
                            );

                            loadStudents();

                        },

                        error: function(){

                            showMessage(
                                "Lỗi xóa dữ liệu!",
                                "red"
                            );

                        }

                    });

                }

            }
        );

        // Chỉnh sửa sinh viên
        $("#studentList").on(
            "click",
            ".edit",
            function(){

                editingId =
                    $(this).data("id");

                // Đưa dữ liệu lên form
                $("#name").val(
                    $(this).data("name")
                );

                $("#email").val(
                    $(this).data("email")
                );

                $("#className").val(
                    $(this).data("class")
                );

                // Đổi nút
                $("#saveBtn")

                    .text("Cập nhật")

                    .removeClass("add-btn")

                    .addClass("update-btn");

            }
        );

        // Gọi dữ liệu lần đầu
        loadStudents();

    </script>

</body>
</html>
