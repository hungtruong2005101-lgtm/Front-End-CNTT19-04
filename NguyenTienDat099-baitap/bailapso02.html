<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Khuyến Mãi Đơn Hàng</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 400px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        label{
            font-weight: bold;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin: 10px 0 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        #ketQua{
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background-color: #f9f9f9;
            line-height: 1.8;
        }

        .success{
            color: green;
        }

        .error{
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>TÍNH KHUYẾN MÃI</h2>

        <label>Giá trị đơn hàng (VNĐ)</label>
        <input type="number" id="donHang" placeholder="Nhập số tiền">

        <label>Hạng thành viên</label>
        <select id="thanhVien">
            <option value="thuong">Thành viên thường</option>
            <option value="bac">Thành viên bạc</option>
            <option value="vang">Thành viên vàng</option>
        </select>

        <button onclick="tinhKhuyenMai()">Tính thanh toán</button>

        <div id="ketQua"></div>
    </div>

    <script>

        function tinhKhuyenMai(){

            let donHang = Number(document.getElementById("donHang").value);
            let thanhVien = document.getElementById("thanhVien").value;

            let ketQua = document.getElementById("ketQua");

            // Kiểm tra dữ liệu
            if(donHang <= 0){
                ketQua.innerHTML = "Vui lòng nhập giá trị đơn hàng hợp lệ!";
                ketQua.className = "error";
                return;
            }

            let giamGia = 0;

            // Khuyến mãi theo giá trị đơn hàng
            if(donHang >= 1000000){
                giamGia = 15;
            }
            else if(donHang >= 500000){
                giamGia = 10;
            }
else if(donHang >= 200000){
                giamGia = 5;
            }
            else{
                giamGia = 0;
            }

            // Cộng thêm ưu đãi theo thành viên
            if(thanhVien == "bac"){
                giamGia += 3;
            }
            else if(thanhVien == "vang"){
                giamGia += 5;
            }

            // Giới hạn giảm tối đa
            if(giamGia > 25){
                giamGia = 25;
            }

            // Tính tiền giảm
            let tienGiam = donHang * giamGia / 100;

            // Miễn phí vận chuyển nếu trên 2 triệu
            let phiShip = 30000;

            if(donHang >= 2000000){
                phiShip = 0;
            }

            // Tổng thanh toán
            let thanhToan = donHang - tienGiam + phiShip;

            // Hiển thị kết quả
            ketQua.className = "success";

            ketQua.innerHTML = `
                <strong>Tiền gốc:</strong> ${donHang.toLocaleString()} VNĐ <br>

                <strong>Tỷ lệ giảm:</strong> ${giamGia}% <br>

                <strong>Số tiền giảm:</strong> ${tienGiam.toLocaleString()} VNĐ <br>

                <strong>Phí vận chuyển:</strong> ${phiShip.toLocaleString()} VNĐ <br>

                <strong>Tổng thanh toán:</strong> ${thanhToan.toLocaleString()} VNĐ
            `;
        }

    </script>

</body>
</html>
