<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Đếm Tương Tác</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        h1{
            color: #1f2937;
        }

        #counter{
            font-size: 60px;
            margin: 20px 0;
            font-weight: bold;
            color: black;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .increase{
            background-color: #16a34a;
            color: white;
        }

        .decrease{
            background-color: #dc2626;
            color: white;
        }

        .reset{
            background-color: #2563eb;
            color: white;
        }

        .plus5{
            background-color: #f59e0b;
            color: white;
        }

        button:hover{
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>BỘ ĐẾM TƯƠNG TÁC</h1>

        <div id="counter">0</div>

        <button class="increase" id="btnIncrease">
            Tăng
        </button>

        <button class="decrease" id="btnDecrease">
            Giảm
        </button>

        <button class="reset" id="btnReset">
            Đặt lại
        </button>

        <button class="plus5" id="btnPlus5">
            +5
        </button>

    </div>

    <script>

        // Biến trạng thái
        let count = 0;

        // Lấy phần tử DOM
        const counter = document.getElementById("counter");

        const btnIncrease =
            document.getElementById("btnIncrease");

        const btnDecrease =
            document.getElementById("btnDecrease");

        const btnReset =
            document.getElementById("btnReset");

        const btnPlus5 =
            document.getElementById("btnPlus5");

        // Hàm cập nhật giao diện
        function render(){

            counter.innerText = count;

            // Đổi màu theo giá trị
            if(count > 0){
                counter.style.color = "green";
            }
            else if(count < 0){
                counter.style.color = "red";
            }
            else{
                counter.style.color = "black";
            }
        }

        // Sự kiện tăng
        btnIncrease.addEventListener("click", function(){
count++;

            render();

        });

        // Sự kiện giảm
        btnDecrease.addEventListener("click", function(){

            count--;

            render();

        });

        // Sự kiện đặt lại
        btnReset.addEventListener("click", function(){

            count = 0;

            render();

        });

        // Tăng nhanh +5
        btnPlus5.addEventListener("click", function(){

            count += 5;

            render();

        });

        // Hiển thị lần đầu
        render();

    </script>

</body>
</html>
