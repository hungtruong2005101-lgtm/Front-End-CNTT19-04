<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Giỏ Hàng Đơn Giản</title>

    <!-- Nhúng jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            width: 700px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #1f2937;
            margin-bottom: 25px;
        }

        .product{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-info{
            width: 35%;
        }

        .quantity-box{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity{
            font-size: 20px;
            font-weight: bold;
            width: 30px;
            text-align: center;
        }

        button{
            padding: 8px 14px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .increase-btn{
            background-color: #16a34a;
        }

        .decrease-btn{
            background-color: #dc2626;
        }

        .total{
            font-size: 18px;
            font-weight: bold;
            color: #2563eb;
        }

        .bill{
            text-align: right;
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>GIỎ HÀNG ĐƠN GIẢN</h1>

        <!-- Sản phẩm 1 -->
        <div class="product">

            <div class="product-info">

                <h3>Laptop Dell</h3>

                <p>
                    Giá:
                    <span class="price">
                        15000000
                    </span> VNĐ
                </p>

            </div>

            <div class="quantity-box">

                <button class="decrease-btn">
                    -
                </button>

                <span class="quantity">
                    1
                </span>

                <button class="increase-btn">
                    +
                </button>

            </div>

            <div class="total">

                Thành tiền:
                <span class="item-total">
15000000
                </span> VNĐ

            </div>

        </div>

        <!-- Sản phẩm 2 -->
        <div class="product">

            <div class="product-info">

                <h3>Chuột Gaming</h3>

                <p>
                    Giá:
                    <span class="price">
                        500000
                    </span> VNĐ
                </p>

            </div>

            <div class="quantity-box">

                <button class="decrease-btn">
                    -
                </button>

                <span class="quantity">
                    1
                </span>

                <button class="increase-btn">
                    +
                </button>

            </div>

            <div class="total">

                Thành tiền:
                <span class="item-total">
                    500000
                </span> VNĐ

            </div>

        </div>

        <!-- Tổng hóa đơn -->
        <div class="bill">

            Tổng hóa đơn:
            <span id="billTotal">
                15500000
            </span> VNĐ

        </div>

    </div>

    <script>

        // Hàm cập nhật tổng tiền từng sản phẩm
        function updateItemTotal(product){

            let price =
                parseInt(
                    product.find(".price").text()
                );

            let quantity =
                parseInt(
                    product.find(".quantity").text()
                );

            let total =
                price * quantity;

            product.find(".item-total")
                .text(total);

        }

        // Hàm cập nhật tổng hóa đơn
        function updateBillTotal(){

            let billTotal = 0;

            $(".item-total").each(function(){

                billTotal +=
                    parseInt($(this).text());

            });

            $("#billTotal").text(billTotal);

        }

        // Nút tăng
        $(".increase-btn").click(function(){

            let product =
                $(this).closest(".product");

            let quantityElement =
                product.find(".quantity");

            let quantity =
                parseInt(quantityElement.text());

            quantity++;

            quantityElement.text(quantity);

            updateItemTotal(product);

            updateBillTotal();

        });

        // Nút giảm
        $(".decrease-btn").click(function(){

            let product =
                $(this).closest(".product");

            let quantityElement =
                product.find(".quantity");

            let quantity =
                parseInt(quantityElement.text());

            // Không cho nhỏ hơn 1
            if(quantity > 1){

                quantity--;

                quantityElement.text(quantity);

                updateItemTotal(product);

                updateBillTotal();

            }

        });
// Hiển thị lần đầu
        updateBillTotal();

    </script>

</body>
</html>
