<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Sản Phẩm</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f5f5f5;
      }

      .card:hover {
        transform: translateY(-5px);
        transition: 0.3s;
      }

      .product-img {
        height: 220px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <h1 class="text-center mb-5 text-primary">Danh Sách Sản Phẩm</h1>

      <div class="row g-4">
        <!-- Sản phẩm 1 -->
        <div class="col-md-4 col-sm-6">
          <div class="card shadow rounded-4 h-100">
            <img
              src="./Screenshot 2026-05-26 085158.png"
              class="card-img-top product-img"
            />

            <div class="card-body text-center">
              <h5 class="card-title">Tai Nghe Gaming</h5>

              <span class="badge bg-danger mb-2"> Giảm 20% </span>

              <p class="text-success fw-bold">500.000đ</p>

              <button class="btn btn-primary w-100">Mua Ngay</button>
            </div>
          </div>
        </div>

        <!-- Sản phẩm 2 -->
        <div class="col-md-4 col-sm-6">
          <div class="card shadow rounded-4 h-100">
            <img src="./anh2.png" />

            <div class="card-body text-center">
              <h5 class="card-title">Bàn Phím RGB</h5>

              <span class="badge bg-warning text-dark mb-2"> Hot </span>

              <p class="text-success fw-bold">700.000đ</p>

              <button class="btn btn-success w-100">Mua Ngay</button>
            </div>
          </div>
        </div>

        <!-- Sản phẩm 3 -->
        <div class="col-md-4 col-sm-6">
          <div class="card shadow rounded-4 h-100">
            <img src="./chuot.png" class="card-img-top product-img" />

            <div class="card-body text-center">
              <h5 class="card-title">Chuột Wireless</h5>

              <span class="badge bg-info mb-2"> New </span>

              <p class="text-success fw-bold">350.000đ</p>

              <button class="btn btn-dark w-100">Mua Ngay</button>
            </div>
          </div>
        </div>

        <!-- Sản phẩm 4 -->
        <div class="col-md-4 col-sm-6">
          <div class="card shadow rounded-4 h-100">
            <img src="./laptop.png" class="card-img-top product-img" />

            <div class="card-body text-center">
              <h5 class="card-title">Laptop Gaming</h5>

              <span class="badge bg-danger mb-2"> Sale </span>

              <p class="text-success fw-bold">25.000.000đ</p>

              <button class="btn btn-primary w-100">Mua Ngay</button>
            </div>
          </div>
        </div>

        <!-- Sản phẩm 5 -->
        <div class="col-md-4 col-sm-6">
          <div class="card shadow rounded-4 h-100">
            <img src="./dienthaoi.png" class="card-img-top product-img" />

            <div class="card-body text-center">
              <h5 class="card-title">Điện Thoại</h5>

              <span class="badge bg-success mb-2"> Mới </span>

              <p class="text-success fw-bold">12.000.000đ</p>

              <button class="btn btn-success w-100">Mua Ngay</button>
            </div>
          </div>
        </div>

        <!-- Sản phẩm 6 -->
        <div class="col-md-4 col-sm-6">
          <div class="card shadow rounded-4 h-100">
            <img src="./manhinh4k.png" class="card-img-top product-img" />

            <div class="card-body text-center">
              <h5 class="card-title">Màn Hình 4K</h5>

              <span class="badge bg-primary mb-2"> Premium </span>

              <p class="text-success fw-bold">8.000.000đ</p>

              <button class="btn btn-dark w-100">Mua Ngay</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
