<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 19: Tải và hiển thị danh sách dữ liệu bằng Ajax</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 40px 15px;
            color: #334155;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h2 {
            text-align: center;
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-load {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-load:hover {
            background-color: #1d4ed8;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            display: none; 
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
        }
        tr:hover {
            background-color: #f8fafc;
        }

        .status-message {
            text-align: center;
            padding: 30px;
            font-size: 16px;
            font-weight: 500;
        }
        .loading {
            color: #2563eb;
        }
        .error {
            color: #ef4444;
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 6px;
        }
        .empty {
            color: #64748b;
            font-style: italic;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Danh Sách Sinh Viên</h2>
    
    <div class="control-panel">
        <div>Trạng thái API: <strong style="color: #10b981;">Sẵn sàng</strong></div>
        <button id="btnFetch" class="btn-load">Tải lại dữ liệu</button>
    </div>

    <div id="statusBox" class="status-message empty">Chưa có dữ liệu. Nhấn nút để tải.</div>

    <table id="studentTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Họ và Tên</th>
                <th>Email</th>
                <th>Chuyên ngành</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script>
    $(document).ready(function() {
        
        const API_URL = "https://66551234abcde5678f901234.mockapi.io/students"; 

        loadData();

        $('#btnFetch').click(function() {
            loadData();
        });

        function loadData() {
            $('#studentTable').hide();
            $('#statusBox')
                .removeClass('error empty')
                .addClass('loading')
                .text('⏳ Đang tải dữ liệu từ MockAPI, vui lòng đợi...')
                .show();

            $.ajax({
                url: API_URL,
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response.length === 0) {
                        $('#statusBox').removeClass('loading').addClass('empty').text('📭 Danh sách trống! Không có dữ liệu trên server.').show();
                    } else {
                        $('#statusBox').hide();
                        renderTable(response);
                    }
                },
                error: function(xhr, status, error) {
                    $('#statusBox')
                        .removeClass('loading')
                        .addClass('error')
                        .html('❌ Lỗi tải dữ liệu! Không thể kết nối tới API.<br><small>Chi tiết: ' + xhr.status + ' - ' + error + '</small>')
                        .show();
                }
            });
        }

        function renderTable(data) {
            let rowsHTML = '';
            
            $.each(data, function(index, item) {
                rowsHTML += `
                    <tr>
                        <td><strong>${item.id}</strong></td>
                        <td>${item.name}</td>
                        <td>${item.email}</td>
                        <td>${item.major || 'Công nghệ thông tin'}</td>
                    </tr>
                `;
            });

            $('#tableBody').html(rowsHTML);
            $('#studentTable').fadeIn(300);
        }
    });
</script>
</body>
</html>
