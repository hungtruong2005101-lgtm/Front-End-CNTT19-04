<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 01 - Tính Chỉ Số BMI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            display: none; /* Ẩn đi khi chưa tính toán */
        }
        /* Các màu sắc cho từng trạng thái (Yêu cầu mở rộng) */
        .error { background-color: #f8d7da; color: #721c24; }
        .gay { background-color: #fff3cd; color: #856404; }
        .binh-thuong { background-color: #d4edda; color: #155724; }
        .thua-can { background-color: #ffeeba; color: #856404; }
        .beo-phi { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tính Chỉ Số BMI</h2>
    
    <div class="input-group">
        <label for="height">Chiều cao (m):</label>
        <input type="number" id="height" step="0.01" placeholder="Ví dụ: 1.65">
    </div>
    
    <div class="input-group">
        <label for="weight">Cân nặng (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="Ví dụ: 55">
    </div>
    
    <button onclick="tinhBMI()">Tính Kết Quả</button>
    
    <div id="result"></div>
</div>

<script>
    function tinhBMI() {
        // 1. Lấy dữ liệu từ ô nhập và ép kiểu sang số bằng Number()
        let height = Number(document.getElementById('height').value);
        let weight = Number(document.getElementById('weight').value);
        let resultDiv = document.getElementById('result');
        
        // Hiện khung kết quả
        resultDiv.style.display = "block";
        // Xóa sạch các class màu cũ trước đó
        resultDiv.className = ""; 

        // 2. Kiểm tra dữ liệu hợp lệ (Yêu cầu mở rộng)
        if (!height || !weight || height <= 0 || weight <= 0) {
            resultDiv.innerHTML = "Vui lòng nhập chiều cao và cân nặng hợp lệ (lớn hơn 0)!";
            resultDiv.classList.add('error');
            return; // Dừng hàm, không tính toán tiếp
        }

        // 3. Tính BMI theo công thức: BMI = weight / (height * height)
        let bmi = weight / (height * height);
        
        // Làm tròn kết quả đến 2 chữ số thập phân bằng toFixed(2)
        bmi = bmi.toFixed(2); 

        let phanLoai = "";
        let mauSacClass = "";

        // 4. Sử dụng câu lệnh điều kiện if...else để phân loại
        if (bmi < 18.5) {
            phanLoai = "Gầy";
            mauSacClass = "gay";
        } else if (bmi >= 18.5 && bmi < 24.9) {
            phanLoai = "Bình thường";
            mauSacClass = "binh-thuong";
        } else if (bmi >= 25 && bmi < 29.9) {
            phanLoai = "Thừa cân";
            mauSacClass = "thua-can";
        } else {
            phanLoai = "Béo phì";
            mauSacClass = "beo-phi";
        }

        // 5. Hiển thị kết quả trực tiếp lên giao diện
        resultDiv.innerHTML = `BMI của bạn: ${bmi} <br> Kết luận: ${phanLoai}`;
        resultDiv.classList.add(mauSacClass);
    }
</script>

</body>
</html>
