<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 07 - Thao tác DOM (Gộp chung)</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            transition: background-color 0.4s ease;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 360px;
            width: 100%;
            transition: all 0.4s ease;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin: 15px 0;
            border: 2px solid #ddd;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #545b62;
        }

        .dark-theme {
            background-color: #2c3e50;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        body.bg-changed {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

    <div class="card" id="myCard">
        <h2 id="title">Giao diện ban đầu</h2>
        
        <p id="description">Đây là nội dung văn bản gốc chưa được chỉnh sửa. Nhấn nút để thay đổi!</p>
        
        <img id="feature-image" src="https://picsum.photos/id/10/300/200" alt="Ảnh ban đầu">
        
        <div class="button-group">
            <button id="btn-change" class="btn">Thay đổi nội dung</button>
            <button id="btn-reset" class="btn btn-secondary">Khôi phục</button>
        </div>
    </div>

    <script>
        const cardTitle = document.getElementById('title');
        const cardDesc = document.getElementById('description');
        const cardImage = document.getElementById('feature-image');
        const mainCard = document.getElementById('myCard');
        
        const btnChange = document.getElementById('btn-change');
        const btnReset = document.getElementById('btn-reset');

        btnChange.addEventListener('click', function() {
            cardTitle.innerText = "🎉 Đã Đổi Thành Công!";
            cardDesc.textContent = "Hình ảnh đã được thay thế sang ảnh mới, văn bản được cập nhật trực tiếp và class 'dark-theme' đã được kích hoạt.";
            
            cardImage.src = "https://picsum.photos/id/26/300/200";
            cardImage.alt = "Ảnh sau khi thay đổi";
            
            mainCard.classList.add('dark-theme');
            document.body.classList.add('bg-changed'); 
        });

        btnReset.addEventListener('click', function() {
            cardTitle.innerText = "Giao diện ban đầu";
            cardDesc.textContent = "Đây là nội dung văn bản gốc chưa được chỉnh sửa. Nhấn nút để thay đổi!";
            
            cardImage.src = "https://picsum.photos/id/10/300/200";
            cardImage.alt = "Ảnh ban đầu";
            
            mainCard.classList.remove('dark-theme');
            document.body.classList.remove('bg-changed');
        });
    </script>
</body>
</html>
