<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 08 - Bộ đếm tương tác (Gộp chung)</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #eef2f3;
            margin: 0;
        }

        .counter-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 350px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        #counter-value {
            font-size: 5rem;
            font-weight: bold;
            color: #2c3e50; 
            margin: 20px 0;
            transition: color 0.3s ease, transform 0.1s ease;
        }

        #counter-value.positive {
            color: #2ecc71; 
        }

        #counter-value.negative {
            color: #e74c3c; 
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-reset {
            background-color: #95a5a6;
        }
        .btn-reset:hover {
            background-color: #7f8c8d;
        }

        .btn-fast {
            background-color: #9b59b6;
        }
        .btn-fast:hover {
            background-color: #8e44ad;
        }
    </style>
</head>
<body>

    <div class="counter-container">
        <h2>Bộ Đếm Tương Tác</h2>
        
        <div id="counter-value">0</div>
        
        <div class="button-group">
            <button id="btn-decrease-fast" class="btn btn-fast">-5</button>
            <button id="btn-decrease" class="btn">-1</button>
            <button id="btn-reset" class="btn btn-reset">Reset</button>
            <button id="btn-increase" class="btn">+1</button>
            <button id="btn-increase-fast" class="btn btn-fast">+5</button>
        </div>
    </div>

    <script>
        let count = 0;

        const counterValueHTML = document.getElementById('counter-value');
        const btnIncrease = document.getElementById('btn-increase');
        const btnDecrease = document.getElementById('btn-decrease');
        const btnReset = document.getElementById('btn-reset');
        
        const btnIncreaseFast = document.getElementById('btn-increase-fast');
        const btnDecreaseFast = document.getElementById('btn-decrease-fast');

        function render() {
            counterValueHTML.innerText = count;

            if (count > 0) {
                counterValueHTML.className = 'positive'; 
            } else if (count < 0) {
                counterValueHTML.className = 'negative'; 
            } else {
                counterValueHTML.className = '';         
            }
        }


        btnIncrease.addEventListener('click', function() {
            count += 1; 
            render();   
        });

        btnDecrease.addEventListener('click', function() {
            count -= 1; 
            render();   
        });

        btnReset.addEventListener('click', function() {
            count = 0;  
            render();   
        });

        btnIncreaseFast.addEventListener('click', function() {
            count += 5; 
            render();
        });

        btnDecreaseFast.addEventListener('click', function() {
            count -= 5; 
            render();
        });

        render();
    </script>
</body>
</html>
