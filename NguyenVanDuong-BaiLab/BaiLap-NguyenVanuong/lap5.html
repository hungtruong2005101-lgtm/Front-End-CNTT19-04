<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 05 - Quản Lý Danh Sách Sản Phẩm</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 30px;
            color: #2f3640;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2f3542; margin-bottom: 25px; }
        
        .filter-section {
            background-color: #f1f2f6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-group label { font-weight: bold; font-size: 14px; color: #57606f; }
        .control-group input, .control-group select {
            padding: 10px;
            border: 1px solid #ced6e0;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-reset {
            padding: 10px 20px;
            background-color: #747d8c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 22px;
        }
        .btn-reset:hover { background-color: #57606f; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #2f3542; color: white; }
        tr:hover { background-color: #f8f9fa; }
        .no-data { text-align: center; color: #a4b0be; font-style: italic; padding: 20px; }

        .summary-box {
            background: linear-gradient(135deg, #718093, #2f3640);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        .total-money { color: #fbc531; font-size: 22px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Hệ Thống Quản Lý Sản Phẩm 🛒</h2>
    
    <div class="filter-section">
        <div class="control-group" style="flex: 2;">
            <label for="search-name">Tìm kiếm theo tên:</label>
            <input type="text" id="search-name" placeholder="Nhập tên sản phẩm..." oninput="xuLyBoLoc()">
        </div>
        
        <div class="control-group" style="flex: 1.5;">
            <label for="filter-price">Lọc theo giá tối đa:</label>
            <input type="number" id="filter-price" placeholder="Ví dụ: 15000000" oninput="xuLyBoLoc()">
        </div>

        <div class="control-group" style="flex: 1.5;">
            <label for="sort-price">Sắp xếp giá:</label>
            <select id="sort-price" onchange="xuLyBoLoc()">
                <option value="none">-- Mặc định --</option>
                <option value="asc">Giá tăng dần ↑</option>
                <option value="desc">Giá giảm dần ↓</option>
            </select>
        </div>

        <button class="btn-reset" onclick="datLaiBoLoc()">Xóa Lọc</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền (Tồn kho)</th>
            </tr>
        </thead>
        <tbody id="product-list">
            </tbody>
    </table>

    <div class="summary-box">
        <span>TỔNG GIÁ TRỊ HÀNG TỒN KHO:</span>
        <span id="total-inventory-value" class="total-money">0 đ</span>
    </div>
</div>

<script>
    const danhSachGoc = [
        { id: 1, name: "Điện thoại iPhone 15 Pro", price: 28990000, quantity: 15 },
        { id: 2, name: "Laptop ASUS Zenbook 14", price: 22490000, quantity: 8 },
        { id: 3, name: "Tai nghe Không Dây Sony", price: 3450000, quantity: 40 },
        { id: 4, name: "Đồng hồ thông minh Garmin", price: 8990000, quantity: 12 },
        { id: 5, name: "Bàn phím cơ Logitech G213", price: 990000, quantity: 25 }
    ];

    function formatVND(amount) {
        return amount.toLocaleString('vi-VN') + ' đ';
    }

    function renderProducts(products) {
        let tbody = document.getElementById('product-list');
        tbody.innerHTML = ""; 
        if (products.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="no-data">Không tìm thấy sản phẩm nào phù hợp!</td></tr>`;
            document.getElementById('total-inventory-value').innerText = formatVND(0);
            return;
        }

        products.forEach((product, index) => {
            let thanhTien = product.price * product.quantity;
            let row = `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${product.name}</strong></td>
                    <td>${formatVND(product.price)}</td>
                    <td>${product.quantity}</td>
                    <td>${formatVND(thanhTien)}</td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        });

        let tongGiaTri = products.reduce((total, p) => total + (p.price * p.quantity), 0);
        document.getElementById('total-inventory-value').innerText = formatVND(tongGiaTri);
    }

    function xuLyBoLoc() {
        let keyword = document.getElementById('search-name').value.trim().toLowerCase();
        let maxPrice = document.getElementById('filter-price').value;
        let sortType = document.getElementById('sort-price').value;

        let ketQua = danhSachGoc.filter(product => {
            return product.name.toLowerCase().includes(keyword);
        });

        if (maxPrice !== "") {
            let priceLimit = Number(maxPrice);
            ketQua = ketQua.filter(product => product.price <= priceLimit);
        }

        if (sortType === 'asc') {
            ketQua.sort((a, b) => a.price - b.price); 
        } else if (sortType === 'desc') {
            ketQua.sort((a, b) => b.price - a.price); 
        }

        renderProducts(ketQua);
    }
    function datLaiBoLoc() {
        document.getElementById('search-name').value = "";
        document.getElementById('filter-price').value = "";
        document.getElementById('sort-price').value = "none";
        renderProducts(danhSachGoc); 
    }

    window.onload = function() {
        renderProducts(danhSachGoc);
    };
</script>

</body>
</html>
