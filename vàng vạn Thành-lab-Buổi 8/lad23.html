<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danh sách sản phẩm</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <h2 class="text-center mb-4">Danh sách sản phẩm</h2>

    <div class="row g-4">
        
        <!-- PRODUCT 1 -->
        <div class="col-12 col-sm-6 col-md-4">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <span class="badge bg-danger mb-2">-20%</span>
                    <h5 class="card-title">Áo thun nam</h5>
                    <p class="text-danger fw-bold">200.000đ</p>
                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#modal1">
                        Xem nhanh
                    </button>
                </div>
            </div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="col-12 col-sm-6 col-md-4">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <span class="badge bg-success mb-2">Mới</span>
                    <h5 class="card-title">Giày sneaker</h5>
                    <p class="text-danger fw-bold">500.000đ</p>
                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#modal2">
                        Xem nhanh
                    </button>
                </div>
            </div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="col-12 col-sm-6 col-md-4">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Túi xách</h5>
                    <p class="text-danger fw-bold">350.000đ</p>
                    <button class="btn btn-primary w-100">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- PRODUCT 4 -->
        <div class="col-12 col-sm-6 col-md-4">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Đồng hồ</h5>
                    <p class="text-danger fw-bold">800.000đ</p>
                    <button class="btn btn-primary w-100">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- PRODUCT 5 -->
        <div class="col-12 col-sm-6 col-md-4">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Áo khoác</h5>
                    <p class="text-danger fw-bold">600.000đ</p>
                    <button class="btn btn-primary w-100">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- PRODUCT 6 -->
        <div class="col-12 col-sm-6 col-md-4">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Mũ thời trang</h5>
                    <p class="text-danger fw-bold">150.000đ</p>
                    <button class="btn btn-primary w-100">Mua ngay</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- MODAL 1 -->
<div class="modal fade" id="modal1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Áo thun nam</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Sản phẩm đẹp, chất liệu cotton thoáng mát.
            </div>
        </div>
    </div>
</div>

<!-- MODAL 2 -->
<div class="modal fade" id="modal2">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Giày sneaker</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Giày trẻ trung, phù hợp đi chơi và thể thao.
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
