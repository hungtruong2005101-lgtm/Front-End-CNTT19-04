<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 10</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        h1 {
            text-align: center;
            color: #333;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        #load-btn {
            padding: 10px 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        #load-btn:hover { background: #0056b3; }

        .user-list {
            max-width: 800px;
            margin: 0 auto;
        }
        .user-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .user-info h3 {
            margin: 0 0 5px 0;
            color: #333;
        }
        .user-info p {
            margin: 3px 0;
            color: #666;
            font-size: 0.9rem;
        }
        .user-email { color: #007bff !important; }

        .loading {
            text-align: center;
            color: #666;
            font-size: 1.2rem;
            padding: 30px;
        }

        .error {
            text-align: center;
            color: #dc3545;
            padding: 30px;
        }
    </style>
</head>
<body>

    <h1>Danh sách người dùng</h1>

    <div class="controls">
        <button id="load-btn">Tải dữ liệu</button>
    </div>

    <div id="user-list" class="user-list">
        <p class="loading">Nhấn nút "Tải dữ liệu" để bắt đầu</p>
    </div>

    <script>
        const userList = document.getElementById('user-list');
        const loadBtn = document.getElementById('load-btn');
        
        const API_URL = 'https://jsonplaceholder.typicode.com/users';

        async function fetchUsers() {
            try {
                userList.innerHTML = '<p class="loading">Đang tải dữ liệu...</p>';
                
                const response = await fetch(API_URL);

                if (!response.ok) {
                    throw new Error('Lỗi khi tải dữ liệu: ' + response.status);
                }
                
                const users = await response.json();
                
                // API JSONPlaceholder trả về 10 user, ta lấy 6 user đầu
                renderUsers(users.slice(0, 6));
                
            } catch (error) {
                userList.innerHTML = `<p class="error"> ${error.message}</p>`;
                console.error('Lỗi:', error);
            }
        }

        function renderUsers(users) {
            userList.innerHTML = '';
            
            users.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';

                const initial = user.name.charAt(0).toUpperCase();
                
                card.innerHTML = `
                    <div class="user-avatar">${initial}</div>
                    <div class="user-info">
                        <h3>${user.name}</h3>
                        <p> ${user.address?.city || 'Không rõ'}</p>
                        <p class="user-email"> ${user.email}</p>
                        <p> ${user.phone}</p>
                    </div>
                `;
                
                userList.appendChild(card);
            });
        }

        loadBtn.addEventListener('click', fetchUsers);

    </script>
</body>
</html>
