<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 02</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result-area {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: none;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .total {
            border-top: 1px solid #ccc;
            padding-top: 8px;
            font-weight: bold;
            color: #d9534f;
        }
        .discount {
            color: #28a745;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tính Khuyến Mãi</h2>
    
    <div class="form-group">
        <label for="amount">Giá trị đơn hàng (VNĐ):</label>
        <input type="number" id="amount" placeholder="Nhập số tiền...">
    </div>

    <div class="form-group">
        <label for="rank">Hạng thành viên:</label>
        <select id="rank">
            <option value="0">Thành viên mới</option>
            <option value="2">Hạng Bạc (+2%)</option>
            <option value="5">Hạng Vàng (+5%)</option>
            <option value="8">Hạng Kim Cương (+8%)</option>
        </select>
    </div>

    <button onclick="calculate()">Tính tiền</button>

    <div id="result-area">
        <div class="row">
            <span>Tiền gốc:</span>
            <span id="original"></span>
        </div>
        <div class="row discount">
            <span>Tỷ lệ giảm:</span>
            <span id="percent"></span>
        </div>
        <div class="row discount">
            <span>Tiền giảm:</span>
            <span id="discount"></span>
        </div>
        <div class="row total">
            <span>Thành tiền:</span>
            <span id="total"></span>
        </div>
    </div>
</div>

<script>
    function calculate() {
        let amount = Number(document.getElementById("amount").value);
        let rankBonus = Number(document.getElementById("rank").value);

        if (document.getElementById("amount").value === "" || amount <= 0) {
            alert("Vui lòng nhập giá trị đơn hàng!");
            return;
        }

        let discountPercent = 0;
        if (amount >= 5000000) {
            discountPercent = 15;
        } else if (amount >= 2000000) {
            discountPercent = 10;
        } else if (amount >= 1000000) {
            discountPercent = 5;
        }

        let totalPercent = discountPercent + rankBonus;

        let discountAmount = amount * (totalPercent / 100);
        let total = amount - discountAmount;

        let formatMoney = (num) => num.toLocaleString('vi-VN') + ' VND';

        document.getElementById("original").innerText = formatMoney(amount);
        document.getElementById("percent").innerText = totalPercent + "%";
        document.getElementById("discount").innerText = formatMoney(discountAmount);
        document.getElementById("total").innerText = formatMoney(total);
        document.getElementById("result-area").style.display = "block";
    }
</script>

</body>
</html>
