<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 05</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .search-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        input {
            flex: 1;
        }
        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #2c3e50;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản lý sản phẩm</h2>

    <div class="search-group">
        <input type="text" id="searchName" placeholder="Tìm theo tên...">
        <select id="filterPrice">
            <option value="all">Tất cả giá</option>
            <option value="low">Dưới 1 triệu</option>
            <option value="high">Trên 1 triệu</option>
        </select>
        <button onclick="filterProducts()">Tìm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>Giá (VNĐ)</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody id="productTable">
        </tbody>
    </table>
</div>

<script>
    let products = [
        { name: "Điện thoại iPhone 15", price: 25000000, quantity: 10 },
        { name: "Laptop HP Pavilion", price: 15000000, quantity: 5 },
        { name: "Tai nghe Bluetooth", price: 500000, quantity: 50 },
        { name: "Bàn phím cơ", price: 1200000, quantity: 20 },
        { name: "Chuột không dây", price: 350000, quantity: 30 },
        { name: "Màn hình Monitor", price: 4500000, quantity: 8 },
        { name: "Webcam HD", price: 800000, quantity: 15 }
    ];

    function renderProducts(data) {
        let tableBody = document.getElementById("productTable");
        let html = "";
        
        data.forEach((product, index) => {
            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${product.name}</td>
                    <td>${product.price.toLocaleString('vi-VN')}</td>
                    <td>${product.quantity}</td>
                </tr>
            `;
        });
        
        tableBody.innerHTML = html;
    }

    window.onload = function() {
        renderProducts(products);
    };

    function filterProducts() {
        let searchName = document.getElementById("searchName").value.toLowerCase();
        let filterPrice = document.getElementById("filterPrice").value;

        let filtered = products.filter(p => 
            p.name.toLowerCase().includes(searchName)
        );

        if (filterPrice !== "all") {
            filtered = filtered.filter(p => {
                if (filterPrice === "low") return p.price < 1000000;
                if (filterPrice === "high") return p.price >= 1000000;
                return true;
            });
        }

        if (filtered.length === 0) {
            document.getElementById("productTable").innerHTML = 
                '<tr><td colspan="4" style="text-align:center;color:#999;">Không tìm thấy sản phẩm</td></tr>';
        } else {
            renderProducts(filtered);
        }
    }
</script>

</body>
</html>
