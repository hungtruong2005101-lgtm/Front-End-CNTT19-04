<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bài Lab 16 – Bộ Đếm Lượt Tương Tác</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .counter-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      padding: 40px 50px;
      text-align: center;
      width: 360px;
    }

    .counter-card h2 {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Vùng hiển thị số đếm */
    #display {
      font-size: 80px;
      font-weight: 700;
      color: #2196F3;          
      line-height: 1;
      margin-bottom: 30px;
      transition: color 0.3s ease;
    }

    #display.negative { color: #e53935; }  
    #display.zero     { color: #555;     } 

  
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .btn {
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.95); }

    #btnIncrease { background: #2196F3; color: #fff; }
    #btnDecrease { background: #e53935; color: #fff; }
    #btnReset    { background: #9e9e9e; color: #fff; }

   
    #btnFast {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #43a047;
      color: #fff;
      transition: transform 0.1s, opacity 0.2s;
    }
    #btnFast:active { transform: scale(0.98); }

  
    .option-row {
      margin-top: 20px;
      font-size: 13px;
      color: #777;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .option-row input { width: 16px; height: 16px; cursor: pointer; }
  </style>
</head>
<body>

<div class="counter-card">
  <h2>Bộ Đếm Lượt Tương Tác</h2>


  <div id="display">0</div>


  <div class="btn-group">
    <button class="btn" id="btnIncrease">Tăng</button>
    <button class="btn" id="btnDecrease">Giảm</button>
    <button class="btn" id="btnReset">Đặt lại</button>
  </div>

  <button id="btnFast">Tăng nhanh +10</button>


  <div class="option-row">
    <input type="checkbox" id="allowNegative" />
    <label for="allowNegative">Cho phép giá trị âm</label>
  </div>
</div>

<script>

  var count = 0;

 
  function updateDisplay() {
    $('#display').text(count);

  
    $('#display')
      .toggleClass('negative', count < 0)
      .toggleClass('zero',     count === 0)
      .toggleClass('positive', count > 0);
  }


  $('#btnIncrease').click(function () {
    count++;
    updateDisplay();
  });


  $('#btnDecrease').click(function () {
    var allowNeg = $('#allowNegative').is(':checked');
    if (!allowNeg && count <= 0) {
      alert('Không cho phép giá trị âm!\nHãy tích chọn "Cho phép giá trị âm" để tiếp tục giảm.');
      return;
    }
    count--;
    updateDisplay();
  });

  $('#btnReset').click(function () {
    count = 0;
    updateDisplay();
  });

  $('#btnFast').click(function () {
    count += 10;
    updateDisplay();
  });

  updateDisplay();
</script>

</body>
</html>
