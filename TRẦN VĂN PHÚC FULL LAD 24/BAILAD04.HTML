<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xử lý điểm sinh viên</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f8f9fa; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #007bff; }
        .form-inline { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: #007bff; color: white; }
        .btn-remove { background-color: #e0a800; color: white; }
        .btn-calc { background-color: #28a745; color: white; width: 100%; padding: 10px; margin-top: 10px; font-size: 16px; }
        button:hover { opacity: 0.9; }
        .output-box { margin-top: 20px; padding: 15px; background: #f1f3f5; border-left: 5px solid #28a745; border-radius: 4px; }
        ul { padding-left: 20px; }
        .badge { display: inline-block; padding: 3px 7px; font-size: 12px; font-weight: bold; color: white; border-radius: 4px; margin-left: 10px; }
        .yếu { background-color: #dc3545; }
        .trung-bình { background-color: #6c757d; }
        .khá { background-color: #17a2b8; }
        .giỏi { background-color: #28a745; }
        .error { color: red; font-size: 14px; margin-top: -15px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản Lý Điểm Sinh Viên</h2>
    
    <div class="form-inline">
        <input type="number" id="scoreInput" step="0.1" placeholder="Nhập điểm từ 0 đến 10..." min="0" max="10">
        <button class="btn-add" onclick="themDiem()">Thêm điểm</button>
    </div>
    <div id="errorMsg" class="error">Vui lòng nhập điểm số hợp lệ từ 0 đến 10!</div>

    <div class="form-inline">
        <button class="btn-remove" onclick="loaiBoDiemThapNhat()">Yêu cầu mở rộng: Loại bỏ điểm thấp nhất</button>
    </div>

    <div>
        <h3>Danh sách điểm hiện tại</h3>
        <ul id="scoreList"></ul>
    </div>

    <button class="btn-calc" onclick="tinhVaHienThiKetQua()">Tính tổng & Phân loại học lực</button>

    <div class="output-box" id="resultBox" style="display: none;">
        <p><b>Tổng số môn:</b> <span id="resCount">0</span></p>
        <p><b>Tổng điểm tích lũy:</b> <span id="resSum">0</span></p>
        <p><b>Điểm trung bình (ĐTB):</b> <span id="resAvg">0</span></p>
        <p><b>Xếp loại học lực chung:</b> <span id="resRank">Chưa xác định</span></p>
    </div>
</div>

<script>
// 1. Khai báo mảng mẫu ban đầu gồm ít nhất 5 giá trị số theo đề bài
let currentScores = [8.5, 6.5, 4.0, 9.2, 7.0];

// Hàm lấy class màu sắc dựa trên điểm số để hiển thị danh sách sinh động hơn
function layClassXepLoai(diem) {
    if (diem < 5.0) return 'yếu';
    if (diem < 6.5) return 'trung-bình';
    if (diem < 8.0) return 'khá';
    return 'giỏi';
}

function layTenXepLoai(diem) {
    if (diem < 5.0) return 'Yếu';
    if (diem < 6.5) return 'Trung bình';
    if (diem < 8.0) return 'Khá';
    return 'Giỏi';
}

// Hàm hiển thị danh sách điểm hiện tại lên giao diện
function capNhatDanhSachGiaoDien() {
    let scoreListUl = document.getElementById('scoreList');
    scoreListUl.innerHTML = ''; // Reset danh sách cũ

    currentScores.forEach((diem, index) => {
        let li = document.createElement('li');
        let xepLoai = layTenXepLoai(diem);
        let classLoai = layClassXepLoai(diem);
        
        li.innerHTML = `Môn ${index + 1}: <b>${diem.toFixed(1)}</b> <span class="badge ${classLoai}">${xepLoai}</span>`;
        scoreListUl.appendChild(li);
    });
}

// Yêu cầu mở rộng: Cho phép nhập thêm điểm mới
function themDiem() {
    let input = document.getElementById('scoreInput');
    let value = parseFloat(input.value);
    let errorMsg = document.getElementById('errorMsg');

    if (isNaN(value) || value < 0 || value > 10) {
        errorMsg.style.display = 'block';
        return;
    }
    errorMsg.style.display = 'none';

    currentScores.push(value); // Thêm vào mảng
    input.value = ''; // Reset input
    capNhatDanhSachGiaoDien(); // Vẽ lại giao diện
    document.getElementById('resultBox').style.display = 'none'; // Ẩn kết quả cũ
}

// Yêu cầu mở rộng: Loại bỏ điểm thấp nhất
function loaiBoDiemThapNhat() {
    if (currentScores.length === 0) {
        alert("Danh sách điểm trống!");
        return;
    }
    // Tìm giá trị nhỏ nhất trong mảng
    let minScore = Math.min(...currentScores);
    // Tìm vị trí của điểm thấp nhất đầu tiên tìm thấy
    let indexMin = currentScores.indexOf(minScore);
    
    if (indexMin > -1) {
        currentScores.splice(indexMin, 1); // Xóa phần tử đó khỏi mảng
        alert(`Đã xóa điểm thấp nhất là: ${minScore}`);
        capNhatDanhSachGiaoDien();
        document.getElementById('resultBox').style.display = 'none';
    }
}

// 2 & 3. Tính toán và phân loại
function tinhVaHienThiKetQua() {
    if (currentScores.length === 0) {
        alert("Không có dữ liệu điểm để tính toán!");
        return;
    }

    // Dùng vòng lặp forEach để tính tổng điểm
    let totalSum = 0;
    currentScores.forEach(score => {
        totalSum += score;
    });

    // Tính điểm trung bình môn học
    let averageScore = totalSum / currentScores.length;

    // 4. Trình bày kết quả cuối cùng dưới dạng dễ đọc
    document.getElementById('resCount').innerText = currentScores.length;
    document.getElementById('resSum').innerText = totalSum.toFixed(1);
    document.getElementById('resAvg').innerText = averageScore.toFixed(2);
    
    let textRank = layTenXepLoai(averageScore);
    let classRank = layClassXepLoai(averageScore);
    
    let rankSpan = document.getElementById('resRank');
    rankSpan.innerText = textRank;
    rankSpan.className = `badge ${classRank}`;

    document.getElementById('resultBox').style.display = 'block';
}

// Tự động chạy lần đầu để hiển thị mảng điểm mẫu ban đầu
capNhatDanhSachGiaoDien();
</script>

</body>
</html>
