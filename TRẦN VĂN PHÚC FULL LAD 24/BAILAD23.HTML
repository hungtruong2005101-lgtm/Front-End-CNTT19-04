<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lab 23 - Danh sách sản phẩm</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f5f5f5;
        }

        .card{
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-5px);
        }

        .product-img{
            height: 220px;
            object-fit: cover;
        }

        .price{
            color: red;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">
            Danh sách sản phẩm
        </h1>

        <div class="row g-4">

            <!-- Sản phẩm 1 -->
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card shadow rounded h-100">

                    <img src="https://picsum.photos/300/220?1"
                         class="card-img-top product-img">

                    <div class="card-body text-center">

                        <span class="badge bg-danger mb-2">
                            Giảm giá
                        </span>

                        <h5 class="card-title">
                            Tai nghe Bluetooth
                        </h5>

                        <p class="price">
                            499.000đ
                        </p>

                        <button class="btn btn-primary">
                            Mua ngay
                        </button>

                    </div>
                </div>
            </div>

            <!-- Sản phẩm 2 -->
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card shadow rounded h-100">

                    <img src="https://picsum.photos/300/220?2"
                         class="card-img-top product-img">

                    <div class="card-body text-center">

                        <h5 class="card-title">
                            Đồng hồ thông minh
                        </h5>

                        <p class="price">
                            1.299.000đ
                        </p>

                        <button class="btn btn-success">
                            Mua ngay
                        </button>

                    </div>
                </div>
            </div>

            <!-- Sản phẩm 3 -->
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card shadow rounded h-100">

                    <img src="https://picsum.photos/300/220?3"
                         class="card-img-top product-img">

                    <div class="card-body text-center">

                        <span class="badge bg-warning text-dark mb-2">
                            Hot
                        </span>

                        <h5 class="card-title">
                            Laptop Gaming
                        </h5>

                        <p class="price">
                            19.999.000đ
                        </p>

                        <button class="btn btn-dark">
                            Mua ngay
                        </button>

                    </div>
                </div>
            </div>

            <!-- Sản phẩm 4 -->
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card shadow rounded h-100">

                    <img src="https://picsum.photos/300/220?4"
                         class="card-img-top product-img">

                    <div class="card-body text-center">

                        <h5 class="card-title">
                            Điện thoại iPhone
                        </h5>

                        <p class="price">
                            24.500.000đ
                        </p>

                        <button class="btn btn-primary">
                            Mua ngay
                        </button>

                    </div>
                </div>
            </div>

            <!-- Sản phẩm 5 -->
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card shadow rounded h-100">

                    <img src="https://picsum.photos/300/220?5"
                         class="card-img-top product-img">

                    <div class="card-body text-center">

                        <span class="badge bg-success mb-2">
                            Mới
                        </span>

                        <h5 class="card-title">
                            Camera mini
                        </h5>

                        <p class="price">
                            2.199.000đ
                        </p>

                        <button class="btn btn-success">
                            Mua ngay
                        </button>

                    </div>
                </div>
            </div>

            <!-- Sản phẩm 6 -->
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card shadow rounded h-100">

                    <img src="https://picsum.photos/300/220?6"
                         class="card-img-top product-img">

                    <div class="card-body text-center">

                        <h5 class="card-title">
                            Loa Bluetooth
                        </h5>

                        <p class="price">
                            799.000đ
                        </p>

                        <button class="btn btn-danger">
                            Mua ngay
                        </button>

                    </div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
