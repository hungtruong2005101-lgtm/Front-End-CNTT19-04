<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 16 - jQuery Bộ đếm</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <h2>Bộ đếm lượt tương tác (jQuery)</h2>

  <div id="display" style="font-size:48px; font-weight:bold; margin:16px 0">0</div>

  <button id="btnGiam">- Giảm</button>
  <button id="btnTang">+ Tăng</button>
  <button id="btnNhanh">++ Tăng nhanh (+10)</button>
  <button id="btnDatLai">Đặt lại</button>

  <script>
    let count = 0;

    function render() {
      $("#display").text(count);
      if (count > 0)      $("#display").css("color", "green");
      else if (count < 0) $("#display").css("color", "red");
      else                $("#display").css("color", "black");
    }

    $("#btnTang").click(function ()  { count++;   render(); });
    $("#btnGiam").click(function ()  { count--;   render(); });
    $("#btnNhanh").click(function () { count+=10; render(); });
    $("#btnDatLai").click(function (){ count = 0; render(); });

    render();
  </script>
</body>
</html>
