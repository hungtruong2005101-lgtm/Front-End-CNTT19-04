<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tính BMI</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .container{
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        h1{
            margin-bottom: 20px;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button{
            padding: 10px 20px;
            border: none;
            background: blue;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        #result{
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>TÍNH CHỈ SỐ BMI</h1>

        <input type="number" id="height"
            placeholder="Nhập chiều cao (m)">

        <input type="number" id="weight"
            placeholder="Nhập cân nặng (kg)">

        <button onclick="calculateBMI()">
            Tính BMI
        </button>

        <div id="result"></div>

    </div>

    <script>

        function calculateBMI(){

            let height =
                Number(document.getElementById("height").value);

            let weight =
                Number(document.getElementById("weight").value);

            let result =
                document.getElementById("result");


            if(height <= 0 || weight <= 0){

                result.innerHTML =
                    "Vui lòng nhập dữ liệu hợp lệ";

                result.style.color = "red";

                return;
            }


            let bmi = weight / (height * height);

            bmi = bmi.toFixed(2);

            let message = "";

            if(bmi < 18.5){

                message = "Gầy";

                result.style.color = "orange";

            }
            else if(bmi < 25){

                message = "Bình thường";

                result.style.color = "green";

            }
            else if(bmi < 30){

                message = "Thừa cân";

                result.style.color = "blue";

            }
            else{

                message = "Béo phì";

                result.style.color = "red";
            }

            result.innerHTML =
                `BMI: ${bmi} <br> Phân loại: ${message}`;
        }

    </script>

</body>
</html>
