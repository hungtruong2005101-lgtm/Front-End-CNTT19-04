<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lab 21 - CRUD Ajax</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
    font-family: Arial;
    background: #f2f2f2;
    padding: 30px;
}

.container{
    width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h1{
    text-align: center;
    margin-bottom: 20px;
}

input{
    padding: 10px;
    margin: 5px;
    width: 200px;
}

button{
    padding: 10px 15px;
    cursor: pointer;
}

table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

table th,
table td{
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

table th{
    background: #2196f3;
    color: white;
}

.edit-btn{
    background: orange;
    border: none;
    color: white;
}

.delete-btn{
    background: red;
    border: none;
    color: white;
}

</style>

</head>
<body>

<div class="container">

    <h1>Quản Lý Sinh Viên</h1>

    <input type="hidden" id="studentId">

    <input type="text" id="name" placeholder="Nhập tên">

    <input type="number" id="age" placeholder="Nhập tuổi">

    <input type="email" id="email" placeholder="Nhập email">

    <button onclick="saveStudent()">
        Lưu
    </button>

    <table>

        <thead>

            <tr>
                <th>Tên</th>
                <th>Tuổi</th>
                <th>Email</th>
                <th>Hành động</th>
            </tr>

        </thead>

        <tbody id="studentList">

        </tbody>

    </table>

</div>

<script>

const API_URL =
"https://6a1843d91878294b597cb585.mockapi.io/api/v1/students";



function loadStudents(){

    $.ajax({

        url: API_URL,
        method: "GET",

        success: function(data){

            $("#studentList").html("");

            data.forEach(student => {

                $("#studentList").append(`

                    <tr>

                        <td>${student.name}</td>

                        <td>${student.age}</td>

                        <td>${student.email}</td>

                        <td>

                            <button
                                class="edit-btn"

                                onclick="editStudent(
                                    '${student.id}',
                                    '${student.name}',
                                    '${student.age}',
                                    '${student.email}'
                                )"
                            >
                                Sửa
                            </button>

                            <button
                                class="delete-btn"

                                onclick="deleteStudent('${student.id}')"
                            >
                                Xóa
                            </button>

                        </td>

                    </tr>

                `);

            });

        }

    });

}


function saveStudent(){

    let id = $("#studentId").val();

    let student = {

        name: $("#name").val(),
        age: $("#age").val(),
        email: $("#email").val()

    };



    if(
        student.name === "" ||
        student.age === "" ||
        student.email === ""
    ){

        alert("Vui lòng nhập đầy đủ!");

        return;

    }


    if(id === ""){

        $.ajax({

            url: API_URL,
            method: "POST",
            data: student,

            success: function(){

                loadStudents();

                clearForm();

            }

        });

    }

    else{

        $.ajax({

            url: `${API_URL}/${id}`,
            method: "PUT",
            data: student,

            success: function(){

                loadStudents();

                clearForm();

            }

        });

    }

}



function editStudent(id,name,age,email){

    $("#studentId").val(id);

    $("#name").val(name);

    $("#age").val(age);

    $("#email").val(email);

}


function deleteStudent(id){

    if(confirm("Bạn có chắc muốn xóa?")){

        $.ajax({

            url: `${API_URL}/${id}`,
            method: "DELETE",

            success: function(){

                loadStudents();

            }

        });

    }

}



function clearForm(){

    $("#studentId").val("");

    $("#name").val("");

    $("#age").val("");

    $("#email").val("");

}


loadStudents();

</script>

</body>
</html>
