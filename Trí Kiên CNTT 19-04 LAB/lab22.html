<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài lab 22 - Login Form Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow border-0 p-4">
    <div class="card-body">
    <h3 class="card-title text-center mb-4 text-primary">ĐĂNG NHẬP</h3>
    <form>
        <div class="mb-3">
        <label for="loginEmail" class="form-label font-weight-bold">Địa chỉ Email</label>
        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
    </div>
        <div class="mb-3">
        <label for="loginPassword" class="form-label">Mật khẩu</label>
        <input type="password" class="form-control" id="loginPassword" placeholder="Nhập mật khẩu" required>
    </div>
    <div class="mb-3 d-flex justify-content-between align-items-center">
    <div class="form-check">
    <input type="checkbox" class="form-check-input" id="rememberMe">
    <label class="form-check-label" for="rememberMe" style="font-size: 0.9em;">Ghi nhớ</label>
    </div>
    <a href="#" class="text-decoration-none" style="font-size: 0.9em;">Quên mật khẩu?</a>
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Đăng nhập ngay</button>
    </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
