<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài Lab 21 - Hệ thống CRUD Sinh Viên</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body class="bg-light">
    <div class="container-fluid px-4 mt-5">
      <div class="row">
        <div class="col-lg-4 mb-4">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3">
              <h5 class="mb-0" id="formTitle">
                <i class="bi bi-person-plus-fill"></i> Thêm Sinh Viên Mới
              </h5>
            </div>
            <div class="card-body">
              <form id="crudForm" novalidate>
                <input type="hidden" id="studentId" name="id" />

                <div class="mb-3">
                  <label class="form-label fw-bold">Họ và Tên</label>
                  <input
                    type="text"
                    class="form-control"
                    id="txtName"
                    name="name"
                    required
                    placeholder="Nguyễn Văn A"
                  />
                  <div class="invalid-feedback">
                    Họ tên không được để trống.
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="txtEmail"
                    name="email"
                    required
                    placeholder="name@example.com"
                  />
                  <div class="invalid-feedback">
                    Email không đúng định dạng.
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold"
                    >Đường dẫn ảnh đại diện</label
                  >
                  <input
                    type="url"
                    class="form-control"
                    id="txtAvatar"
                    name="avatar"
                    required
                    placeholder="https://..."
                  />
                  <div class="invalid-feedback">
                    Vui lòng nhập link ảnh hợp lệ.
                  </div>
                </div>

                <div class="d-flex gap-2">
                  <button
                    type="submit"
                    id="btnSubmit"
                    class="btn btn-primary flex-grow-1"
                  >
                    <span id="btnText">Lưu lại</span>
                  </button>
                  <button
                    type="button"
                    id="btnCancel"
                    class="btn btn-secondary d-none"
                  >
                    Hủy bỏ
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div
              class="card-header bg-dark text-white py-3 d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3"
            >
              <h5 class="mb-0">
                <i class="bi bi-person-lines-fill"></i> Danh Sách Sinh Viên
              </h5>

              <div
                class="position-relative style-search"
                style="min-width: 280px"
              >
                <input
                  type="text"
                  id="txtSearch"
                  class="form-control form-control-sm ps-4"
                  placeholder="Tìm kiếm theo tên..."
                />
                <i
                  class="bi bi-search position-absolute top-50 start-2 translate-middle-y text-muted"
                  style="left: 10px"
                ></i>
              </div>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th style="width: 8%">ID</th>
                      <th style="width: 12%">Ảnh</th>
                      <th style="width: 30%">Họ và Tên</th>
                      <th style="width: 30%">Email</th>
                      <th style="width: 20%" class="text-center">Thao tác</th>
                    </tr>
                  </thead>
                  <tbody id="studentGrid"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
