<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài Lab 20 - Thêm mới dữ liệu với Ajax POST</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row">
        <div class="col-md-4 mb-4">
          <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0">Thêm Sinh Viên Mới</h5>
            </div>
            <div class="card-body">
              <div id="formAlert" class="alert d-none" role="alert"></div>

              <form id="studentForm" novalidate>
                <div class="mb-3">
                  <label for="txtName" class="form-label">Họ và Tên</label>
                  <input
                    type="text"
                    class="form-control"
                    id="txtName"
                    name="name"
                    placeholder="Nguyễn Văn A"
                  />
                  <div class="invalid-feedback">Vui lòng nhập họ và tên.</div>
                </div>

                <div class="mb-3">
                  <label for="txtEmail" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="txtEmail"
                    name="email"
                    placeholder="name@example.com"
                  />
                  <div class="invalid-feedback">
                    Vui lòng nhập đúng định dạng Email.
                  </div>
                </div>

                <div class="mb-3">
                  <label for="txtAvatar" class="form-label"
                    >Đường dẫn ảnh (URL)</label
                  >
                  <input
                    type="url"
                    class="form-control"
                    id="txtAvatar"
                    name="avatar"
                    placeholder="https://api.dicebear.com/7.x/avatar.svg"
                  />
                  <div class="invalid-feedback">
                    Vui lòng nhập link ảnh hợp lệ.
                  </div>
                </div>

                <button
                  type="submit"
                  id="btnSubmit"
                  class="btn btn-primary w-100"
                >
                  <span
                    id="btnSpinner"
                    class="spinner-border spinner-border-sm d-none"
                    role="status"
                  ></span>
                  <span id="btnText">Thêm Thành Viên</span>
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card shadow-sm">
            <div
              class="card-header bg-dark text-white d-flex justify-content-between align-items-center"
            >
              <h5 class="mb-0">Danh Sách Thành Viên</h5>
              <span class="badge bg-secondary" id="totalStudents">0</span>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>ID</th>
                      <th>Ảnh</th>
                      <th>Họ và Tên</th>
                      <th>Email</th>
                    </tr>
                  </thead>
                  <tbody id="studentList"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
