<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài Lab 19 - Danh sách sinh viên (Ajax)</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .loading-spinner {
        display: none;
      }
      .error-message {
        display: none;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow-sm">
        <div
          class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0">Quản Lý Sinh Viên</h5>
          <button id="btnFetch" class="btn btn-light btn-sm">
            Tải lại dữ liệu
          </button>
        </div>
        <div class="card-body">
          <div id="loading" class="loading-spinner text-center my-4">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">
              Đang tải dữ liệu từ Server, vui lòng đợi...
            </p>
          </div>

          <div id="error" class="error-message alert alert-danger" role="alert">
            Đã xảy ra lỗi khi kết nối với máy chủ. Vui lòng thử lại sau!
          </div>

          <div class="table-responsive">
            <table
              class="table table-hover table-striped align-middle mb-0"
              id="studentTable"
            >
              <thead class="table-dark">
                <tr>
                  <th scope="col" style="width: 10%">ID</th>
                  <th scope="col" style="width: 20%">Ảnh đại diện</th>
                  <th scope="col" style="width: 35%">Họ và Tên</th>
                  <th scope="col" style="width: 35%">Email</th>
                </tr>
              </thead>
              <tbody id="studentData"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
