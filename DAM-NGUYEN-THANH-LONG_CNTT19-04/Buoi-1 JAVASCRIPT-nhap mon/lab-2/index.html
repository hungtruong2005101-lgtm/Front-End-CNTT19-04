<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài Lab 01 - Tính Chỉ Số BMI</title>
    <style>
      :root {
        --bg-color: #f4f7f6;
        --card-bg: #ffffff;
        --primary-color: #4a90e2;
        --text-color: #333333;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .container {
        background-color: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }

      h2 {
        text-align: center;
        margin-bottom: 24px;
        color: #2c3e50;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
      }

      input[type="number"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      input[type="number"]:focus {
        border-color: var(--primary-color);
        outline: none;
      }

      button {
        width: 100%;
        padding: 14px;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #357abd;
      }

      /* Vùng hiển thị kết quả */
      #result-box {
        margin-top: 24px;
        padding: 15px;
        border-radius: 6px;
        text-align: center;
        display: none; /* Ẩn khi chưa tính toán */
        font-weight: bold;
        transition: all 0.3s ease;
      }

      /* Các màu sắc động cho yêu cầu mở rộng */
      .status-error {
        background-color: #ffebee;
        color: #c62828;
        border: 1px solid #ffcdd2;
      }
      .status-underweight {
        background-color: #fff9c4;
        color: #f57f17;
        border: 1px solid #fff59d;
      }
      .status-normal {
        background-color: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #c8e6c9;
      }
      .status-overweight {
        background-color: #ffe0b2;
        color: #ef6c00;
        border: 1px solid #ffe0b2;
      }
      .status-obese {
        background-color: #ffebee;
        color: #d32f2f;
        border: 1px solid #ffcdcd;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Tính Chỉ Số BMI</h2>

      <div class="form-group">
        <label for="height">Chiều cao (mét):</label>
        <input
          type="number"
          id="height"
          step="0.01"
          placeholder="Ví dụ: 1.65"
          min="0"
        />
      </div>

      <div class="form-group">
        <label for="weight">Cân nặng (kg):</label>
        <input
          type="number"
          id="weight"
          step="0.1"
          placeholder="Ví dụ: 55"
          min="0"
        />
      </div>

      <button id="btn-calculate">Tính toán BMI</button>

      <div id="result-box"></div>
    </div>

    <script>
      document
        .getElementById("btn-calculate")
        .addEventListener("click", function () {
          // 1. Lấy dữ liệu và ép kiểu sang số thực (Yêu cầu 1 & Hướng dẫn 2)
          const heightInput = document.getElementById("height").value;
          const weightInput = document.getElementById("weight").value;

          const height = Number(heightInput);
          const weight = Number(weightInput);

          const resultBox = document.getElementById("result-box");

          // Reset class hiển thị kết quả cũ
          resultBox.className = "";
          resultBox.style.display = "block";

          // 2. Yêu cầu mở rộng: Kiểm tra dữ liệu trống, dữ liệu âm hoặc bằng 0
          if (heightInput.trim() === "" || weightInput.trim() === "") {
            resultBox.innerHTML = "Vui lòng nhập đầy đủ chiều cao và cân nặng!";
            resultBox.classList.add("status-error");
            return;
          }

          if (height <= 0 || weight <= 0) {
            resultBox.innerHTML = "Giá trị nhập vào phải lớn hơn 0!";
            resultBox.classList.add("status-error");
            return;
          }

          // 3. Tính toán BMI và làm tròn đến 2 chữ số thập phân (Yêu cầu 2)
          const bmi = (weight / (height * height)).toFixed(2);

          let classification = "";
          let statusClass = "";

          // 4. Phân loại cấu trúc điều kiện (Yêu cầu 3 & Hướng dẫn 3)
          if (bmi < 18.5) {
            classification = "Gầy";
            statusClass = "status-underweight";
          } else if (bmi >= 18.5 && bmi < 23) {
            classification = "Bình thường";
            statusClass = "status-normal";
          } else if (bmi >= 23 && bmi < 25) {
            classification = "Thừa cân";
            statusClass = "status-overweight";
          } else {
            classification = "Béo phì";
            statusClass = "status-obese";
          }

          // 5. Hiển thị kết quả & Đổi màu sắc theo phân loại (Yêu cầu 4 & Yêu cầu mở rộng)
          resultBox.innerHTML = `Chỉ số BMI của bạn: ${bmi}<br>Phân loại: ${classification}`;
          resultBox.classList.add(statusClass);
        });
    </script>
  </body>
</html>
