<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính khuyến mãi đơn hàng</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #218838;
        }

        #ketqua{
            margin-top: 20px;
            line-height: 1.8;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Tính khuyến mãi</h2>

    <label>Giá trị đơn hàng:</label>
    <input type="number" id="donhang" placeholder="Nhập số tiền">

    <label>Hạng thành viên:</label>
    <select id="thanhvien">
        <option value="0">Thường</option>
        <option value="5">Bạc (+5%)</option>
        <option value="10">Vàng (+10%)</option>
    </select>

    <button onclick="tinhKhuyenMai()">
        Tính thanh toán
    </button>

    <div id="ketqua"></div>

</div>

<script>

function tinhKhuyenMai(){

    // Lấy dữ liệu
    let donHang = Number(document.getElementById("donhang").value);
    let thanhVien = Number(document.getElementById("thanhvien").value);

    // Kiểm tra dữ liệu
    if(donHang <= 0){
        document.getElementById("ketqua").innerHTML =
            "Vui lòng nhập giá trị hợp lệ!";
        return;
    }

    // Khuyến mãi theo đơn hàng
    let giamGia = 0;

    if(donHang >= 5000000){
        giamGia = 20;
    }
    else if(donHang >= 2000000){
        giamGia = 15;
    }
    else if(donHang >= 1000000){
        giamGia = 10;
    }
    else{
        giamGia = 5;
    }

    // Cộng ưu đãi thành viên
    giamGia += thanhVien;

    // Tính tiền giảm
    let tienGiam = donHang * giamGia / 100;

    // Tổng thanh toán
    let thanhToan = donHang - tienGiam;

    // Format tiền VNĐ
    let formatTien = new Intl.NumberFormat('vi-VN');

    // Hiển thị kết quả
    document.getElementById("ketqua").innerHTML = `
        Tiền gốc: ${formatTien.format(donHang)} VNĐ <br>
        Tỷ lệ giảm: ${giamGia}% <br>
        Số tiền giảm: ${formatTien.format(tienGiam)} VNĐ <br>
        Tổng thanh toán: ${formatTien.format(thanhToan)} VNĐ
    `;
}

</script>

</body>
</html>
