<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Danh sách sản phẩm Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background-color: #f2f2f2;
        }

        .card img{
            height: 220px;
            object-fit: cover;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <!-- Tiêu đề -->
    <h2 class="text-center mb-5">
        Danh sách sản phẩm
    </h2>

    <!-- Grid sản phẩm -->
    <div class="row g-4">

        <!-- Sản phẩm 1 -->
        <div class="col-12 col-sm-6 col-lg-4">

            <div class="card h-100 shadow">

                <img
                    src="https://picsum.photos/300/220?1"
                    class="card-img-top"
                    alt="Sản phẩm"
                >

                <div class="card-body">

                    <span class="badge bg-danger mb-2">
                        Giảm giá
                    </span>

                    <h5 class="card-title">
                        Laptop Gaming
                    </h5>

                    <p class="card-text text-primary fw-bold">
                        25.000.000 VNĐ
                    </p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>

            </div>

        </div>

        <!-- Sản phẩm 2 -->
        <div class="col-12 col-sm-6 col-lg-4">

            <div class="card h-100 shadow">

                <img
                    src="https://picsum.photos/300/220?2"
                    class="card-img-top"
                    alt="Sản phẩm"
                >

                <div class="card-body">

                    <span class="badge bg-success mb-2">
                        Mới
                    </span>

                    <h5 class="card-title">
                        Điện thoại
                    </h5>

                    <p class="card-text text-primary fw-bold">
                        15.000.000 VNĐ
                    </p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>

            </div>

        </div>

        <!-- Sản phẩm 3 -->
        <div class="col-12 col-sm-6 col-lg-4">

            <div class="card h-100 shadow">

                <img
                    src="https://picsum.photos/300/220?3"
                    class="card-img-top"
                    alt="Sản phẩm"
                >

                <div class="card-body">

                    <span class="badge bg-warning text-dark mb-2">
                        Hot
                    </span>

                    <h5 class="card-title">
                        Tai nghe Bluetooth
                    </h5>

                    <p class="card-text text-primary fw-bold">
                        1.200.000 VNĐ
                    </p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>

            </div>

        </div>

        <!-- Sản phẩm 4 -->
        <div class="col-12 col-sm-6 col-lg-4">

            <div class="card h-100 shadow">

                <img
                    src="https://picsum.photos/300/220?4"
                    class="card-img-top"
                    alt="Sản phẩm"
                >

                <div class="card-body">

                    <h5 class="card-title">
                        Bàn phím cơ
                    </h5>

                    <p class="card-text text-primary fw-bold">
                        2.000.000 VNĐ
                    </p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>

            </div>

        </div>

        <!-- Sản phẩm 5 -->
        <div class="col-12 col-sm-6 col-lg-4">

            <div class="card h-100 shadow">

                <img
                    src="https://picsum.photos/300/220?5"
                    class="card-img-top"
                    alt="Sản phẩm"
                >

                <div class="card-body">

                    <h5 class="card-title">
                        Chuột Gaming
                    </h5>

                    <p class="card-text text-primary fw-bold">
                        800.000 VNĐ
                    </p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>

            </div>

        </div>

        <!-- Sản phẩm 6 -->
        <div class="col-12 col-sm-6 col-lg-4">

            <div class="card h-100 shadow">

                <img
                    src="https://picsum.photos/300/220?6"
                    class="card-img-top"
                    alt="Sản phẩm"
                >

                <div class="card-body">

                    <span class="badge bg-info mb-2">
                        Best Seller
                    </span>

                    <h5 class="card-title">
                        Màn hình 24 inch
                    </h5>

                    <p class="card-text text-primary fw-bold">
                        4.500.000 VNĐ
                    </p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
