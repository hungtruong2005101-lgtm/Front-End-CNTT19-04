<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Form Đăng Nhập Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background-color: #f2f2f2;
        }

        .login-box{
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

    <!-- Container -->
    <div class="container">

        <!-- Row -->
        <div class="row justify-content-center align-items-center vh-100">

            <!-- Col -->
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                <div class="login-box">

                    <h2 class="text-center mb-4">
                        Đăng nhập
                    </h2>

                    <!-- Form -->
                    <form>

                        <!-- Email -->
                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                placeholder="Nhập email"
                            >

                        </div>

                        <!-- Password -->
                        <div class="mb-3">

                            <label class="form-label">
                                Mật khẩu
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                placeholder="Nhập mật khẩu"
                            >

                        </div>

                        <!-- Remember -->
                        <div class="form-check mb-3">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="remember"
                            >

                            <label
                                class="form-check-label"
                                for="remember"
                            >
                                Ghi nhớ đăng nhập
                            </label>

                        </div>

                        <!-- Button -->
                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Đăng nhập
                        </button>

                    </form>

                    <!-- Quên mật khẩu -->
                    <div class="text-center mt-3">

                        <a href="#">
                            Quên mật khẩu?
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
