<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Sinh Viên</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 30px;
        }

        .container{
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        form{
            display: grid;
            grid-template-columns: repeat(3, 1fr) auto;
            gap: 10px;
            margin-bottom: 20px;
        }

        input{
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            padding: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .btn-save{
            background-color: #007bff;
        }

        .btn-edit{
            background-color: #ff9800;
        }

        .btn-delete{
            background-color: #dc3545;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td{
            border: 1px solid #ccc;
        }

        th, td{
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: #007bff;
            color: white;
        }

        .message{
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .success{
            color: green;
        }

        .error{
            color: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Quản lý sinh viên CRUD</h2>

    <!-- Thông báo -->
    <div class="message" id="message"></div>

    <!-- Form -->
    <form id="studentForm">

        <input
            type="text"
            id="name"
            placeholder="Tên sinh viên"
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
        >

        <input
            type="text"
            id="className"
            placeholder="Lớp"
        >

        <button type="submit" class="btn-save">
            Lưu
        </button>

    </form>

    <!-- Bảng dữ liệu -->
    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Lớp</th>
                <th>Hành động</th>
            </tr>

        </thead>

        <tbody id="studentTable"></tbody>

    </table>

</div>

<script>

    // API MockAPI
    const apiUrl =
        "https://YOUR_API.mockapi.io/students";

    // ID đang sửa
    let editId = null;

    // Hàm tải dữ liệu
    function loadStudents(){

        $.ajax({

            url: apiUrl,

            method: "GET",

            success: function(data){

                let html = "";

                data.forEach(function(student){

                    html += `

                        <tr>

                            <td>${student.id}</td>

                            <td>${student.name}</td>

                            <td>${student.email}</td>

                            <td>${student.className}</td>

                            <td>

                                <button
                                    class="btn-edit"
                                    onclick="editStudent(
                                        '${student.id}',
                                        '${student.name}',
                                        '${student.email}',
                                        '${student.className}'
                                    )"
                                >
                                    Sửa
                                </button>

                                <button
                                    class="btn-delete"
                                    onclick="deleteStudent('${student.id}')"
                                >
                                    Xóa
                                </button>

                            </td>

                        </tr>

                    `;

                });

                $("#studentTable").html(html);

            }

        });

    }

    // Tải dữ liệu ban đầu
    loadStudents();

    // Submit form
    $("#studentForm").submit(function(event){

        event.preventDefault();

        let name =
            $("#name").val().trim();

        let email =
            $("#email").val().trim();

        let className =
            $("#className").val().trim();

        // Kiểm tra dữ liệu
        if(name === "" || email === "" || className === ""){

            $("#message")
                .removeClass("success")
                .addClass("error")
                .text("Vui lòng nhập đầy đủ thông tin!");

            return;

        }

        // Object sinh viên
        let student = {

            name: name,
            email: email,
            className: className

        };

        // Nếu đang sửa
        if(editId){

            $.ajax({

                url: `${apiUrl}/${editId}`,

                method: "PUT",

                contentType: "application/json",

                data: JSON.stringify(student),

                success: function(){

                    $("#message")
                        .removeClass("error")
                        .addClass("success")
                        .text("Cập nhật thành công!");

                    $("#studentForm")[0].reset();

                    editId = null;

                    loadStudents();

                }

            });

        }

        // Nếu thêm mới
        else{

            $.ajax({

                url: apiUrl,

                method: "POST",

                contentType: "application/json",

                data: JSON.stringify(student),

                success: function(){

                    $("#message")
                        .removeClass("error")
                        .addClass("success")
                        .text("Thêm sinh viên thành công!");

                    $("#studentForm")[0].reset();

                    loadStudents();

                }

            });

        }

    });

    // Hàm sửa
    function editStudent(id, name, email, className){

        $("#name").val(name);

        $("#email").val(email);

        $("#className").val(className);

        editId = id;

    }

    // Hàm xóa
    function deleteStudent(id){

        if(confirm("Bạn có chắc muốn xóa?")){

            $.ajax({

                url: `${apiUrl}/${id}`,

                method: "DELETE",

                success: function(){

                    $("#message")
                        .removeClass("error")
                        .addClass("success")
                        .text("Xóa thành công!");

                    loadStudents();

                }

            });

        }

    }

</script>

</body>
</html>
