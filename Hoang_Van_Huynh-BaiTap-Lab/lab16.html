<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 16 - Bộ đếm jQuery</title>

    <!-- NHÚNG JQUERY -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container{
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            color: #333;
            margin-bottom: 30px;
        }

        #counter{
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .buttons{
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        button{
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        button:hover{
            transform: scale(1.05);
        }

        .plus{
            background: #28a745;
        }

        .minus{
            background: #dc3545;
        }

        .reset{
            background: #007bff;
        }

        .plus10{
            background: #ff9800;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🎮 BỘ ĐẾM TƯƠNG TÁC</h1>

        <div id="counter">0</div>

        <div class="buttons">

            <button class="plus">+1</button>

            <button class="minus">-1</button>

            <button class="reset">Reset</button>

            <button class="plus10">+10</button>

        </div>

    </div>

    <script>

        // ==========================
        // BIẾN TRẠNG THÁI
        // ==========================

        let count = 0;

        // ==========================
        // HÀM CẬP NHẬT GIAO DIỆN
        // ==========================

        function updateCounter(){

            // Hiển thị số
            $("#counter").text(count);

            // Đổi màu theo giá trị
            if(count > 0){

                $("#counter").css("color","green");

            }
            else if(count < 0){

                $("#counter").css("color","red");

            }
            else{

                $("#counter").css("color","black");

            }

        }

        // ==========================
        // NÚT +1
        // ==========================

        $(".plus").click(function(){

            count++;

            updateCounter();

        });

        // ==========================
        // NÚT -1
        // ==========================

        $(".minus").click(function(){

            count--;

            updateCounter();

        });

        // ==========================
        // NÚT RESET
        // ==========================

        $(".reset").click(function(){

            count = 0;

            updateCounter();

        });

        // ==========================
        // NÚT +10
        // ==========================

        $(".plus10").click(function(){

            count += 10;

            updateCounter();

        });

    </script>

</body>
</html>
