<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 10 - Fetch API</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(135deg,#667eea,#764ba2);
            margin: 0;
            padding: 30px;
        }

        h1{
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .container{
            max-width: 1000px;
            margin: auto;
        }

        .users{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap: 20px;
        }

        .card{
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-5px);
        }

        .card h2{
            color: #333;
            margin-bottom: 10px;
        }

        .card p{
            margin: 8px 0;
            color: #555;
        }

        #loading{
            text-align: center;
            color: white;
            font-size: 22px;
            margin-bottom: 20px;
        }

        #error{
            text-align: center;
            color: yellow;
            font-size: 20px;
            margin-bottom: 20px;
        }

    </style>
</head>

<body>

    <h1>📋 DANH SÁCH NGƯỜI DÙNG</h1>

    <div class="container">

        <div id="loading">
            ⏳ Đang tải dữ liệu...
        </div>

        <div id="error"></div>

        <div class="users" id="users"></div>

    </div>

    <script>

        // ============================
        // HÀM LẤY DỮ LIỆU API
        // ============================

        async function layDuLieu(){

            try{

                // Gọi API
                const response = await fetch(
                    "https://jsonplaceholder.typicode.com/users"
                );

                // Chuyển dữ liệu sang JSON
                const data = await response.json();

                // Ẩn loading
                document.getElementById("loading").style.display = "none";

                // Hiển thị dữ liệu
                hienThiDanhSach(data);

            }
            catch(error){

                document.getElementById("loading").style.display = "none";

                document.getElementById("error").innerHTML =
                    "❌ Không thể tải dữ liệu!";
            }

        }

        // ============================
        // HÀM HIỂN THỊ DỮ LIỆU
        // ============================

        function hienThiDanhSach(users){

            const danhSach = document.getElementById("users");

            users.forEach(function(user){

                danhSach.innerHTML += `

                    <div class="card">

                        <h2>👤 ${user.name}</h2>

                        <p><b>Email:</b> ${user.email}</p>

                        <p><b>SĐT:</b> ${user.phone}</p>

                        <p><b>Website:</b> ${user.website}</p>

                    </div>

                `;

            });

        }

        // ============================
        // CHẠY CHƯƠNG TRÌNH
        // ============================

        layDuLieu();

    </script>

</body>
</html>
