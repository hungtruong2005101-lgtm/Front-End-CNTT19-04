<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 21: Hệ thống CRUD Hoàn Chỉnh với Ajax</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f7f6; }
        .container { max-width: 1100px; margin: 0 auto; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        
        .wrapper { display: flex; gap: 20px; }
        .col-form { flex: 1; }
        .col-list { flex: 2; }
        
        /* Form Card */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: sticky; top: 20px; }
        .card-title { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; color: #007bff; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-control { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Nút bấm */
        .btn { padding: 9px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-add { background-color: #28a745; color: white; width: 100%; }
        .btn-update { background-color: #ffc107; color: black; width: 100%; display: none; }
        .btn-cancel { background-color: #6c757d; color: white; width: 100%; margin-top: 5px; display: none; }
        .btn-edit { background-color: #ffc107; color: black; padding: 5px 10px; font-size: 0.85em; }
        .btn-delete { background-color: #dc3545; color: white; padding: 5px 10px; font-size: 0.85em; }
        
        /* Bộ lọc Tìm kiếm */
        .search-box { margin-bottom: 15px; }
        
        /* Bảng danh sách */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Thông báo trạng thái */
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; display: none; text-align: center;}
        .alert-success { background-color: #d4edda; color: #155724; }
        .alert-danger { background-color: #f8d7da; color: #721c24; }
        #loading { text-align: center; color: #007bff; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Hệ thống Quản lý Thành viên (Full CRUD Ajax)</h2>
    <div id="alertBox" class="alert"></div>

    <div class="wrapper">
        <div class="col-form">
            <div class="card">
                <div class="card-title" id="formTitle">Thêm thành viên mới</div>
                <form id="memberForm">
                    <input type="hidden" id="memberId">
                    
                    <div class="form-group">
                        <label>Họ và tên *</label>
                        <input type="text" id="name" class="form-control" placeholder="Nguyễn Văn A">
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" class="form-control" placeholder="vanya@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>Vị trí công việc *</label>
                        <input type="text" id="role" class="form-control" placeholder="Developer, Designer...">
                    </div>
                    
                    <button type="submit" id="btnAddSubmit" class="btn btn-add">Thêm Mới</button>
                    <button type="button" id="btnUpdateSubmit" class="btn btn-update">Lưu Thay Đổi</button>
                    <button type="button" id="btnCancelEdit" class="btn btn-cancel">Hủy Bỏ</button>
                </form>
            </div>
        </div>

        <div class="col-list">
            <div class="search-box">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 Nhập tên thành viên để tìm kiếm nhanh...">
            </div>
            
            <div id="loading">⏳ Đang đồng bộ với cơ sở dữ liệu...</div>
            
            <table>
                <thead>
                    <tr>
                        <th style="width: 8%;">ID</th>
                        <th style="width: 32%;">Họ và tên</th>
                        <th style="width: 30%;">Email</th>
                        <th style="width: 15%;">Vị trí</th>
                        <th style="width: 15%;">Hành động</th>
                    </tr>
                </thead>
                <tbody id="memberData">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
