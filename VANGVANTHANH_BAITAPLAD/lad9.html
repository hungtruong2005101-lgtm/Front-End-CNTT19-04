<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 09 - Quản lý công việc cá nhân</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .todo-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 100%;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #task-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }
        #add-btn {
            padding: 10px 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        #add-btn:hover { background-color: #2980b9; }

        /* Danh sách công việc */
        #task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
            margin-bottom: 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        /* Class khi công việc đã hoàn thành */
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #aaa;
        }
        .task-text {
            flex: 1;
            font-size: 15px;
            word-break: break-all;
        }
        .action-btns {
            display: flex;
            gap: 5px;
        }
        .done-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .done-btn:hover { background-color: #27ae60; }

        .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .delete-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="todo-container">
    <h2>Nhiệm Vụ Trong Ngày</h2>
    
    <div class="input-group">
        <input type="text" id="task-input" placeholder="Nhập công việc cần làm...">
        <button id="add-btn">Thêm</button>
    </div>

    <ul id="task-list"></ul>
</div>

<script>

    const taskList = document.getElementById('task-list');
