<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 15 - Form Validation jQuery</title>

    <!-- Nhúng jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container{
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
        }

        .form-group{
            margin-bottom: 15px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Input hợp lệ */
        .success{
            border-color: green;
        }

        /* Input lỗi */
        .error-input{
            border-color: red;
        }

        /* Thông báo lỗi */
        .error{
            color: red;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Thông báo thành công */
        .success-message{
            color: green;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        button{
            width: 100%;
            padding: 10px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Form Đăng Ký</h2>

        <form id="registerForm">

            <!-- Họ tên -->
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="fullname">
                <div class="error" id="nameError"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="text" id="email">
                <div class="error" id="emailError"></div>
            </div>

            <!-- Mật khẩu -->
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password">
                <div class="error" id="passwordError"></div>
            </div>

            <!-- Xác nhận mật khẩu -->
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword">
                <div class="error" id="confirmError"></div>
            </div>

            <button type="submit">Đăng ký</button>

            <!-- Thông báo -->
            <div class="success-message" id="successMessage"></div>

        </form>
    </div>

    <script>
        $(document).ready(function(){

            $("#registerForm").submit(function(event){

                // Chặn submit mặc định
                event.preventDefault();

                // Xóa thông báo cũ
                $(".error").text("");
                $("#successMessage").text("");

                $("input").removeClass("error-input success");

                // Lấy dữ liệu
                let fullname = $.trim($("#fullname").val());
                let email = $.trim($("#email").val());
                let password = $.trim($("#password").val());
                let confirmPassword = $.trim($("#confirmPassword").val());

                let isValid = true;

                // Regex email
                let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                // Kiểm tra họ tên
                if(fullname === ""){
                    $("#nameError").text("Vui lòng nhập họ tên");
                    $("#fullname").addClass("error-input");
                    isValid = false;
                } else {
                    $("#fullname").addClass("success");
                }

                // Kiểm tra email
                if(email === ""){
                    $("#emailError").text("Vui lòng nhập email");
                    $("#email").addClass("error-input");
                    isValid = false;
                }
                else if(!emailRegex.test(email)){
                    $("#emailError").text("Email không đúng định dạng");
                    $("#email").addClass("error-input");
                    isValid = false;
                }
                else{
                    $("#email").addClass("success");
                }

                // Kiểm tra mật khẩu
                if(password === ""){
                    $("#passwordError").text("Vui lòng nhập mật khẩu");
                    $("#password").addClass("error-input");
                    isValid = false;
                }
                else if(password.length < 6){
                    $("#passwordError").text("Mật khẩu phải từ 6 ký tự");
                    $("#password").addClass("error-input");
                    isValid = false;
                }
                else{
                    $("#password").addClass("success");
                }

                // Kiểm tra xác nhận mật khẩu
                if(confirmPassword === ""){
                    $("#confirmError").text("Vui lòng xác nhận mật khẩu");
                    $("#confirmPassword").addClass("error-input");
                    isValid = false;
                }
                else if(confirmPassword !== password){
                    $("#confirmError").text("Mật khẩu xác nhận không khớp");
                    $("#confirmPassword").addClass("error-input");
                    isValid = false;
                }
                else{
                    $("#confirmPassword").addClass("success");
                }

                // Nếu hợp lệ
                if(isValid){
                    $("#successMessage").text("Đăng ký thành công!");
                }

            });

        });
    </script>

</body>
</html>
