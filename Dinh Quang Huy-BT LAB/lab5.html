<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color: #f5f5f5;
        }
        .container-box{
            background: white;
            padding: 30px;
            margin: 40px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="container-box">
            <h2>QUẢN LÝ DANH SÁCH SẢN PHẨM</h2>

            <div class="row mb-3">
                <div class="col-md-4">
                    <input type="text" id="searchName" class="form-control" placeholder="Tìm theo tên sản phẩm">
                </div>
                <div class="col-md-3">
                    <input type="number" id="minPrice" class="form-control" placeholder="Giá nhỏ nhất">
                </div>
                <div class="col-md-3">
                    <input type="number" id="maxPrice" class="form-control" placeholder="Giá lớn nhất">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" onclick="filterProduct()">
                        Lọc
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <button class="btn btn-success me-2" onclick="sortAsc()">
                    Giá tăng dần
                </button>
                <button class="btn btn-danger" onclick="sortDesc()">
                    Giá giảm dần
                </button>
            </div>

            <table class="table table-bordered table-hover text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Tổng</th>
                    </tr>
                </thead>
                <tbody id="productList">

                </tbody>
            </table>

            <h4 id="totalInventory" class="text-end text-primary" ></h4>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>

    let products = [
        {
            name: "Laptop",
            price: 15000000,
            quantity: 5
        },
        {
            name: "Điện thoại",
            price: 8000000,
            quantity: 8
        },
        {
            name: "Tai nghe",
            price: 500000,
            quantity: 15
        },
        {
            name: "Chuột",
            price: 300000,
            quantity: 20
        },
        {
            name: "Bàn phím",
            price: 700000,
            quantity: 10
        }
    ];

    function renderProducts(list) {

        let html = "";
        let total = 0;

        list.forEach(product => {

            let sum = product.price * product.quantity;
            total += sum;

            html += `
                <tr>
                    <td>${product.name}</td>
                    <td>${product.price.toLocaleString()} VNĐ</td>
                    <td>${product.quantity}</td>
                    <td>${sum.toLocaleString()} VNĐ</td>
                </tr>
            `;
        });

        document.getElementById("productList").innerHTML = html;

        document.getElementById("totalInventory").innerHTML =
            "Tổng giá trị kho: " + total.toLocaleString() + " VNĐ";
    }

    function filterProducts() {

        let keyword = document.getElementById("searchName").value.toLowerCase();

        let min = Number(document.getElementById("minPrice").value) || 0;

        let max = Number(document.getElementById("maxPrice").value) || Infinity;

        let filtered = products.filter(product => {

            return product.name.toLowerCase().includes(keyword)
                && product.price >= min
                && product.price <= max;
        });

        renderProducts(filtered);
    }

    function sortAsc() {

        products.sort((a, b) => a.price - b.price);

        renderProducts(products);
    }

    function sortDesc() {

        products.sort((a, b) => b.price - a.price);

        renderProducts(products);
    }

    renderProducts(products);

</script>

</body>
</html>
</body>
</html>
