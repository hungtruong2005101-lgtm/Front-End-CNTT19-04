<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Ứng Dụng Quản Lý Sinh Viên</h3>
        </div>

        <div class="card-body">

            <form id="studentForm" class="row g-3 mb-4">
                <div class="col-md-4">
                    <input type="text" id="name" class="form-control" placeholder="Nhập tên sinh viên" required>
                </div>

                <div class="col-md-4">
                    <input type="number" id="age" class="form-control" placeholder="Nhập tuổi" required>
                </div>

                <div class="col-md-4">
                    <button type="submit" class="btn btn-success w-100">
                        Thêm Sinh Viên
                    </button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Họ Tên</th>
                            <th>Tuổi</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>

                    <tbody id="studentTable">
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = "http://localhost:3000/students";

    async function loadStudents() {
        const response = await fetch(API_URL);
        const students = await response.json();

        const table = document.getElementById("studentTable");
        table.innerHTML = "";

        students.forEach(student => {
            table.innerHTML += `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.age}</td>
                    <td>
                        <button class="btn btn-danger btn-sm"
                            onclick="deleteStudent(${student.id})">
                            Xóa
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    document.getElementById("studentForm")
        .addEventListener("submit", async function(e) {

        e.preventDefault();

        const name = document.getElementById("name").value;
        const age = document.getElementById("age").value;

        const newStudent = {
            name: name,
            age: age
        };

        await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(newStudent)
        });

        document.getElementById("studentForm").reset();

        loadStudents();
    });

    async function deleteStudent(id) {
        await fetch(`${API_URL}/${id}`, {
            method: "DELETE"
        });

        loadStudents();
    }

    loadStudents();
</script>

</body>
</html>
