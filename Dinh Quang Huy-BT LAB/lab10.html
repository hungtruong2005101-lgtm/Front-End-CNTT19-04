<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài lab số 10 - Hiển thị danh sách dữ liệu từ API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-4 text-center bg-primary text-white rounded-top">
                        <h2 class="fw-bold mb-0">Danh Sách Người Dùng</h2>
                    </div>
                </div>

                <div id="loading" class="text-center my-5">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Đang tải...</span>
                    </div>
                    <p class="mt-3 text-muted fw-semibold">Đang tải dữ liệu từ hệ thống...</p>
                </div>

                <div id="error-message" class="alert alert-danger d-none align-items-center shadow-sm" role="alert">
                    <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Danger:" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                    </svg>
                    <div>
                        Không thể tải dữ liệu. Vui lòng kiểm tra lại kết nối mạng hoặc đường dẫn API.
                    </div>
                </div>

                <div id="user-list" class="row g-3"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const apiUrl = 'https://jsonplaceholder.typicode.com/users';
        const userListContainer = document.getElementById('user-list');
        const loadingElement = document.getElementById('loading');
        const errorElement = document.getElementById('error-message');

        async function fetchUsers() {
            try {
                loadingElement.classList.remove('d-none');
                errorElement.classList.add('d-none');
                userListContainer.innerHTML = '';

                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error('Lỗi phản hồi mạng');
                }
                
                const data = await response.json();
                renderUsers(data);
            } catch (error) {
                errorElement.classList.remove('d-none');
            } finally {
                loadingElement.classList.add('d-none');
            }
        }

        function renderUsers(users) {
            let htmlContent = '';
            users.forEach(user => {
                htmlContent += `
                    <div class="col-12">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body p-4">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold me-3" style="width: 50px; height: 50px; font-size: 1.25rem;">
                                        ${user.name.charAt(0)}
                                    </div>
                                    <div>
                                        <h5 class="card-title mb-0 fw-bold text-dark">${user.name}</h5>
                                        <small class="text-muted">@${user.username}</small>
                                    </div>
                                </div>
                                <hr class="text-muted my-3">
                                <div class="mb-2">
                                    <strong class="text-secondary small d-block">Email:</strong>
                                    <span class="text-dark">${user.email}</span>
                                </div>
                                <div class="mb-2">
                                    <strong class="text-secondary small d-block">Số điện thoại:</strong>
                                    <span class="text-dark">${user.phone}</span>
                                </div>
                                <div>
                                    <strong class="text-secondary small d-block">Công ty:</strong>
                                    <span class="text-dark">${user.company.name}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            userListContainer.innerHTML = htmlContent;
        }

        window.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>
</html>
