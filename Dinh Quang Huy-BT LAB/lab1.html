<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính BMI</title>
    <!-- Bootstrao CSS-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f4f6f9;
        }
        .bmi-box {
            max-width: 500px;
            margin: 60px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
        #result {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bmi-box">
            <h2 class="text-center mb-4">TÍNH CHỈ SỐ BMI</h2>
            <div class="mb-3">
                <label class="form-label">Chiều cao (m)</label>
                <input type="number" id="height" class="form-control" placeholder="Ví dụ: 1.7" step="0.01">
            </div>
            <div class="mb-3">
                <label class="form-label">Cân nặng (kg)</label>
                <input type="number" id="weight" class="form-control" placeholder="Ví dụ:60">
            </div>
            <div class="d-grid">
                <button class="btn btn-primary" onclick="calculateBMI()">
                    Tính BMI
                </button>
            </div>
            <div id="result"></div>
        </div>
    </div>

    <!-- Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function calculateBMI() {
            let height = parseFloat(document.getElementById("height").value);
            let weight = parseFloat(document.getElementById("weight").value);
            let result = document.getElementById("result");

            if (isNaN(height) || isNaN(weight) || height <= 0 || weight <= 0) {
                result.innerHTML = "Vui lòng nhập dữ liệu hợp lệ!";
                result.className = "text-danger";
                return;
            }

            let bmi = weight / (height * height);
            bmi = bmi.toFixed(2);

            let category = "";
            let color = "";

            if (bmi < 18.5) {
                category = "Gầy";
                color = "text-warning";
            }
            else if (bmi < 25) {
                category = "Bình thường";
                color = "text-success";
            }
            else if (bmi < 30) {
                category = "Thừa cân";
                color = "text-primary";
            }
            else {
                category = "Béo phì";
                color = "text-danger";
            }

            result.className = color;
            result.innerHTML = `
                BMI của bạn: ${bmi} <br>
                Phân loại: ${category}
                `;
        }
    </script>
</body>
</html>
