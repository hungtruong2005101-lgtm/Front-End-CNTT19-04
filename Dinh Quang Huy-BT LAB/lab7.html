<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab DOM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow-lg p-4">

            <h1 id="title" class="text-center text-primary mb-4">
                Chào mừng đến với JavaScript DOM
            </h1>

            <p id="content" class="fs-5 text-center">
                Đây là đoạn văn bản ban đầu.
            </p>

            <div class="text-center my-4">
                <img 
                    id="image"
                    src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png"
                    width="220"
                    class="img-fluid rounded shadow"
                >
            </div>

            <div class="d-flex flex-wrap justify-content-center gap-3">

                <button class="btn btn-primary" onclick="changeTitle()">
                    Đổi tiêu đề
                </button>

                <button class="btn btn-success" onclick="changeContent()">
                    Đổi nội dung
                </button>

                <button class="btn btn-warning" onclick="changeImage()">
                    Đổi hình ảnh
                </button>

                <button class="btn btn-danger" onclick="changeStyle()">
                    Đổi màu
                </button>

                <button class="btn btn-secondary" onclick="resetPage()">
                    Khôi phục
                </button>

            </div>

        </div>
    </div>

    <script>

        function changeTitle() {
            document.getElementById("title").innerText =
                "Bạn đã thay đổi tiêu đề";
        }

        function changeContent() {
            document.getElementById("content").innerText =
                "Nội dung đã được cập nhật bằng JavaScript DOM.";
        }

        function changeImage() {
            document.getElementById("image").src =
                "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
        }

        function changeStyle() {
            document.getElementById("title").classList.remove("text-primary");
            document.getElementById("title").classList.add("text-danger");

            document.getElementById("content").classList.add("fw-bold");
        }

        function resetPage() {

            document.getElementById("title").innerText =
                "Chào mừng đến với JavaScript DOM";

            document.getElementById("content").innerText =
                "Đây là đoạn văn bản ban đầu.";

            document.getElementById("image").src =
                "https://cdn-icons-png.flaticon.com/512/1055/1055687.png";

            document.getElementById("title").classList.remove("text-danger");
            document.getElementById("title").classList.add("text-primary");

            document.getElementById("content").classList.remove("fw-bold");
        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
