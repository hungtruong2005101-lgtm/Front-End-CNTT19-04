<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Đếm Tương Tác</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow-lg p-5 text-center">

            <h1 class="mb-4">Bộ Đếm Tương Tác</h1>

            <h2 id="counter" class="display-1 text-primary mb-4">
                0
            </h2>

            <div class="d-flex flex-wrap justify-content-center gap-3">

                <button class="btn btn-success btn-lg" id="increase">
                    Tăng
                </button>

                <button class="btn btn-danger btn-lg" id="decrease">
                    Giảm
                </button>

                <button class="btn btn-warning btn-lg" id="reset">
                    Đặt lại
                </button>

                <button class="btn btn-info btn-lg" id="plusFive">
                    +5
                </button>

            </div>

        </div>
    </div>

    <script>

        let count = 0;

        const counter = document.getElementById("counter");

        function updateCounter() {

            counter.innerText = count;

            if (count > 0) {
                counter.className = "display-1 text-success mb-4";
            } 
            else if (count < 0) {
                counter.className = "display-1 text-danger mb-4";
            } 
            else {
                counter.className = "display-1 text-primary mb-4";
            }

        }

        document.getElementById("increase").addEventListener("click", function () {
            count++;
            updateCounter();
        });

        document.getElementById("decrease").addEventListener("click", function () {
            count--;
            updateCounter();
        });

        document.getElementById("reset").addEventListener("click", function () {
            count = 0;
            updateCounter();
        });

        document.getElementById("plusFive").addEventListener("click", function () {
            count += 5;
            updateCounter();
        });

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
