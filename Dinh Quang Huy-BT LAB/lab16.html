<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 16: Bộ đếm lượt tương tác</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        
        #counterDisplay {
            font-size: 5rem;
            font-weight: bold;
            transition: color 0.3s ease, transform 0.2s ease;
        }
        
        .pop-effect {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            
            <h2 class="mb-3 fw-bold text-dark">Bài Lab 16: Bộ Đếm Tương Tác</h2>
            <p class="text-muted">Thực hành thao tác sự kiện và cập nhật nội dung DOM bằng jQuery</p>
            
            <hr class="my-4">

            <div class="card shadow-sm p-5 mb-4 bg-white rounded-3">
                <div class="text-uppercase text-secondary tracking-wider small fw-bold mb-2">Giá trị hiện tại</div>
                <div id="counterDisplay" class="text-secondary">0</div>
                <div id="statusMessage" class="text-muted small mt-2">&nbsp;</div>
            </div>

            <div class="card p-3 shadow-sm bg-white rounded-3">
                <div class="d-flex justify-content-center gap-2 mb-3">
                    <button id="btnDecrease" class="btn btn-danger btn-lg px-4 fw-bold">Giảm (-1)</button>
                    <button id="btnReset" class="btn btn-secondary btn-lg px-4 fw-bold">Đặt lại (Reset)</button>
                    <button id="btnIncrease" class="btn btn-success btn-lg px-4 fw-bold">Tăng (+1)</button>
                </div>
                
                <div class="border-top pt-3">
                    <div class="small text-muted mb-2 text-uppercase fw-bold">Chức năng mở rộng</div>
                    <button id="btnFastIncrease" class="btn btn-primary w-100 py-2 fw-bold">⚡ Tăng nhanh (+10)</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    $(document).ready(function() {

        let counter = 0;

        const allowNegative = false; 

        function updateUI() {
    
            $("#counterDisplay").text(counter);

            if (counter > 0) {
                
                $("#counterDisplay").removeClass("text-secondary text-danger").addClass("text-success");
                $("#statusMessage").html("<span class='badge bg-success-subtle text-success'>Số dương</span>");
            } else if (counter < 0) {
                
                $("#counterDisplay").removeClass("text-secondary text-success").addClass("text-danger");
                $("#statusMessage").html("<span class='badge bg-danger-subtle text-danger'>Số âm</span>");
            } else {
                
                $("#counterDisplay").removeClass("text-success text-danger").addClass("text-secondary");
                $("#statusMessage").html("&nbsp;");
            }

            $("#counterDisplay").addClass("pop-effect");
            setTimeout(function() {
                $("#counterDisplay").removeClass("pop-effect");
            }, 150);
        }

        $("#btnIncrease").click(function() {
            counter++;
            updateUI(); 
        });

        $("#btnDecrease").click(function() {
         
            if (!allowNegative && counter <= 0) {
                $("#statusMessage").html("<span class='text-warning fw-bold'>⚠️ Không thể giảm xuống dưới 0!</span>");
                return; 
            }
            counter--;
            updateUI();
        });

        $("#btnReset").click(function() {
            counter = 0;
            updateUI();
        });

        $("#btnFastIncrease").click(function() {
            counter += 10;
            updateUI();
        });

        updateUI();
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
