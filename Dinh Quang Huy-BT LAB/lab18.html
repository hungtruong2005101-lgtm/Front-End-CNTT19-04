<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 18: Quản lý danh sách thành viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .stt-column {
            width: 80px;
        }
        .action-column {
            width: 180px;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <h2 class="text-center fw-bold text-dark mb-2">Bài Lab 18: Quản Lý Danh Sách Thành Viên</h2>
            <p class="text-center text-muted mb-4">Mức độ: Thông thạo | Thực hiện ứng dụng nhỏ CRUD trực tiếp trên giao diện không tải lại trang</p>
            
            <hr class="my-4">

            <div class="card shadow-sm border-0 rounded-3 p-4 bg-white mb-4">
                <div class="row g-3">
                    <div class="col-md-7">
                        <label for="memberNameInput" class="form-label fw-bold">Tên thành viên mới</label>
                        <div class="input-group">
                            <input type="text" id="memberNameInput" class="form-control" placeholder="Nhập họ và tên...">
                            <button id="btnAddMember" class="btn btn-dark fw-bold" type="button">
                                <i class="bi bi-person-plus-fill me-1"></i> Thêm mới
                            </button>
                        </div>
                    </div>
                    
                    <div class="col-md-5">
                        <label for="searchMemberInput" class="form-label fw-bold text-primary">Tìm kiếm thành viên</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchMemberInput" class="form-control" placeholder="Gõ từ khóa tìm kiếm...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-3 overflow-hidden bg-white">
                <div class="card-header bg-dark text-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-people-fill me-2"></i>Danh sách thành viên</h5>
                    <span id="memberCountBadge" class="badge bg-light text-dark fw-bold fs-6">0</span>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 text-center">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" class="stt-column">STT</th>
                                <th scope="col" class="text-start">Họ và tên</th>
                                <th scope="col" class="action-column">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody">
                            <tr class="member-row">
                                <td class="stt-cell fw-bold"></td>
                                <td class="text-start member-name-cell">Nguyễn Văn A</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary btn-edit me-1" type="button"><i class="bi bi-pencil-square"></i> Sửa</button>
                                    <button class="btn btn-sm btn-outline-danger btn-delete" type="button"><i class="bi bi-trash3"></i> Xóa</button>
                                </td>
                            </tr>
                            <tr class="member-row">
                                <td class="stt-cell fw-bold"></td>
                                <td class="text-start member-name-cell">Trần Thị B</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary btn-edit me-1" type="button"><i class="bi bi-pencil-square"></i> Sửa</button>
                                    <button class="btn btn-sm btn-outline-danger btn-delete" type="button"><i class="bi bi-trash3"></i> Xóa</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="emptyMessage" class="text-center p-4 text-muted d-none">
                    <i class="bi bi-clipboard-x fs-1 d-block mb-2"></i>
                    Không tìm thấy thành viên nào phù hợp.
                </div>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>Cập nhật tên thành viên</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="modalMemberName" class="form-label fw-bold">Họ và tên hiện tại</label>
                    <input type="text" id="modalMemberName" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy bỏ</button>
                <button type="button" id="btnSaveEdit" class="btn btn-primary fw-bold">Lưu thay đổi</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    $(document).ready(function() {
        
        let currentRowToEdit = null;

        function updateTableStatus() {
            let visibleCount = 0;
            let totalCount = $(".member-row").length;

            $(".member-row").each(function(index) {
                if ($(this).is(":visible")) {
                    visibleCount++;
                    $(this).find(".stt-cell").text(visibleCount);
                }
            });

            $("#memberCountBadge").text(totalCount);

            if (visibleCount === 0 && totalCount > 0) {
                $("#emptyMessage").removeClass("d-none");
            } else if (totalCount === 0) {
                $("#emptyMessage").removeClass("d-none").html("<i class='bi bi-inbox fs-1 d-block mb-2'></i>Danh sách hiện đang trống.");
            } else {
                $("#emptyMessage").addClass("d-none");
            }
        }
        $("#btnAddMember").click(function() {
            let memberName = $("#memberNameInput").val().trim();

            if (memberName === "") {
                alert("Vui lòng nhập họ và tên thành viên trước khi thêm!");
                return;
            }

            let newRowHtml = `
                <tr class="member-row">
                    <td class="stt-cell fw-bold"></td>
                    <td class="text-start member-name-cell">${memberName}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary btn-edit me-1" type="button"><i class="bi bi-pencil-square"></i> Sửa</button>
                        <button class="btn btn-sm btn-outline-danger btn-delete" type="button"><i class="bi bi-trash3"></i> Xóa</button>
                    </td>
                </tr>
            `;

            $("#memberTableBody").append(newRowHtml);

            $("#memberNameInput").val("");
            updateTableStatus();
        });

        $("#memberNameInput").keypress(function(e) {
            if (e.which === 13) {
                $("#btnAddMember").click();
            }
        });

        $("#memberTableBody").on("click", ".btn-delete", function() {
            if (confirm("Bạn có chắc chắn muốn xóa thành viên này ra khỏi danh sách không?")) {

                $(this).closest(".member-row").remove();
                updateTableStatus();
            }
        });

        $("#memberTableBody").on("click", ".btn-edit", function() {
  
            currentRowToEdit = $(this).closest(".member-row");

            let currentName = currentRowToEdit.find(".member-name-cell").text();
            
            $("#modalMemberName").val(currentName);
            $("#editModal").modal("show");
        });

        $("#btnSaveEdit").click(function() {
            let updatedName = $("#modalMemberName").val().trim();

            if (updatedName === "") {
                alert("Tên thành viên không được phép để trống!");
                return;
            }

            if (currentRowToEdit !== null) {

                currentRowToEdit.find(".member-name-cell").text(updatedName);
 
                $("#editModal").modal("hide");
                currentRowToEdit = null;
            }
        });

        $("#searchMemberInput").on("keyup", function() {
            let searchKeyword = $(this).val().toLowerCase().trim();

            $(".member-row").each(function() {
                let memberName = $(this).find(".member-name-cell").text().toLowerCase();
 
                if (memberName.indexOf(searchKeyword) > -1) {
                    $(this).show(); 
                } else {
                    $(this).hide(); 
                }
            });

            updateTableStatus();
        });

        updateTableStatus();
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
