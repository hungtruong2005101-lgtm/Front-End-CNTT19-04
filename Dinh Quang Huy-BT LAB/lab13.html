<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 13: Thao tác ẩn/hiện nội dung bằng jQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        #contentBlock {
            transition: border-color 0.3s ease;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h2 class="mb-4 text-primary">Bài Lab 13: Thao tác ẩn và hiện nội dung</h2>
            <p class="text-muted">Sử dụng jQuery Selector, Hide, Show, Toggle và Event Click</p>
            
            <hr class="my-4">

            <div id="contentBlock" class="card shadow-sm p-4 mb-4 bg-white border-primary">
                <h4 class="card-title text-success">Khối Nội Dung Thử Nghiệm</h4>
                <p class="card-text fs-5 mt-3">
                    Đây là đoạn văn bản sẽ được ẩn hoặc hiện khi bạn tương tác với các nút bấm ở bên dưới. 
                    Bạn có thể tùy ý thay đổi khối này thành hình ảnh hoặc bất kỳ thành phần nào khác!
                </p>
                <div class="mt-2">
                    <img src="https://picsum.photos/400/200" alt="Hình ảnh minh họa" class="img-fluid rounded shadow-sm">
                </div>
            </div>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <button id="btnHide" class="btn btn-danger btn-lg px-4">Ẩn Nội Dung</button>
                <button id="btnShow" class="btn btn-success btn-lg px-4">Hiện Nội Dung</button>
                
                <button id="btnToggle" class="btn btn-warning btn-lg px-4 text-white">Chuyển Đổi (Toggle)</button>
                
                <button id="btnAdvanced" class="btn btn-primary btn-lg px-4">Đang hiển thị (Click để ẩn)</button>
            </div>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    $(document).ready(function() {

        $("#btnHide").click(function() {

            $("#contentBlock").hide(400, function() {

                $("#btnAdvanced").text("Đang ẩn (Click để hiện)").removeClass("btn-primary").addClass("btn-secondary");
            });
        });

        $("#btnShow").click(function() {

            $("#contentBlock").show(400, function() {

                $("#btnAdvanced").text("Đang hiển thị (Click để ẩn)").removeClass("btn-secondary").addClass("btn-primary");
            });
        });


        $("#btnToggle").click(function() {
            $("#contentBlock").toggle(400, function() {

                if ($("#contentBlock").is(":visible")) {
                    $("#btnAdvanced").text("Đang hiển thị (Click để ẩn)").removeClass("btn-secondary").addClass("btn-primary");
                } else {
                    $("#btnAdvanced").text("Đang ẩn (Click để hiện)").removeClass("btn-primary").addClass("btn-secondary");
                }
            });
        });

        $("#btnAdvanced").click(function() {

            if ($("#contentBlock").is(":visible")) {

                $("#contentBlock").hide(400);

                $(this).text("Đang ẩn (Click để hiện)").removeClass("btn-primary").addClass("btn-secondary");
            } else {

                $("#contentBlock").show(400);

                $(this).text("Đang hiển thị (Click để ẩn)").removeClass("btn-secondary").addClass("btn-primary");
            }
        });

    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
