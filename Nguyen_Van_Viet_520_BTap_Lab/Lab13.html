<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 13</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body{
            font-family: Arial;
            margin: 40px;
        }
        h1{
            text-align: center;
            border-bottom: 2px solid gray;
            padding-bottom: 10px;
        }
        .container{
            width: 500px;
            margin-top: 40px;
        }
        h2{
            color: #4612d4;
        }
        button{
            padding: 10px 20px;
            margin-right: 10px;
            border: 1px solid gray;
            background: white;
            cursor: pointer;
        }
        #text{
            margin-top: 20px;
            width: 350px;
            padding: 20px;
            border: 2px solid #66a3ff;
            background: #cce6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Bài tập jQuery Ẩn / Hiện nội dung</h2>
        <button id="btnhide">Ẩn nội dung</button>
        <button id="btnshow">Hiện nội dung</button>
        <button id="btntoggle">Ẩn / Hiện</button>
        <button id="btncheck">Kiểm tra</button>
        <div id="text">
            <h3>Thông báo</h3>
            <p>Đây là nội dung được điều khiển bằng jQuery.</p>
        </div>
    </div>
    <script>
        $(document).ready(function(){
            $("#btnhide").click(function(){
                $("#text").hide(100);
            });
            $("#btnshow").click(function(){
                $("#text").show(100);
            });
            $("#btntoggle").click(function(){
                $("#text").toggle(100);
            });
            $("#btncheck").click(function(){
                if($("#text").is(":visible")){
                    alert("Nội dung đang HIỆN");
                }else{
                    alert("Nội dung đang ẨN");
                }
            });
        });
    </script>
</body>
</html>
