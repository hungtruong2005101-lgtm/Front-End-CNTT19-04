<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 15</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial;
            margin: 40px;
        }

        h1{
            text-align: center;
            border-bottom: 2px solid gray;
            padding-bottom: 10px;
        }

        .container{
            width: 450px;
            margin: auto;
            border: 2px solid #66a3ff;
            padding: 20px;
            background: #cce6ff;
        }

        input{
            width: 95%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 5px;
            border: 2px solid gray;
        }

        .error{
            color: red;
            font-size: 14px;
        }

        .success{
            border-color: green;
        }

        .fail{
            border-color: red;
        }

        button{
            padding: 10px 20px;
            margin-top: 15px;
            border: 2px solid #3399ff;
            background: white;
            cursor: pointer;
        }

        #result{
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Form Đăng Ký</h2>
    <form id="registerForm">Họ tên <br>
        <input type="text" id="name">
        <div class="error" id="nameError"></div>Email <br>
        <input type="text" id="email">
        <div class="error" id="emailError"></div>Mật khẩu <br>
        <input type="password" id="password">
        <div class="error" id="passError"></div>Xác nhận mật khẩu <br>
        <input type="password" id="confirm">
        <div class="error" id="confirmError"></div>
        <button type="submit">Đăng ký</button>
        <div id="result"></div>
    </form>
</div>
<script>
$(document).ready(function(){
    $("#registerForm").submit(function(e){
        e.preventDefault();
        $(".error").text("");
        $("input").removeClass("success fail");
        let name = $("#name").val().trim();
        let email = $("#email").val().trim();
        let pass = $("#password").val().trim();
        let confirm = $("#confirm").val().trim();
        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        let valid = true;
        if(name==""){
            $("#nameError").text("Không được để trống");
            $("#name").addClass("fail");
            valid=false;
        } else $("#name").addClass("success");
        if(!emailRegex.test(email)){
            $("#emailError").text("Email không hợp lệ");
            $("#email").addClass("fail");
            valid=false;
        } else $("#email").addClass("success");
        if(pass.length<6){
            $("#passError").text("Mật khẩu ít nhất 6 ký tự");
            $("#password").addClass("fail");
            valid=false;
        } else $("#password").addClass("success");
        if(confirm!=pass || confirm==""){
            $("#confirmError").text("Mật khẩu không khớp");
            $("#confirm").addClass("fail");
            valid=false;
        } else $("#confirm").addClass("success");
        if(valid){
            $("#result").css("color","green");
            $("#result").text("Đăng ký thành công");
        }else{
            $("#result").css("color","red");
            $("#result").text("Vui lòng kiểm tra lại");
        }
    });
});
</script>
</body>
</html>
