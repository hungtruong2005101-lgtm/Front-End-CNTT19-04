<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài lab 20</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h2>Thêm thành viên mới</h2>
    <form id="memberForm">
        <input type="text" id="name" placeholder="Họ và tên"><br><br>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="text" id="phone" placeholder="Số điện thoại"><br><br>
        <button type="submit">Thêm mới</button>
    </form>
    <div id="message" style="margin-top: 10px;"></div>
    <h2>Danh sách thành viên</h2>
    <table border="1" cellpadding="10" cellspacing="0" id="memberTable" style="width:100%; text-align:left;">
        <thead>
            <tr>
                <th>Họ và tên</th>
                <th>Email</th>
                <th>Số điện thoại</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
        $(document).ready(function() {
            var apiUrl = 'https://5f50ca542b5a260016e8bfb0.mockapi.io/api/v1/members';
            function loadMembers() {
                $.ajax({
                    url: apiUrl,
                    type: 'GET',
                    dataType: 'json',
                    success: function(data) {
                        var rows = '';
                        $.each(data, function(index, member) {
                            rows += '<tr>';
                            rows += '<td>' + member.name + '</td>';
                            rows += '<td>' + member.email + '</td>';
                            rows += '<td>' + member.phone + '</td>';
                            rows += '</tr>';
                        });
                        $('#memberTable tbody').html(rows);
                    }
                });
            }
            loadMembers();
            $('#memberForm').submit(function(e) {
                e.preventDefault();
                var name = $('#name').val().trim();
                var email = $('#email').val().trim();
                var phone = $('#phone').val().trim();
                if (name === '' || email === '' || phone === '') {
                    $('#message').text('Vui lòng điền đầy đủ thông tin.').style.color = 'red';
                    return;
                }
                var formData = {
                    name: name,
                    email: email,
                    phone: phone
                };
                $.ajax({
                    url: apiUrl,
                    type: 'POST',
                    data: formData,
                    success: function(response) {
                        $('#message').text('Thêm thành công!').css('color', 'green');
                        $('#memberForm')[0].reset();
                        loadMembers();
                    },
                    error: function() {
                        $('#message').text('Đã xảy ra lỗi khi thêm dữ liệu.').css('color', 'red');
                    }
                });
            });
        });
    </script>
</body>
</html>
