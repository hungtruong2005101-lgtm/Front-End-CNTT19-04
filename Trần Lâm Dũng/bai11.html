<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu thông tin</title>

    <style>
        body{
            font-family: Arial;
            margin: 30px;
        }

        input{
            padding: 8px;
            width: 200px;
        }

        button{
            padding: 8px 12px;
            cursor: pointer;
        }

        #result{
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            width: 300px;
        }
    </style>
</head>
<body>

    <h2>Tra cứu người dùng</h2>

    <input type="number" id="userId" placeholder="Nhập ID">
    <button onclick="searchUser()">Tra cứu</button>

    <div id="result"></div>

    <script>
        function searchUser(){

            let id = document.getElementById("userId").value;

            if(id == ""){
                alert("Vui lòng nhập ID");
                return;
            }

            fetch(`https://jsonplaceholder.typicode.com/users/${id}`)
                .then(response => response.json())
                .then(user => {

                    if(user.id){

                        document.getElementById("result").innerHTML = `
                            <h3>Thông tin người dùng</h3>
                            <p><b>Tên:</b> ${user.name}</p>
                            <p><b>Email:</b> ${user.email}</p>
                            <p><b>SĐT:</b> ${user.phone}</p>
                        `;

                    }else{
                        document.getElementById("result").innerHTML =
                            "Không tìm thấy dữ liệu!";
                    }

                })
                .catch(error => {
                    document.getElementById("result").innerHTML =
                        "Có lỗi xảy ra!";
                });
        }
    </script>

</body>
</html>
