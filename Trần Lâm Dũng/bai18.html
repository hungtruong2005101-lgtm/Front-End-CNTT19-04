<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 18: Quản lý danh sách thành viên</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f7f6; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: #28a745; color: white; }
        .btn-search { background-color: #17a2b8; color: white; }
        .btn-edit { background-color: #ffc107; color: black; margin-right: 5px; }
        .btn-delete { background-color: #dc3545; color: white; }
        .btn-save { background-color: #007bff; color: white; display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        
        /* CSS cho chế độ sửa trực tiếp tại chỗ */
        .edit-input { display: none; width: 80%; padding: 4px; }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Quản lý thành viên</h2>
    
    <div class="form-group">
        <input type="text" id="memberInput" placeholder="Nhập tên thành viên...">
        <button class="btn-add" id="btnAdd">Thêm mới</button>
    </div>

    <div class="form-group">
        <input type="text" id="searchInput" placeholder="Tìm kiếm thành viên theo tên...">
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 10%;">STT</th>
                <th style="width: 60%;">Tên thành viên</th>
                <th style="width: 30%;">Hành động</th>
            </tr>
        </thead>
        <tbody id="memberList">
            </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
