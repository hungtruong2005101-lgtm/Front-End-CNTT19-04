<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu mẫu đăng </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow p-4 rounded-3">
                    <h3 class="text-center mb-4 text-primary">Đăng nhập</h3>
                    <form bindsubmit="" method="post" action="#">
                        <div class="mb-3">
                            <label for="inputEmail" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="inputEmail" placeholder="Nhập địa chỉ email" required>
                        </div>
                        <div class="mb-3">
                            <label for="inputPassword" class="form-label fw-bold">Mật khẩu :</label>
                            <input type="password" class="form-control" id="inputPassword" placeholder="Nhập mật khẩu">
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberme"><label for="rememberme" class="form-check-label">Ghi nhớ tôi</label>
                            </div>
                            <a href="#" class="text-decoration-none small">Quên mật khẩu</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Đăng nhập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
