<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính khuyến mãi</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .box{
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input, select, button{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            background: blue;
            color: white;
            border: none;
        }

        p{
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>TÍNH KHUYẾN MÃI</h2>

        <input type="number" id="giaTien" placeholder="Nhập giá trị đơn hàng">

        <select id="thanhVien">
            <option value="0">Thường</option>
            <option value="5">Bạc - giảm thêm 5%</option>
            <option value="10">Vàng - giảm thêm 10%</option>
        </select>

        <button onclick="tinhTien()">Tính tiền</button>

        <p id="kq"></p>
    </div>

    <script>

        function tinhTien(){

            let tien = Number(document.getElementById("giaTien").value);
            let tv = Number(document.getElementById("thanhVien").value);

            let giam = 0;

            // khuyến mãi theo giá tiền
            if(tien >= 1000000){
                giam = 20;
            }
            else if(tien >= 500000){
                giam = 10;
            }
            else if(tien >= 200000){
                giam = 5;
            }
            else{
                giam = 0;
            }

            // cộng thêm giảm giá thành viên
            giam = giam + tv;

            let tienGiam = tien * giam / 100;
            let thanhToan = tien - tienGiam;

            document.getElementById("kq").innerHTML =
                "Tiền gốc: " + tien.toLocaleString() + "đ <br>" +
                "Tỷ lệ giảm: " + giam + "% <br>" +
                "Tiền giảm: " + tienGiam.toLocaleString() + "đ <br>" +
                "Cần thanh toán: " + thanhToan.toLocaleString() + "đ";
        }

    </script>

</body>
</html>
