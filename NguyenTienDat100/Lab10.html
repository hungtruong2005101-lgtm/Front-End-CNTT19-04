<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 10 - Fetch API JSON</title>
    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        .container{
            width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        .user{
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
            background: #fafafa;
        }

        .loading{
            text-align: center;
            color: blue;
            font-size: 18px;
        }

        .error{
            text-align: center;
            color: red;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LAB 10 - HIỂN THỊ DỮ LIỆU JSON</h1>
        <div id="output" class="loading">Đang tải dữ liệu...</div>
    </div>
    <script>
        async function loadUsers(){
            let output = document.getElementById("output");
            try{
                let response = await fetch(
                    "https://jsonplaceholder.typicode.com/users"
                );
                let users = await response.json();
                let html = "";
                users.forEach(function(user){
                    html += `
                        <div class="user">
                            <p><b>ID:</b> ${user.id}</p>
                            <p><b>Tên:</b> ${user.name}</p>
                            <p><b>Email:</b> ${user.email}</p>
                            <p><b>Thành phố:</b> ${user.address.city}</p>
                        </div>
                    `;
                });
                output.innerHTML = html;
            }
            catch(error){
                output.innerHTML = `
                    <div class="error">
                        Không thể tải dữ liệu!
                    </div>
                `;

            }
        }
        loadUsers();
    </script>
</body>
</html>
