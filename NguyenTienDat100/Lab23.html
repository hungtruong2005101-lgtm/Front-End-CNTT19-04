<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danh sách sản phẩm</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color:#f5f5f5;
        }

        .card img{
            height:220px;
            object-fit:cover;
        }

        .card{
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Danh Sách Sản Phẩm</h2>
    <div class="row g-4">
        <!-- Sản phẩm 1 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
            <div class="card shadow rounded">
                <span class="badge bg-danger position-absolute m-2">-20%</span>
                <img src="https://www.forbes.com.au/wp-content/uploads/2023/09/Apple-iPhone-15-Pro-lineup-color-lineup-geo-230912_big.jpg.large_2x.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">iPhone 15</h5>
                    <p class="text-danger fw-bold">20.000.000đ</p>
                    <button class="btn btn-primary">Mua ngay</button>
                </div>
            </div>
        </div>

        <!-- Sản phẩm 2 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
            <div class="card shadow rounded">
                <img src="https://www.cnet.com/a/img/resize/3bf30f6292574521381b20796f95c9114d96e8a0/hub/2024/01/15/8095bca1-bc1c-41a7-8294-e32d1e102449/p1021005.jpg?auto=webp&width=1200" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Samsung S24</h5>
                    <p class="text-danger fw-bold">18.500.000đ</p>
                    <button class="btn btn-success">Mua ngay</button>
                </div>
            </div>
        </div>
        <!-- Sản phẩm 3 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
            <div class="card shadow rounded">
                <img src="https://rog.asus.com/media/1735949595139.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Laptop Asus</h5>
                    <p class="text-danger fw-bold">22.000.000đ</p>
                    <button class="btn btn-warning">Mua ngay</button>
                </div>
            </div>
        </div>
        <!-- Sản phẩm 4 -->
         <div class="col-lg-4 col-md-6 col-sm-12">
            <div class="card shadow rounded">
                <img src="https://cdnv2.tgdd.vn/mwg-static/common/News/1465910/top-10-tai-nghe-tot-nhat-hien-nay-co-am-thanh-12.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Tai nghe Sony</h5>
                    <p class="text-danger fw-bold">2.500.000đ</p>
                    <button class="btn btn-dark">Mua ngay</button>
                </div>
            </div>
        </div>
        <!-- Sản phẩm 5 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
            <div class="card shadow rounded">
                <img src="https://static1.pocketnowimages.com/wordpress/wp-content/uploads/2022/09/Apple-Watch-Series-8-Featured-Image.png" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Apple Watch</h5>
                    <p class="text-danger fw-bold">8.000.000đ</p>
                    <button class="btn btn-info">Mua ngay</button>
                </div>
            </div>
        </div>
        <!-- Sản phẩm 6 -->
        <div class="col-lg-4 col-md-6 col-sm-12">
            <div class="card shadow rounded">
                <img src="https://fitgearshop.vn/files/product/loa-bluetooth-sony-mhc-v43d-gq4kb3y8.png" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Loa Bluetooth</h5>
                    <p class="text-danger fw-bold"> 1.500.000đ</p>
                    <button class="btn btn-secondary">Mua ngay</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
