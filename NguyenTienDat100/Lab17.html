<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 17 - Mô phỏng chức năng giỏ hàng</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .cart-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
        }
        .product-info {
            flex: 2;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.1em;
        }
        .product-price {
            color: #888;
        }
        .quantity-controls {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-qty {
            width: 30px;
            height: 30px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-qty:hover {
            background-color: #0056b3;
        }
        .inp-qty {
            width: 40px;
            text-align: center;
            height: 26px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .product-subtotal {
            flex: 1;
            text-align: right;
            font-weight: bold;
            color: #28a745;
        }
        .cart-total {
            margin-top: 20px;
            text-align: right;
            font-size: 1.3em;
            font-weight: bold;
            color: #dc3545;
            padding-top: 10px;
            border-top: 2px solid #333;
        }
    </style>
</head>
<body>
<div class="cart-container">
    <h2>Giỏ Hàng Của Bạn</h2>
    <div class="cart-items">
        <div class="product-item" data-price="150000">
            <div class="product-info">
                <div class="product-name">Áo thun nam Polo</div>
                <div class="product-price">Đơn giá: 150.000đ</div>
            </div>
            <div class="quantity-controls">
                <button class="btn-qty btn-minus">-</button>
                <input type="text" class="inp-qty" value="1" readonly>
                <button class="btn-qty btn-plus">+</button>
            </div>
            <div class="product-subtotal">Thành tiền: <span>150.000</span>đ</div>
        </div>
        <div class="product-item" data-price="250000">
            <div class="product-info">
                <div class="product-name">Quần Jean Slimfit</div>
                <div class="product-price">Đơn giá: 250.000đ</div>
            </div>
            <div class="quantity-controls">
                <button class="btn-qty btn-minus">-</button>
                <input type="text" class="inp-qty" value="1" readonly>
                <button class="btn-qty btn-plus">+</button>
            </div>
            <div class="product-subtotal">Thành tiền: <span>250.000</span>đ</div>
        </div>
        <div class="product-item" data-price="50000">
            <div class="product-info">
                <div class="product-name">Vớ thể thao (Cặp)</div>
                <div class="product-price">Đơn giá: 50.000đ</div>
            </div>
            <div class="quantity-controls">
                <button class="btn-qty btn-minus">-</button>
                <input type="text" class="inp-qty" value="1" readonly>
                <button class="btn-qty btn-plus">+</button>
            </div>
            <div class="product-subtotal">Thành tiền: <span>50.000</span>đ</div>
        </div>
    </div>
    <div class="cart-total">
        Tổng cộng: <span id="total-cart-price">450.000</span>đ
    </div>
</div>
<script>
$(document).ready(function() {
    // Hàm định dạng số thành chuỗi tiền tệ (Ví dụ: 150000 -> 150.000)
    function formatCurrency(num) {
        return num.toString().replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
    }
    // Hàm tính toán lại thành tiền của từng sản phẩm và tổng tiền cả giỏ hàng
    function updateCart() {
        let totalCart = 0;
        // Duyệt qua từng sản phẩm trong giỏ hàng
        $('.product-item').each(function() {
            // Lấy đơn giá lưu trong thuộc tính data-price
            let price = parseInt($(this).attr('data-price'));
            // Lấy số lượng hiện tại từ ô input
            let qty = parseInt($(this).find('.inp-qty').val());
            // Tính thành tiền = số lượng x đơn giá
            let subtotal = price * qty;
            // Cập nhật thành tiền lên giao diện của sản phẩm đó
            $(this).find('.product-subtotal span').text(formatCurrency(subtotal));
            // Cộng dồn vào tổng hóa đơn giỏ hàng
            totalCart += subtotal;
        });
        // Cập nhật tổng hóa đơn lên giao diện
        $('#total-cart-price').text(formatCurrency(totalCart));
    }
    // Xử lý sự kiện bấm nút TĂNG số lượng (+)
    $('.btn-plus').click(function() {
        let inputQty = $(this).siblings('.inp-qty');
        let currentQty = parseInt(inputQty.val());
        // Tăng số lượng lên 1
        inputQty.val(currentQty + 1);
        // Gọi hàm tính toán và cập nhật giao diện
        updateCart();
    });
    // Xử lý sự kiện bấm nút GIẢM số lượng (-)
    $('.btn-minus').click(function() {
        let inputQty = $(this).siblings('.inp-qty');
        let currentQty = parseInt(inputQty.val());
        // Quy ước: Không cho phép số lượng nhỏ hơn 1
        if (currentQty > 1) {
            inputQty.val(currentQty - 1);
            // Gọi hàm tính toán và cập nhật giao diện
            updateCart();
        } else {
            alert("Số lượng sản phẩm tối thiểu phải là 1!");
        }
    });
});
</script>
</body>
</html>
