<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài lab 21</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h2>Quản lý thành viên</h2>
    <form id="memberForm">
        <input type="text" id="memberId" placeholder="ID (để trống khi thêm mới)" readonly><br><br>
        <input type="text" id="name" placeholder="Họ và tên"><br><br>
        <input type="text" id="email" placeholder="Email"><br><br>
        <input type="text" id="phone" placeholder="Số điện thoại"><br><br>
        <button type="submit" id="btnSubmit">Thêm mới</button>
    </form>
    <br>
    <input type="text" id="search" placeholder="Tìm kiếm theo tên..."><br><br>
    <table border="1" id="memberTable">
        <thead>
            <tr>
                <th>Họ và tên</th>
                <th>Email</th>
                <th>Số điện thoại</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
        $(document).ready(function() {
            var apiUrl = 'https://5f50ca542b5a260016e8bfb0.mockapi.io/api/v1/members';
            var allMembers = [];

            function loadMembers() {
                $.ajax({
                    url: apiUrl,
                    type: 'GET',
                    success: function(data) {
                        allMembers = data;
                        renderTable(allMembers);
                    }
                });
            }
            function renderTable(data) {
                var rows = '';
                $.each(data, function(index, member) {
                    rows += '<tr>';
                    rows += '<td>' + member.name + '</td>';
                    rows += '<td>' + member.email + '</td>';
                    rows += '<td>' + member.phone + '</td>';
                    rows += '<td>';
                    rows += '<button class="btn-edit" data-id="' + member.id + '">Sửa</button> ';
                    rows += '<button class="btn-delete" data-id="' + member.id + '">Xóa</button>';
                    rows += '</td>';
                    rows += '</tr>';
                });
                $('#memberTable tbody').html(rows);
            }
            loadMembers();
            $('#memberForm').submit(function(e) {
                e.preventDefault();
                var id = $('#memberId').val();
                var formData = {
                    name: $('#name').val(),
                    email: $('#email').val(),
                    phone: $('#phone').val()
                };
                if (id === '') {
                    $.ajax({
                        url: apiUrl,
                        type: 'POST',
                        data: formData,
                        success: function() {
                            $('#memberForm')[0].reset();
                            loadMembers();
                        }
                    });
                } else {
                    $.ajax({
                        url: apiUrl + '/' + id,
                        type: 'PUT',
                        data: formData,
                        success: function() {
                            $('#memberId').val('');
                            $('#memberForm')[0].reset();
                            $('#btnSubmit').text('Thêm mới');
                            loadMembers();
                        }
                    });
                }
            });
            $(document).on('click', '.btn-edit', function() {
                var id = $(this).data('id');
                $.ajax({
                    url: apiUrl + '/' + id,
                    type: 'GET',
                    success: function(member) {
                        $('#memberId').val(member.id);
                        $('#name').val(member.name);
                        $('#email').val(member.email);
                        $('#phone').val(member.phone);
                        $('#btnSubmit').text('Cập nhật');
                    }
                });
            });
            $(document).on('click', '.btn-delete', function() {
                var id = $(this).data('id');
                if (confirm('Bạn có muốn xóa không?')) {
                    $.ajax({
                        url: apiUrl + '/' + id,
                        type: 'DELETE',
                        success: function() {
                            loadMembers();
                        }
                    });
                }
            });
            $('#search').keyup(function() {
                var keyword = $(this).val().toLowerCase();
                var filtered = allMembers.filter(function(member) {
                    return member.name.toLowerCase().indexOf(keyword) > -1;
                });
                renderTable(filtered);
            });
        });
    </script>
</body>
</html>
