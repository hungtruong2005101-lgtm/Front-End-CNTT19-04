<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 09 - To Do List</title>
    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        .container{
            width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        .input-group{
            display: flex;
            gap: 10px;
        }

        input{
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button{
            padding: 10px 15px;
            border: none;
            background: darkblue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: blue;
        }

        ul{
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li{
            background: #eee;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .done{
            text-decoration: line-through;
            color: gray;
        }

        .btn-group button{
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QUẢN LÝ CÔNG VIỆC</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Nhập công việc...">
            <button onclick="themCongViec()">Thêm</button>
        </div>
        <ul id="taskList"></ul>
    </div>
    <script>
        let tasks = [];
        function renderTasks(){
            let taskList = document.getElementById("taskList");
            taskList.innerHTML = "";
            tasks.forEach(function(task, index){
                let li = document.createElement("li");
                if(task.completed){
                    li.classList.add("done");
                }
                li.innerHTML = `
                    <span>${task.name}</span>
                    <div class="btn-group">
                        <button onclick="hoanThanh(${index})">
                            ✓
                        </button>
                        <button onclick="xoaCongViec(${index})">
                            Xóa
                        </button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }
        function themCongViec(){
            let input = document.getElementById("taskInput");
            let taskName = input.value.trim();
            if(taskName === ""){
                alert("Vui lòng nhập công việc!");
                return;
            }
            tasks.push({
                name: taskName,
                completed: false
            });
            input.value = "";
            renderTasks();
        }
        function hoanThanh(index){
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        }
        function xoaCongViec(index){
            tasks.splice(index, 1);
            renderTasks();
        }
    </script>
</body>
</html>
