<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Form Đăng Nhập Responsive</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background-color: #f3f4f6;
        }

        .login-box{
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="row justify-content-center align-items-center vh-100">

            <!-- Responsive -->
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="login-box">

                    <h2 class="text-center mb-4">
                        ĐĂNG NHẬP
                    </h2>

                    <!-- Form -->
                    <form>

                        <!-- Email -->
                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                placeholder="Nhập email"
                            >

                        </div>

                        <!-- Mật khẩu -->
                        <div class="mb-3">

                            <label class="form-label">
                                Mật khẩu
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                placeholder="Nhập mật khẩu"
                            >

                        </div>

                        <!-- Checkbox -->
                        <div class="mb-3 form-check">

                            <input
                                type="checkbox"
                                class="form-check-input"
                                id="remember"
                            >

                            <label
                                class="form-check-label"
                                for="remember"
                            >
                                Ghi nhớ đăng nhập
                            </label>

                        </div>

                        <!-- Quên mật khẩu -->
                        <div class="mb-3 text-end">

                            <a href="#">
                                Quên mật khẩu?
                            </a>

                        </div>

                        <!-- Button -->
                        <button
                            type="submit"
class="btn btn-primary w-100"
                        >
                            Đăng nhập
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
