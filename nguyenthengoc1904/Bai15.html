<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Form đăng ký</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .container{
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1{
            text-align: center;
        }

        .form-group{
            margin-bottom: 15px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 10px;
            border: none;
            background: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .error{
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        .success{
            color: green;
            text-align: center;
            margin-top: 15px;
        }

        .invalid{
            border: 2px solid red;
        }

        .valid{
            border: 2px solid green;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>ĐĂNG KÝ TÀI KHOẢN</h1>

        <form id="registerForm">

            <div class="form-group">

                <label>Họ tên</label>

                <input type="text" id="fullname">

                <div class="error" id="nameError"></div>

            </div>


            <div class="form-group">

                <label>Email</label>

                <input type="text" id="email">

                <div class="error" id="emailError"></div>

            </div>


            <div class="form-group">

                <label>Mật khẩu</label>

                <input type="password" id="password">

                <div class="error" id="passwordError"></div>

            </div>


            <div class="form-group">

                <label>Xác nhận mật khẩu</label>

                <input type="password" id="confirmPassword">

                <div class="error" id="confirmError"></div>

            </div>


            <button type="submit">
                Đăng ký
            </button>

        </form>

        <div class="success" id="successMessage"></div>

    </div>

    <script>

        $("#registerForm").submit(function(event){

            event.preventDefault();


            $(".error").text("");

            $("#successMessage").text("");

            $("input")
                .removeClass("invalid valid");


            let fullname =
                $("#fullname").val().trim();

            let email =
                $("#email").val().trim();

            let password =
                $("#password").val().trim();

            let confirmPassword =
                $("#confirmPassword").val().trim();


            let isValid = true;


            if(fullname === ""){

                $("#nameError")
                    .text("Vui lòng nhập họ tên");

                $("#fullname")
                    .addClass("invalid");

                isValid = false;
            }
            else{

                $("#fullname")
                    .addClass("valid");
            }

            let emailRegex =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(email === ""){

                $("#emailError")
                    .text("Vui lòng nhập email");

                $("#email")
                    .addClass("invalid");

                isValid = false;
            }
            else if(!emailRegex.test(email)){

                $("#emailError")
                    .text("Email không hợp lệ");

                $("#email")
                    .addClass("invalid");

                isValid = false;
            }
            else{

                $("#email")
                    .addClass("valid");
            }

            if(password === ""){

                $("#passwordError")
                    .text("Vui lòng nhập mật khẩu");

                $("#password")
                    .addClass("invalid");

                isValid = false;
            }
            else if(password.length < 6){

                $("#passwordError")
                    .text("Mật khẩu tối thiểu 6 ký tự");

                $("#password")
                    .addClass("invalid");

                isValid = false;
            }
            else{

                $("#password")
                    .addClass("valid");
            }


            if(confirmPassword === ""){

                $("#confirmError")
                    .text("Vui lòng xác nhận mật khẩu");

                $("#confirmPassword")
                    .addClass("invalid");

                isValid = false;
            }
            else if(confirmPassword !== password){

                $("#confirmError")
                    .text("Mật khẩu không khớp");

                $("#confirmPassword")
                    .addClass("invalid");

                isValid = false;
            }
            else{

                $("#confirmPassword")
                    .addClass("valid");
            }


            if(isValid){

                $("#successMessage")
                    .text("Đăng ký thành công!");
            }

        });

    </script>

</body>
</html>
