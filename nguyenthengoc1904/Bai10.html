<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản Lý Sinh Viên</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body{
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    padding: 40px;
}

.container{
    width: 1000px;
    margin: auto;
}

.title{
    text-align: center;
    color: white;
    font-size: 40px;
    margin-bottom: 30px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

.form-box{
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    margin-bottom: 30px;
}

.form-box h2{
    margin-bottom: 20px;
    color: #333;
}

.form-group{
    display: flex;
    gap: 15px;
}

.form-group input{
    flex: 1;
    padding: 14px;
    border: 2px solid #ddd;
    border-radius: 12px;
    outline: none;
    font-size: 16px;
    transition: 0.3s;
}

.form-group input:focus{
    border-color: #667eea;
}

.add-btn{
    padding: 14px 25px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.add-btn:hover{
    transform: scale(1.05);
}

#message{
    margin-top: 15px;
    font-weight: bold;
}

.student-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
    gap: 20px;
}

.student-card{
    background: white;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.student-card:hover{
    transform: translateY(-8px);
}

.student-card::before{
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.avatar{
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
}

.student-card h3{
    margin-bottom: 10px;
    color: #333;
}

.student-card p{
    margin-bottom: 8px;
    color: #666;
}

.btn-group{
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.edit-btn{
    flex: 1;
    padding: 10px;
    border: none;
    background: #ffc107;
    color: black;
    border-radius: 10px;
    cursor: pointer;
}

.delete-btn{
    flex: 1;
    padding: 10px;
    border: none;
    background: #f44336;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

.edit-btn:hover,
.delete-btn:hover{
    opacity: 0.8;
}

</style>

</head>
<body>

<div class="container">

    <h1 class="title">🎓 Quản Lý Sinh Viên</h1>

    <div class="form-box">

        <h2>Thêm Sinh Viên</h2>

        <div class="form-group">

            <input type="hidden" id="studentId">

            <input type="text" id="name" placeholder="Nhập họ tên">

            <input type="number" id="age" placeholder="Nhập tuổi">

            <input type="email" id="email" placeholder="Nhập email">

            <button class="add-btn" onclick="saveStudent()">
                Lưu
            </button>

        </div>

        <p id="message"></p>

    </div>

    <div class="student-grid" id="studentList">

    </div>

</div>

<script>

const API_URL =
"https://6a1843d91878294b597cb585.mockapi.io/api/v1/students";

function loadStudents(){

    $.ajax({

        url: API_URL,
        method: "GET",

        success: function(data){

            $("#studentList").html("");

            data.forEach(student => {

                let firstLetter =
                student.name.charAt(0).toUpperCase();

                $("#studentList").append(`

                    <div class="student-card">

                        <div class="avatar">
                            ${firstLetter}
                        </div>

                        <h3>${student.name}</h3>

                        <p>🎂 Tuổi: ${student.age}</p>

                        <p>📧 ${student.email}</p>

                        <div class="btn-group">

                            <button
                                class="edit-btn"

                                onclick="editStudent(
                                    '${student.id}',
                                    '${student.name}',
                                    '${student.age}',
                                    '${student.email}'
                                )"
                            >
                                Sửa
                            </button>

                            <button
                                class="delete-btn"

                                onclick="deleteStudent('${student.id}')"
                            >
                                Xóa
                            </button>

                        </div>

                    </div>

                `);

            });

        }

    });

}

function saveStudent(){

    let id = $("#studentId").val();

    let student = {

        name: $("#name").val(),
        age: $("#age").val(),
        email: $("#email").val()

    };

    if(
        student.name === "" ||
        student.age === "" ||
        student.email === ""
    ){

        $("#message")
        .text("Vui lòng nhập đầy đủ thông tin!")
        .css("color","red");

        return;
    }



    if(id === ""){

        $.ajax({

            url: API_URL,
            method: "POST",
            data: student,

            success: function(){

                $("#message")
                .text("Thêm sinh viên thành công!")
                .css("color","green");

                clearForm();

                loadStudents();

            }

        });

    }

    else{

        $.ajax({

            url: `${API_URL}/${id}`,
            method: "PUT",
            data: student,

            success: function(){

                $("#message")
                .text("Cập nhật thành công!")
                .css("color","green");

                clearForm();

                loadStudents();

            }

        });

    }

}


function editStudent(id,name,age,email){

    $("#studentId").val(id);

    $("#name").val(name);

    $("#age").val(age);

    $("#email").val(email);

}

function deleteStudent(id){

    if(confirm("Bạn có chắc muốn xóa?")){

        $.ajax({

            url: `${API_URL}/${id}`,
            method: "DELETE",

            success: function(){

                loadStudents();

            }

        });

    }

}


function clearForm(){

    $("#studentId").val("");

    $("#name").val("");

    $("#age").val("");

    $("#email").val("");

}


loadStudents();

</script>

</body>
</html>
