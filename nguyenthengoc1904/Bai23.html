<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Lab 23</title>
</head>
<style>
    .card-img-top{
        height: 250px;
        object-fit: cover;
    }

    .card{
        height: 100%;
    }
</style>
<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">Danh Sách Sản Phẩm</h2>

        <div class="row g-4">

            <!-- Sản phẩm 1 -->
            <div class="col-lg-4 col-md-6 col-12">
                <div class="card shadow rounded">

                    <img 
                        src="./samsung.avif"
                        class="card-img-top"
                    >

                    <div class="card-body">

                        <span class="badge bg-danger mb-2">
                            Giảm giá
                        </span>

                        <h5 class="card-title">
                            Điện thoại Samsung
                        </h5>

                        <p class="card-text text-danger">
                            8.000.000đ
                        </p>

                        <button class="btn btn-primary w-100">
                            Mua ngay
                        </button>

                    </div>
                </div>
            </div>

            <!-- Sản phẩm 2 -->
            <div class="col-lg-4 col-md-6 col-12">
                <div class="card shadow rounded">

                    <img 
                        src="./dell.webp"
                        class="card-img-top"
                    >

                    <div class="card-body">
                        <h5 class="card-title">
                            Laptop Dell
                        </h5>

                        <p class="card-text text-danger">
                            15.000.000đ
                        </p>

                        <button class="btn btn-primary w-100">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 3 -->
            <div class="col-lg-4 col-md-6 col-12">
                <div class="card shadow rounded">

                    <img 
                        src="./tai nghe.jpg"
                        class="card-img-top"
                    >

                    <div class="card-body">
                        <h5 class="card-title">
                            Tai nghe Bluetooth
                        </h5>

                        <p class="card-text text-danger">
                            500.000đ
                        </p>

                        <button class="btn btn-primary w-100">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 4 -->
            <div class="col-lg-4 col-md-6 col-12">
                <div class="card shadow rounded">

                    <img 
                        src="./đồng hồ.jpg"
                        class="card-img-top"
                    >

                    <div class="card-body">
                        <h5 class="card-title">
                            Đồng hồ thông minh
                        </h5>

                        <p class="card-text text-danger">
                            2.000.000đ
                        </p>

                        <button class="btn btn-primary w-100">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 5 -->
            <div class="col-lg-4 col-md-6 col-12">
                <div class="card shadow rounded">

                    <img 
                        src="./chuột.png"
                        class="card-img-top"
                    >

                    <div class="card-body">
                        <h5 class="card-title">
                            Chuột Gaming
                        </h5>

                        <p class="card-text text-danger">
                            700.000đ
                        </p>

                        <button class="btn btn-primary w-100">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 6 -->
            <div class="col-lg-4 col-md-6 col-12">
                <div class="card shadow rounded">

                    <img 
                        src="./bàn phím.webp"
                        class="card-img-top"
                    >

                    <div class="card-body">
                        <h5 class="card-title">
                            Bàn phím cơ
                        </h5>

                        <p class="card-text text-danger">
                            1.200.000đ
                        </p>

                        <button class="btn btn-primary w-100">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
