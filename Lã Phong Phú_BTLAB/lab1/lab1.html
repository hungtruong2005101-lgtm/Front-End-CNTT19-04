<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính BMI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, button { margin: 5px 0; padding: 5px; }
        .result { font-weight: bold; color: blue; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>Phần mềm tính BMI</h2>
    
    <label>Chiều cao (m): <input type="number" id="height" step="0.01"></label><br>
    <label>Cân nặng (kg): <input type="number" id="weight"></label><br>
    
    <button id="btnCalc">Tính BMI</button>
    
    <p id="resultDisplay" class="result"></p>

    <script src="app.js"></script>
</body>
</html>
