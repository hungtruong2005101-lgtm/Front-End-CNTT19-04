<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 09 - To-do List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .todo-container { width: 450px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background: #f9f9f9; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; background: #fff; }
        .task-item.completed span { text-decoration: line-through; color: #888; }
        input[type="text"] { width: 75%; padding: 8px; }
        button { padding: 8px 12px; cursor: pointer; border: none; background: #007bff; color: #fff; border-radius: 4px; }
        .btn-group button { margin-left: 5px; font-size: 12px; }
        .btn-delete { background: #dc3545; }
        .btn-complete { background: #28a745; }
    </style>
</head>
<body>
    <div class="todo-container">
        <h2>Danh sách công việc</h2>
        <div>
            <input type="text" id="taskInput" placeholder="Nhập công việc mới...">
            <button id="btnAdd">Thêm</button>
        </div>
        <div id="taskList" style="margin-top: 20px;"></div>
    </div>

    <script>
        let tasks = [];
        let taskInput = document.getElementById("taskInput");
        let taskListEl = document.getElementById("taskList");

        function renderTasks() {
            taskListEl.innerHTML = "";
            for (let i = 0; i < tasks.length; i++) {
                let task = tasks[i];
                let itemDiv = document.createElement("div");
                itemDiv.className = task.completed ? "task-item completed" : "task-item";
                
                let textSpan = document.createElement("span");
                textSpan.innerText = task.name;
                
                let btnGroup = document.createElement("div");
                btnGroup.className = "btn-group";
                let btnComplete = document.createElement("button");
                btnComplete.className = "btn-complete";
                btnComplete.innerText = task.completed ? "Hoàn tác" : "Xong";
                btnComplete.addEventListener("click", function() {
                    tasks[i].completed = !tasks[i].completed;
                    renderTasks();
                });
        
                let btnDelete = document.createElement("button");
                btnDelete.className = "btn-delete";
                btnDelete.innerText = "Xóa";
                btnDelete.addEventListener("click", function() {
                    tasks.splice(i, 1);
                    renderTasks();
                });
                
                btnGroup.appendChild(btnComplete);
                btnGroup.appendChild(btnDelete);
                
                itemDiv.appendChild(textSpan);
                itemDiv.appendChild(btnGroup);
                
                taskListEl.appendChild(itemDiv);
            }
        }

        document.getElementById("btnAdd").addEventListener("click", function() {
            let taskName = taskInput.value.trim();
            if (taskName !== "") {
                tasks.push({ name: taskName, completed: false });
                taskInput.value = "";
                renderTasks();
            }
        });
    </script>
</body>
</html>
