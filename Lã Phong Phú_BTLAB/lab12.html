<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 12 - Quản lý Đơn hàng (CRUD)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f4f4f4; }
        .form-group { margin-bottom: 10px; }
        input { padding: 6px; }
        button { padding: 6px 12px; cursor: pointer; }
        .btn-del { background: #dc3545; color: white; border: none; border-radius: 3px; }
        .btn-add { background: #28a745; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Quản lý Đơn hàng </h2>
    
    <div style="border: 1px solid #ddd; padding: 15px; width: 400px; margin-bottom: 20px;">
        <h3>Thêm đơn hàng mới</h3>
        <div class="form-group">
            <input type="text" id="custName" placeholder="Tên khách hàng">
        </div>
        <div class="form-group">
            <input type="number" id="orderTotal" placeholder="Tổng tiền (VNĐ)">
        </div>
        <button id="btnAdd" class="btn-add">Thêm vào hệ thống</button>
    </div>

    <button id="btnLoad">Tải danh sách mới nhất</button>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Khách hàng</th>
                <th>Tổng tiền</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="4">Chưa có dữ liệu. Hãy bấm tải danh sách.</td></tr>
        </tbody>
    </table>

    <script>
        const API_URL = "https://65f5a89441d90c1c5e0a0d4c.mockapi.io/users";

        function fetchAndRenderOrders() {
            document.getElementById("tableBody").innerHTML = "<tr><td colspan='4'>Đang tải...</td></tr>";
            
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    let html = "";
                    for(let i = 0; i < data.length; i++) {
                        let item = data[i];
                        html += `
                            <tr>
                                <td>${item.id}</td>
                                <td>${item.customerName}</td>
                                <td>${item.total}</td>
                                <td><button class="btn-del" onclick="deleteOrder(${item.id})">Xóa</button></td>
                            </tr>
                        `;
                    }
                    if(data.length === 0) html = "<tr><td colspan='4'>Không có dữ liệu</td></tr>";
                    document.getElementById("tableBody").innerHTML = html;
                });
        }

        document.getElementById("btnAdd").addEventListener("click", function() {
            let name = document.getElementById("custName").value;
            let total = document.getElementById("orderTotal").value;

            if(!name || !total) {
                alert("Vui lòng nhập đủ thông tin!");
                return;
            }

            let newOrder = {
                customerName: name,
                total: Number(total)
            };

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(newOrder)
            })
            .then(res => res.json())
            .then(() => {
                alert("Thêm thành công!");
                document.getElementById("custName").value = "";
                document.getElementById("orderTotal").value = "";
                fetchAndRenderOrders(); // Cập nhật lại bảng
            });
        });

        function deleteOrder(id) {
            if(confirm("Bạn có chắc chắn muốn xóa đơn hàng #" + id + "?")) {
                fetch(API_URL + "/" + id, {
                    method: "DELETE"
                })
                .then(() => {
                    alert("Đã xóa đơn hàng!");
                    fetchAndRenderOrders(); 
                });
            }
        }

        document.getElementById("btnLoad").addEventListener("click", fetchAndRenderOrders);
        
        // Tự động tải lần đầu
        fetchAndRenderOrders();
    </script>
</body>
</html>
