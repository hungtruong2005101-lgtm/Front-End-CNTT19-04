<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 22 - Đăng nhập Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Thêm một chút CSS để căn giữa form giữa màn hình cho đẹp mắt */
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-md-6 col-lg-4">
            
            <div class="card shadow-sm p-4 bg-white rounded">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4 fw-bold text-primary">ĐĂNG NHẬP</h3>
                    
                    <form>
                        <div class="mb-3">
                            <label for="emailInput" class="form-label fw-semibold">Địa chỉ Email</label>
                            <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="passwordInput" class="form-label fw-semibold">Mật khẩu</label>
                            <input type="password" class="form-control" id="passwordInput" placeholder="Nhập mật khẩu" required>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-secondary" for="rememberMe">
                                    Ghi nhớ đăng nhập
                                </label>
                            </div>
                            <div>
                                <a href="#" class="text-decoration-none small">Quên mật khẩu?</a>
                            </div>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-bold py-2">Đăng nhập</button>
                        </div>
                    </form>
                    
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
