<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 07 - DOM</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        .container{
            width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            text-align: center;
        }

        h1{
            color: darkblue;
        }

        p{
            font-size: 18px;
        }

        img{
            width: 300px;
            border-radius: 10px;
            margin-top: 10px;
        }

        button{
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background: darkblue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: blue;
        }

        .dark{
            background: black;
            color: white;
        }

    </style>

</head>
<body>

    <div class="container" id="box">

        <h1 id="title">CHÀO MỪNG BẠN</h1>

        <p id="text">
            Đây là bài thực hành DOM cơ bản.
        </p>

        <img 
            id="image"
            src="https://picsum.photos/300/200"
        >

        <br>

        <button onclick="thayDoiNoiDung()">
            Thay đổi nội dung
        </button>

        <button onclick="khoiPhuc()">
            Khôi phục
        </button>

    </div>

    <script>

        function thayDoiNoiDung(){

            document.getElementById("title").innerText =
            "DOM ĐÃ THAY ĐỔI";

            document.getElementById("text").innerText =
            "Nội dung đã được cập nhật bằng JavaScript.";

            document.getElementById("image").src =
            "https://picsum.photos/300/201";

            document.getElementById("box").classList.add("dark");

        }

        function khoiPhuc(){

            document.getElementById("title").innerText =
            "CHÀO MỪNG BẠN";

            document.getElementById("text").innerText =
            "Đây là bài thực hành DOM cơ bản.";

            document.getElementById("image").src =
            "https://picsum.photos/300/200";

            document.getElementById("box").classList.remove("dark");

        }

    </script>

</body>
</html>
