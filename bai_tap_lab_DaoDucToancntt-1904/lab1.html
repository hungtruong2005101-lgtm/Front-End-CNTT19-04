<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BMI</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .box{
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        #ketqua{
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>Tinh BMI</h1>

        <label>Chieu cao</label>
        <input type="text" id="chieucao">

        <label>Can nang</label>
        <input type="text" id="cannang">

        <button onclick="tinhBMI()">Tinh</button>

        <div id="ketqua"></div>

    </div>

    <script>

        function tinhBMI(){

            let chieuCao = Number(document.getElementById("chieucao").value);

            let canNang = Number(document.getElementById("cannang").value);

            if(chieuCao <= 0 || canNang <= 0){

                document.getElementById("ketqua").innerText =
                "Du lieu khong hop le";

                return;
            }

            let bmi = canNang / (chieuCao * chieuCao);

            bmi = bmi.toFixed(2);

            let xepLoai = "";

            if(bmi < 18.5){
                xepLoai = "Gay";
            }
            else if(bmi < 25){
                xepLoai = "Binh thuong";
            }
            else if(bmi < 30){
                xepLoai = "Thua can";
            }
            else{
                xepLoai = "Beo phi";
            }

            document.getElementById("ketqua").innerText =
            "BMI: " + bmi + " - " + xepLoai;

        }

    </script>

</body>
</html>
