<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fetch API</title>

    <style>

        body{
            font-family: Arial;
            background: #f5f5f5;
        }

        .box{
            width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        h1{
            text-align: center;
        }

        .user{
            border-bottom: 1px solid gray;
            padding: 15px 0;
            line-height: 30px;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>Danh Sach Nguoi Dung</h1>

        <div id="ketqua"></div>

    </div>

    <script>

        fetch("https://jsonplaceholder.typicode.com/users")

        .then(function(response){

            return response.json();

        })

        .then(function(data){

            let html = "";

            for(let i = 0; i < data.length; i++){

                html +=

                "<div class='user'>" +

                "Ten: " + data[i].name + "<br>" +

                "Email: " + data[i].email + "<br>" +

                "Phone: " + data[i].phone +

                "</div>";

            }

            document.getElementById("ketqua").innerHTML = html;

        });

    </script>

</body>
</html>
