<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quan Ly Sinh Vien</title>

    <style>

        body{
            font-family: Arial;
            background: #eef2f3;
        }

        .box{
            width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        h1{
            text-align: center;
        }

        input{
            width: 40%;
            padding: 10px;
            margin-right: 10px;
        }

        button{
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
        }

        .item{
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>Quan Ly Sinh Vien</h1>

        <input type="text" id="ten" placeholder="Nhap ten">

        <input type="text" id="lop" placeholder="Nhap lop">

        <button onclick="themSinhVien()">
            Them
        </button>

        <div id="danhsach"></div>

    </div>

    <script>

        let sinhVien = [];

        function hienThi(){

            let html = "";

            for(let i = 0; i < sinhVien.length; i++){

                html +=

                "<div class='item'>" +

                "Ten: " + sinhVien[i].ten +

                " - Lop: " + sinhVien[i].lop +

                " <button onclick='xoaSinhVien(" + i + ")'>Xoa</button>" +

                "</div>";

            }

            document.getElementById("danhsach").innerHTML = html;

        }

        function themSinhVien(){

            let ten = document.getElementById("ten").value;

            let lop = document.getElementById("lop").value;

            let sv = {

                ten: ten,
                lop: lop

            };

            sinhVien.push(sv);

            hienThi();

            document.getElementById("ten").value = "";

            document.getElementById("lop").value = "";

        }

        function xoaSinhVien(i){

            sinhVien.splice(i, 1);

            hienThi();

        }

    </script>

</body>
</html>
