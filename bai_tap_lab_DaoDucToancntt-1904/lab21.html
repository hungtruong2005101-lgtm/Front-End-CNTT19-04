<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CRUD Ajax</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .box{
            width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            text-align: center;
        }

        input{
            width: 70%;
            padding: 10px;
        }

        button{
            padding: 10px 15px;
            border: none;
            background: blue;
            color: white;
            margin-left: 5px;
        }

        li{
            margin-top: 15px;
            font-size: 18px;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>CRUD Sinh Vien</h1>

        <input type="text" id="ten" placeholder="Nhap ten">

        <button id="them">
            Them
        </button>

        <ul id="danhsach"></ul>

    </div>

    <script>

        let sinhVien = [];

        function hienThi(){

            let html = "";

            for(let i = 0; i < sinhVien.length; i++){

                html +=

                "<li>" +

                sinhVien[i] +

                " <button onclick='sua(" + i + ")'>Sua</button>" +

                " <button onclick='xoa(" + i + ")'>Xoa</button>" +

                "</li>";

            }

            $("#danhsach").html(html);

        }

        $("#them").click(function(){

            let ten = $("#ten").val();

            sinhVien.push(ten);

            hienThi();

            $("#ten").val("");

        });

        function xoa(i){

            sinhVien.splice(i,1);

            hienThi();

        }

        function sua(i){

            let tenMoi = prompt("Nhap ten moi");

            sinhVien[i] = tenMoi;

            hienThi();

        }

    </script>

</body>
</html>
