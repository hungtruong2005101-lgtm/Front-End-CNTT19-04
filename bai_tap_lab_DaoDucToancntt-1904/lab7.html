<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOM Co Ban</title>

    <style>

        body{
            font-family: Arial;
            background: #f5f5f5;
        }

        .box{
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        img{
            width: 250px;
            border-radius: 10px;
            margin-top: 20px;
        }

        button{
            margin-top: 20px;
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1 id="tieude">Xin Chao</h1>

        <p id="mota">
            Day la noi dung ban dau
        </p>

        <img
        id="hinh"
        src="https://via.placeholder.com/250">

        <br>

        <button onclick="thayDoi()">
            Thay Doi
        </button>

    </div>

    <script>

        function thayDoi(){

            document.getElementById("tieude").innerText =
            "Tieu De Moi";

            document.getElementById("mota").innerText =
            "Noi dung da duoc thay doi";

            document.getElementById("hinh").src =
            "https://via.placeholder.com/250/ff0000";

        }

    </script>

</body>
</html>
