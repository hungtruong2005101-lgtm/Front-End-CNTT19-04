<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bo Dem</title>

    <style>

        body{
            font-family: Arial;
            background: #eef2f3;
        }

        .box{
            width: 400px;
            margin: 100px auto;
            background: white;
            text-align: center;
            padding: 30px;
            border-radius: 10px;
        }

        h1{
            font-size: 70px;
        }

        button{
            padding: 10px 20px;
            margin: 10px;
            border: none;
            color: white;
            font-size: 18px;
        }

        .tang{
            background: green;
        }

        .giam{
            background: red;
        }

        .reset{
            background: blue;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1 id="so">0</h1>

        <button class="tang" id="tang">
            Tang
        </button>

        <button class="giam" id="giam">
            Giam
        </button>

        <button class="reset" id="reset">
            Reset
        </button>

    </div>

    <script>

        let dem = 0;

        function hienThi(){

            document.getElementById("so").innerText = dem;

        }

        document.getElementById("tang").addEventListener("click", function(){

            dem++;

            hienThi();

        });

        document.getElementById("giam").addEventListener("click", function(){

            dem--;

            hienThi();

        });

        document.getElementById("reset").addEventListener("click", function(){

            dem = 0;

            hienThi();

        });

    </script>

</body>
</html>
