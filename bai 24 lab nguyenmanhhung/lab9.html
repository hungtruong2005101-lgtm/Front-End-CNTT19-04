<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Công Việc Cá Nhân</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
  <h3 class="text-center mb-4"> Quản Lý Công Việc</h3>

  <!-- Form thêm công việc -->
  <div class="input-group mb-4">
    <input type="text" id="taskInput" class="form-control" placeholder="Nhập công việc mới...">
    <button class="btn btn-primary" onclick="addTask()">Thêm</button>
  </div>

  <!-- Bộ lọc -->
  <div class="btn-group mb-3 w-100" role="group">
    <button class="btn btn-outline-secondary active" onclick="filterTasks('all', this)">Tất cả</button>
    <button class="btn btn-outline-secondary" onclick="filterTasks('pending', this)">Chưa xong</button>
    <button class="btn btn-outline-secondary" onclick="filterTasks('done', this)">Hoàn thành</button>
  </div>

  <!-- Danh sách công việc -->
  <ul class="list-group" id="taskList"></ul>

  <p class="text-muted text-center mt-3" id="emptyMsg" style="display:none;">Không có công việc nào.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Lấy dữ liệu từ localStorage hoặc mảng rỗng
  let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
  let currentFilter = 'all';

  function saveTasks() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return alert('Vui lòng nhập nội dung công việc!');

    tasks.push({ id: Date.now(), text: text, done: false });
    saveTasks();
    input.value = '';
    renderTasks();
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) task.done = !task.done;
    saveTasks();
    renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
  }

  function filterTasks(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function renderTasks() {
    const list = document.getElementById('taskList');
    const emptyMsg = document.getElementById('emptyMsg');
    list.innerHTML = '';

    let filtered = tasks;
    if (currentFilter === 'done') filtered = tasks.filter(t => t.done);
    if (currentFilter === 'pending') filtered = tasks.filter(t => !t.done);

    if (filtered.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    filtered.forEach(task => {
      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center';

      li.innerHTML = `
        <div class="form-check">
          <input class="form-check-input" type="checkbox" ${task.done ? 'checked' : ''}
            onchange="toggleTask(${task.id})">
          <label class="form-check-label ${task.done ? 'text-decoration-line-through text-muted' : ''}">
            ${task.text}
          </label>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteTask(${task.id})">Xóa</button>
      `;

      list.appendChild(li);
    });
  }

  // Cho phép nhấn Enter để thêm
  document.getElementById('taskInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTask();
  });

  // Render khi tải trang
  renderTasks();
</script>
</body>
</html>
