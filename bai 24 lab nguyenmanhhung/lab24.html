<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Landing Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .hero{

            height: 100vh;

            background:
            linear-gradient(rgba(0,0,0,0.5),
            rgba(0,0,0,0.5)),

            url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30');

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            text-align: center;
        }

        .card:hover{

            transform: translateY(-10px);

            transition: 0.4s;
        }

    </style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            TECH EVENT 2026
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#about">
                        Giới thiệu
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#schedule">
                        Lịch trình
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#register">
                        Đăng ký
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Hero -->
<section class="hero">

    <div>

        <h1 class="display-2 fw-bold">
            SỰ KIỆN CÔNG NGHỆ 2026
        </h1>

        <p class="lead mt-3">
            Khám phá công nghệ AI và Web mới nhất
        </p>

        <button class="btn btn-primary btn-lg mt-3">
            Tham gia ngay
        </button>

    </div>

</section>

<!-- About -->
<section class="container py-5" id="about">

    <h2 class="text-center mb-5">
        Điểm nổi bật
    </h2>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h3>Workshop AI</h3>

                    <p>
                        Thực hành AI cùng chuyên gia.
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h3>Networking</h3>

                    <p>
                        Kết nối sinh viên và doanh nghiệp.
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h3>Mini Game</h3>

                    <p>
                        Nhận nhiều phần quà hấp dẫn.
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- Register -->
<section class="container py-5" id="register">

    <h2 class="text-center mb-4">
        Đăng ký tham gia
    </h2>

    <div class="row justify-content-center">

        <div class="col-md-6">

            <form class="card shadow p-4">

                <input type="text"
                       class="form-control mb-3"
                       placeholder="Họ tên">

                <input type="email"
                       class="form-control mb-3"
                       placeholder="Email">

                <input type="text"
                       class="form-control mb-3"
                       placeholder="Số điện thoại">

                <button class="btn btn-success w-100">
                    Đăng ký ngay
                </button>

            </form>

        </div>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
