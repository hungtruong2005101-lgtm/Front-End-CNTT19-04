<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5 text-center">

    <h2 class="mb-4">
        HIỆU ỨNG JQUERY
    </h2>

    <button id="fadeOut" class="btn btn-danger">
        Fade Out
    </button>

    <button id="fadeIn" class="btn btn-success">
        Fade In
    </button>

    <button id="slide" class="btn btn-primary">
        Slide Toggle
    </button>

    <div id="box"
         class="bg-info text-white p-5 mt-4 rounded">

        Hello jQuery Effects

    </div>

</div>

<script>

$("#fadeOut").click(function(){

    $("#box").fadeOut();
});

$("#fadeIn").click(function(){

    $("#box").fadeIn();
});

$("#slide").click(function(){

    $("#box").slideToggle();
});

</script>

</body>
</html>
