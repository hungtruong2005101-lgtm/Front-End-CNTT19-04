<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Them Moi Du Lieu Bang Ajax</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
  <h5 class="text-center mb-4">Them Moi Sinh Vien Bang Ajax POST</h5>

  <!-- Bieu mau nhap lieu -->
  <div class="card mb-4">
    <div class="card-header">Nhap thong tin sinh vien</div>
    <div class="card-body">
      <div class="mb-2">
        <label class="form-label">Ho ten</label>
        <input type="text" id="inputName" class="form-control" placeholder="Nhap ho ten">
      </div>
      <div class="mb-2">
        <label class="form-label">Email</label>
        <input type="text" id="inputEmail" class="form-control" placeholder="Nhap email">
      </div>
      <div class="mb-3">
        <label class="form-label">Lop</label>
        <input type="text" id="inputClass" class="form-control" placeholder="Nhap lop">
      </div>

      <!-- Nut gui, ngan form tai lai bang onclick -->
      <button class="btn btn-primary" onclick="submitForm()">Gui du lieu</button>

      <!-- Thong bao ket qua -->
      <div id="msg" class="mt-2"></div>
    </div>
  </div>

  <!-- Danh sach sinh vien vua them -->
  <div class="card">
    <div class="card-header">Danh sach vua them</div>
    <div class="card-body p-0">
      <table class="table table-bordered mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Ho ten</th>
            <th>Email</th>
            <th>Lop</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="4" class="text-center text-muted">Chua co du lieu.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'https://67f3778f2a9af4574474398d.mockapi.io/students';
  let danhSach = [];

  function showMsg(text, type) {
    const msg = document.getElementById('msg');
    msg.className = `alert alert-${type} py-1 mb-0`;
    msg.textContent = text;
  }

  function clearMsg() {
    document.getElementById('msg').className = '';
    document.getElementById('msg').textContent = '';
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (danhSach.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Chua co du lieu.</td></tr>';
      return;
    }
    tbody.innerHTML = danhSach.map(sv => `
      <tr>
        <td>${sv.id}</td>
        <td>${sv.name}</td>
        <td>${sv.email}</td>
        <td>${sv.class ?? ''}</td>
      </tr>`).join('');
  }

  async function submitForm() {
    clearMsg();

    const name  = document.getElementById('inputName').value.trim();
    const email = document.getElementById('inputEmail').value.trim();
    const cls   = document.getElementById('inputClass').value.trim();

    // Kiem tra du lieu rong truoc khi gui
    if (!name || !email || !cls) {
      showMsg('Vui long nhap day du thong tin truoc khi gui.', 'warning');
      return;
    }

    try {
      // Goi Ajax POST len mockapi.io
      const res = await fetch(BASE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, email: email, class: cls })
      });

      if (!res.ok) throw new Error('server_error');

      const svMoi = await res.json();

      // Them vao mang va cap nhat giao dien
      danhSach.push(svMoi);
      renderTable();

      // Xoa du lieu trong form sau khi gui thanh cong
      document.getElementById('inputName').value = '';
      document.getElementById('inputEmail').value = '';
      document.getElementById('inputClass').value = '';

      showMsg('Them sinh vien thanh cong! ID: ' + svMoi.id, 'success');

    } catch (err) {
      showMsg('Loi khi gui du lieu len server.', 'danger');
    }
  }
</script>
</body>
</html>
