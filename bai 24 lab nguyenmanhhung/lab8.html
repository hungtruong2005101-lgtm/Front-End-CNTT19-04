<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5 text-center">

    <h1>BỘ ĐẾM TƯƠNG TÁC</h1>
    <h2 id="count">0</h2>

    <button class="btn btn-success" onclick="up()">+</button>

    <button class="btn btn-danger" onclick="down()">-</button>

    <button class="btn btn-secondary" onclick="resetNum()">
        Reset
    </button>

</div>

<script>

let count = 0;

function render(){

    document.getElementById("count").innerHTML = count;
}

function up(){

    count++;

    render();
}

function down(){

    count--;

    render();
}

function resetNum(){

    count = 0;

    render();
}

</script>

</body>
</html>
