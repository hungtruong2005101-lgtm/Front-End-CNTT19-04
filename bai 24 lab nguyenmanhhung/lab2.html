```html id="promo123"
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tính Khuyến Mãi</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f2f2f2;
        }

        .box{
            max-width: 600px;
            margin: 60px auto;
        }

        #result{
            font-size: 18px;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="card shadow box">

            <div class="card-body">

                <h2 class="text-center text-primary mb-4">
                    TÍNH KHUYẾN MÃI ĐƠN HÀNG
                </h2>

                <!-- Giá trị đơn hàng -->
                <div class="mb-3">

                    <label class="form-label">
                        Giá trị đơn hàng
                    </label>

                    <input type="number"
                           id="money"
                           class="form-control"
                           placeholder="Nhập số tiền">

                </div>

                <!-- Hạng thành viên -->
                <div class="mb-3">

                    <label class="form-label">
                        Hạng thành viên
                    </label>

                    <select id="member" class="form-select">

                        <option value="normal">
                            Thành viên thường
                        </option>

                        <option value="silver">
                            Thành viên bạc
                        </option>

                        <option value="gold">
                            Thành viên vàng
                        </option>

                    </select>

                </div>

                <!-- Button -->
                <button class="btn btn-success w-100"
                        onclick="calculate()">

                    Tính khuyến mãi

                </button>

                <!-- Kết quả -->
                <div class="mt-4">

                    <div id="result" class="text-center"></div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script>

        function calculate(){

            let money = Number(document.getElementById("money").value);

            let member = document.getElementById("member").value;

            let result = document.getElementById("result");

            // Kiểm tra dữ liệu
            if(money <= 0){

                result.innerHTML = "Vui lòng nhập số tiền hợp lệ!";
                result.style.color = "red";

                return;
            }

            let discount = 0;

            // Khuyến mãi theo tiền
            if(money >= 1000000){

                discount = 20;

            }else if(money >= 500000){

                discount = 10;

            }else{

                discount = 5;
            }

            // Khuyến mãi theo thành viên
            if(member == "silver"){

                discount += 5;

            }else if(member == "gold"){

                discount += 10;
            }

            // Tiền giảm
            let discountMoney = money * discount / 100;

            // Tổng thanh toán
            let finalMoney = money - discountMoney;

            // Hiển thị
            result.innerHTML = `
                <p>Tiền gốc: ${money.toLocaleString()} VNĐ</p>

                <p>Tỷ lệ giảm: ${discount}%</p>

                <p>Số tiền giảm: ${discountMoney.toLocaleString()} VNĐ</p>

                <p class="text-success">
                    Tổng thanh toán: ${finalMoney.toLocaleString()} VNĐ
                </p>
            `;
        }

    </script>

</body>
</html>
