<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hiệu Ứng jQuery</title>

    <!-- Nhúng jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 550px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            color: #1f2937;
            margin-bottom: 20px;
        }

        .box{
            background-color: #dbeafe;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 18px;
            border: 2px solid #2563eb;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        .fadeIn-btn{
            background-color: #16a34a;
        }

        .fadeOut-btn{
            background-color: #dc2626;
        }

        .slideUp-btn{
            background-color: #f59e0b;
        }

        .slideDown-btn{
            background-color: #2563eb;
        }

        .toggle-btn{
            background-color: #7c3aed;
        }

        .effect-btn{
            background-color: #0f766e;
        }

        .highlight{
            background-color: yellow;
            border-color: orange;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>HIỆU ỨNG GIAO DIỆN jQuery</h1>

        <!-- Nút chức năng -->
        <div>

            <button class="fadeIn-btn" id="fadeInBtn">
                Fade In
            </button>

            <button class="fadeOut-btn" id="fadeOutBtn">
                Fade Out
            </button>

            <button class="slideUp-btn" id="slideUpBtn">
                Slide Up
            </button>

            <button class="slideDown-btn" id="slideDownBtn">
                Slide Down
            </button>

            <button class="toggle-btn" id="toggleBtn">
                Slide Toggle
            </button>

            <button class="effect-btn" id="effectBtn">
                Hiệu ứng kết hợp
            </button>

        </div>

        <!-- Khối nội dung -->
        <div class="box" id="box">

            Đây là khối nội dung dùng để thực hành
            các hiệu ứng jQuery.

        </div>

    </div>

    <script>

        // Fade Out
        $("#fadeOutBtn").click(function(){

            $("#box").fadeOut(1000);

        });
// Fade In
        $("#fadeInBtn").click(function(){

            $("#box").fadeIn(1000);

        });

        // Slide Up
        $("#slideUpBtn").click(function(){

            $("#box").slideUp(1000);

        });

        // Slide Down
        $("#slideDownBtn").click(function(){

            $("#box").slideDown(1000);

        });

        // Slide Toggle
        $("#toggleBtn").click(function(){

            $("#box").slideToggle(1000);

        });

        // Hiệu ứng kết hợp + chaining
        $("#effectBtn").click(function(){

            $("#box")

                .fadeOut(500)

                .fadeIn(500)

                .slideUp(500)

                .slideDown(500)

                .toggleClass("highlight");

        });

    </script>

</body>
</html>
