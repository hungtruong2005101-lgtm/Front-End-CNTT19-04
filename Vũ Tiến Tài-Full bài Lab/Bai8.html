<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Đếm Tương Tác</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 400px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
        }

        #counter {
            font-size: 60px;
            font-weight: bold;
            margin: 20px 0;
            transition: 0.3s;
        }

        .positive {
            color: green;
        }

        .negative {
            color: red;
        }

        .zero {
            color: #333;
        }

        button {
            padding: 12px 18px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-size: 16px;
        }

        .btn-plus {
            background: #28a745;
        }

        .btn-minus {
            background: #dc3545;
        }

        .btn-reset {
            background: #007bff;
        }

        .btn-plus5 {
            background: orange;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>BỘ ĐẾM TƯƠNG TÁC</h2>

    <div id="counter" class="zero">0</div>

    <button class="btn-plus" id="btnTang">
        +1
    </button>

    <button class="btn-minus" id="btnGiam">
        -1
    </button>

    <button class="btn-reset" id="btnReset">
        Reset
    </button>

    <button class="btn-plus5" id="btnTang5">
        +5
    </button>

</div>

<script>

    // Biến trạng thái
    let count = 0;

    // Lấy phần tử DOM
    let counter =
        document.getElementById("counter");

    let btnTang =
        document.getElementById("btnTang");

    let btnGiam =
        document.getElementById("btnGiam");

    let btnReset =
        document.getElementById("btnReset");

    let btnTang5 =
        document.getElementById("btnTang5");

    // Hàm cập nhật giao diện
    function render() {

        counter.innerText = count;

        // Đổi màu theo trạng thái
        counter.classList.remove(
            "positive",
            "negative",
            "zero"
        );

        if (count > 0) {
            counter.classList.add("positive");
        }
        else if (count < 0) {
            counter.classList.add("negative");
        }
        else {
            counter.classList.add("zero");
        }
    }

    // Sự kiện tăng
    btnTang.addEventListener("click",
    function() {

        count++;

        render();
    });

    // Sự kiện giảm
    btnGiam.addEventListener("click",
    function() {

        count--;

        render();
    });

    // Sự kiện reset
    btnReset.addEventListener("click",
    function() {

        count = 0;

        render();
    });

    // Tăng nhanh +5
    btnTang5.addEventListener("click",
    function() {

        count += 5;

        render();
    });

</script>

</body>
</html>
