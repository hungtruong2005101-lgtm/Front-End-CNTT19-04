<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Khuyến Mãi Đơn Hàng</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 420px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #ketQua {
            margin-top: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            line-height: 1.8;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>TÍNH KHUYẾN MÃI</h2>

    <label>Giá trị đơn hàng (VNĐ)</label>
    <input type="number" id="donHang" placeholder="Nhập giá trị đơn hàng">

    <label>Hạng thành viên</label>
    <select id="thanhVien">
        <option value="thuong">Thường</option>
        <option value="bac">Bạc</option>
        <option value="vang">Vàng</option>
    </select>

    <button onclick="tinhKhuyenMai()">Tính thanh toán</button>

    <div id="ketQua"></div>

</div>

<script>

    function dinhDangTien(tien) {
        return tien.toLocaleString('vi-VN') + " VNĐ";
    }

    function tinhKhuyenMai() {

        let donHang = Number(document.getElementById("donHang").value);
        let thanhVien = document.getElementById("thanhVien").value;

        let ketQua = document.getElementById("ketQua");

        // Kiểm tra dữ liệu
        if (donHang <= 0 || isNaN(donHang)) {
            ketQua.innerHTML = "Vui lòng nhập đơn hàng hợp lệ!";
            ketQua.className = "error";
            return;
        }

        let giamGia = 0;

        // Khuyến mãi theo giá trị đơn hàng
        if (donHang >= 1000000) {
            giamGia = 10;
        }
        else if (donHang >= 500000) {
            giamGia = 7;
        }
        else if (donHang >= 200000) {
            giamGia = 5;
        }
        else {
            giamGia = 2;
        }

        // Thêm ưu đãi theo hạng thành viên
        if (thanhVien === "bac") {
            giamGia += 3;
        }
        else if (thanhVien === "vang") {
            giamGia += 5;
        }

        // Tính tiền giảm
        let tienGiam = donHang * giamGia / 100;

        // Miễn phí vận chuyển nếu đơn > 1 triệu
        let phiVanChuyen = 30000;

        if (donHang > 1000000) {
            phiVanChuyen = 0;
        }

        // Tổng thanh toán
        let tongThanhToan = donHang - tienGiam + phiVanChuyen;

        // Hiển thị kết quả
        ketQua.className = "success";

        ketQua.innerHTML = `
            <p>Tiền gốc: ${dinhDangTien(donHang)}</p>
            <p>Tỷ lệ giảm giá: ${giamGia}%</p>
            <p>Số tiền giảm: ${dinhDangTien(tienGiam)}</p>
            <p>Phí vận chuyển: ${dinhDangTien(phiVanChuyen)}</p>
            <hr>
            <p><strong>Tổng thanh toán: ${dinhDangTien(tongThanhToan)}</strong></p>
        `;
    }

</script>

</body>
</html>
