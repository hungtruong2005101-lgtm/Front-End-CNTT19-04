<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 12 – Quản lý Sinh viên</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 24px;
    }

    /* ── Form ── */
    .form-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto 28px;
    }

    .form-box h2 {
      margin: 0 0 14px;
      font-size: 17px;
      color: #333;
    }

    .form-box input {
      display: block;
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-box input:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .form-box button {
      padding: 9px 20px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
    }

    .form-box button:hover { background: #357abd; }

    .btn-cancel-sua {
      background: #aaa !important;
    }
    .btn-cancel-sua:hover { background: #888 !important; }

    /* ── Tìm kiếm ── */
    .search-box {
      max-width: 820px;
      margin: 0 auto 12px;
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    /* ── Trạng thái ── */
    #status {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 12px;
      min-height: 18px;
    }

    /* ── Bảng ── */
    .table-wrap {
      max-width: 820px;
      margin: 0 auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      font-size: 14px;
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #4a90d9;
      color: white;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    tbody tr:hover { background: #f9f9f9; }

    .btn-xoa {
      padding: 5px 12px;
      background: #e04040;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      margin-right: 6px;
    }

    .btn-sua {
      padding: 5px 12px;
      background: #f0a500;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-xoa:hover { background: #c03030; }
    .btn-sua:hover  { background: #cc8c00; }

    /* ── Hộp xác nhận xoá ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    #overlay.show { display: flex; }

    .confirm-box {
      background: white;
      border-radius: 10px;
      padding: 28px 32px;
      text-align: center;
      max-width: 300px;
      width: 90%;
    }

    .confirm-box p {
      font-size: 15px;
      color: #333;
      margin: 0 0 20px;
    }

    .confirm-box button {
      padding: 8px 20px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      color: white;
      margin: 0 6px;
    }

    #btn-yes { background: #e04040; }
    #btn-no  { background: #aaa; }
  </style>
</head>
<body>

<h1>Quản lý Sinh viên</h1>

<!-- FORM THÊM / SỬA -->
<div class="form-box">
  <h2 id="form-title">➕ Thêm sinh viên</h2>
  <input type="hidden" id="sv-id" />
  <input type="text"   id="sv-ten"   placeholder="Họ và tên" />
  <input type="text"   id="sv-mssv"  placeholder="MSSV" />
  <input type="text"   id="sv-lop"   placeholder="Lớp" />
  <input type="email"  id="sv-email" placeholder="Email" />
  <div>
    <button onclick="luuSinhVien()">💾 Lưu</button>
    <button class="btn-cancel-sua" id="btn-huy-sua" onclick="huyForm()" style="display:none">✕ Huỷ</button>
  </div>
</div>

<!-- TÌM KIẾM -->
<div class="search-box">
  <input type="text" id="search" placeholder="🔍 Tìm theo tên hoặc MSSV..." oninput="timKiem()" />
</div>

<!-- TRẠNG THÁI -->
<p id="status">Đang tải dữ liệu...</p>

<!-- BẢNG -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Họ và tên</th>
        <th>MSSV</th>
        <th>Lớp</th>
        <th>Email</th>
        <th>Thao tác</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- HỘP XÁC NHẬN XOÁ -->
<div id="overlay">
  <div class="confirm-box">
    <p>Bạn có chắc muốn xoá sinh viên này không?</p>
    <button id="btn-yes">🗑️ Xoá</button>
    <button id="btn-no">Huỷ</button>
  </div>
</div>

<script>
  // ── CẤU HÌNH ──────────────────────────────────────────────
  // Khi có mockapi.io thật, đổi DUNG_GIA_LAP = false và điền API:
  // const API = 'https://YOUR_ID.mockapi.io/api/v1/sinhvien';
  const DUNG_GIA_LAP = true;

  // ── DỮ LIỆU GIẢ LẬP ──────────────────────────────────────
  let fakeDB = [
    { id: '1', ten: 'Nguyễn Văn An',  mssv: 'SV001', lop: 'CNTT01', email: 'an@sv.edu.vn' },
    { id: '2', ten: 'Trần Thị Bình',  mssv: 'SV002', lop: 'CNTT01', email: 'binh@sv.edu.vn' },
    { id: '3', ten: 'Lê Minh Cường',  mssv: 'SV003', lop: 'CNTT02', email: 'cuong@sv.edu.vn' },
    { id: '4', ten: 'Phạm Thị Dung',  mssv: 'SV004', lop: 'CNTT02', email: 'dung@sv.edu.vn' },
    { id: '5', ten: 'Hoàng Văn Em',   mssv: 'SV005', lop: 'CNTT03', email: 'em@sv.edu.vn' },
  ];
  let nextId = 6;

  // ── GIẢ LẬP FETCH ─────────────────────────────────────────
  function fakeAjax(method, id, data) {
    return new Promise(function(resolve) {
      setTimeout(function() {
        if (method === 'GET') {
          resolve(JSON.parse(JSON.stringify(fakeDB)));
        } else if (method === 'POST') {
          const item = Object.assign({ id: String(nextId++) }, data);
          fakeDB.push(item);
          resolve(item);
        } else if (method === 'PUT') {
          fakeDB = fakeDB.map(function(sv) {
            return sv.id === id ? Object.assign({}, sv, data) : sv;
          });
          resolve(data);
        } else if (method === 'DELETE') {
          fakeDB = fakeDB.filter(function(sv) { return sv.id !== id; });
          resolve({});
        }
      }, 400);
    });
  }

  // ── HÀM GỌI API ───────────────────────────────────────────
  function apiGet() {
    if (DUNG_GIA_LAP) return fakeAjax('GET');
    return fetch(API).then(function(r) { return r.json(); });
  }

  function apiPost(data) {
    if (DUNG_GIA_LAP) return fakeAjax('POST', null, data);
    return fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(function(r) { return r.json(); });
  }

  function apiPut(id, data) {
    if (DUNG_GIA_LAP) return fakeAjax('PUT', id, data);
    return fetch(API + '/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(function(r) { return r.json(); });
  }

  function apiDelete(id) {
    if (DUNG_GIA_LAP) return fakeAjax('DELETE', id);
    return fetch(API + '/' + id, { method: 'DELETE' });
  }

  // ── BIẾN TOÀN CỤC ─────────────────────────────────────────
  let danhSach = [];   // toàn bộ dữ liệu từ API

  // ── TẢI DANH SÁCH (GET) ───────────────────────────────────
  function taiDanhSach() {
    setStatus('Đang tải dữ liệu...');
    apiGet()
      .then(function(data) {
        danhSach = data;
        renderBang(danhSach);
        setStatus('Hiển thị ' + data.length + ' sinh viên.');
      })
      .catch(function() {
        setStatus('❌ Không thể tải dữ liệu.');
      });
  }

  // ── RENDER BẢNG ───────────────────────────────────────────
  function renderBang(ds) {
    var tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (ds.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa">Không có dữ liệu</td></tr>';
      return;
    }

    ds.forEach(function(sv, i) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + (i + 1) + '</td>' +
        '<td>' + sv.ten + '</td>' +
        '<td>' + (sv.mssv || '') + '</td>' +
        '<td>' + (sv.lop  || '') + '</td>' +
        '<td>' + (sv.email || '') + '</td>' +
        '<td>' +
          '<button class="btn-sua" onclick="batDauSua(\'' + sv.id + '\')">✏️ Sửa</button>' +
          '<button class="btn-xoa" onclick="hienXacNhan(\'' + sv.id + '\')">🗑️ Xoá</button>' +
        '</td>';
      tbody.appendChild(tr);
    });
  }

  // ── TÌM KIẾM (client-side) ────────────────────────────────
  function timKiem() {
    var tuKhoa = document.getElementById('search').value.toLowerCase().trim();
    var ketQua = danhSach.filter(function(sv) {
      return sv.ten.toLowerCase().includes(tuKhoa) ||
             (sv.mssv || '').toLowerCase().includes(tuKhoa);
    });
    renderBang(ketQua);
  }

  // ── THÊM MỚI (POST) ───────────────────────────────────────
  function luuSinhVien() {
    var id    = document.getElementById('sv-id').value;
    var ten   = document.getElementById('sv-ten').value.trim();
    var mssv  = document.getElementById('sv-mssv').value.trim();
    var lop   = document.getElementById('sv-lop').value.trim();
    var email = document.getElementById('sv-email').value.trim();

    if (!ten || !mssv) {
      alert('Vui lòng nhập Họ tên và MSSV.');
      return;
    }

    var data = { ten: ten, mssv: mssv, lop: lop, email: email };

    if (id) {
      // SỬA – PUT
      setStatus('Đang cập nhật...');
      apiPut(id, data)
        .then(function() {
          setStatus('✅ Cập nhật thành công.');
          huyForm();
          taiDanhSach();
        })
        .catch(function() { setStatus('❌ Lỗi khi cập nhật.'); });
    } else {
      // THÊM – POST
      setStatus('Đang thêm mới...');
      apiPost(data)
        .then(function() {
          setStatus('✅ Thêm mới thành công.');
          huyForm();
          taiDanhSach();
        })
        .catch(function() { setStatus('❌ Lỗi khi thêm mới.'); });
    }
  }

  // ── SỬA – điền form (PUT) ─────────────────────────────────
  function batDauSua(id) {
    var sv = danhSach.find(function(s) { return s.id === id; });
    if (!sv) return;

    document.getElementById('form-title').textContent = '✏️ Cập nhật sinh viên';
    document.getElementById('sv-id').value    = sv.id;
    document.getElementById('sv-ten').value   = sv.ten;
    document.getElementById('sv-mssv').value  = sv.mssv;
    document.getElementById('sv-lop').value   = sv.lop;
    document.getElementById('sv-email').value = sv.email;
    document.getElementById('btn-huy-sua').style.display = 'inline-block';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function huyForm() {
    document.getElementById('form-title').textContent = '➕ Thêm sinh viên';
    document.getElementById('sv-id').value    = '';
    document.getElementById('sv-ten').value   = '';
    document.getElementById('sv-mssv').value  = '';
    document.getElementById('sv-lop').value   = '';
    document.getElementById('sv-email').value = '';
    document.getElementById('btn-huy-sua').style.display = 'none';
  }

  // ── XOÁ – hộp xác nhận (DELETE) ──────────────────────────
  var idDangXoa = null;

  function hienXacNhan(id) {
    idDangXoa = id;
    document.getElementById('overlay').classList.add('show');
  }

  document.getElementById('btn-no').addEventListener('click', function() {
    idDangXoa = null;
    document.getElementById('overlay').classList.remove('show');
  });

  document.getElementById('btn-yes').addEventListener('click', function() {
    document.getElementById('overlay').classList.remove('show');
    if (!idDangXoa) return;

    setStatus('Đang xoá...');
    apiDelete(idDangXoa)
      .then(function() {
        setStatus('✅ Xoá thành công.');
        idDangXoa = null;
        taiDanhSach();
      })
      .catch(function() {
        setStatus('❌ Lỗi khi xoá.');
        idDangXoa = null;
      });
  });

  // ── TIỆN ÍCH ──────────────────────────────────────────────
  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  // ── KHỞI ĐỘNG ─────────────────────────────────────────────
  taiDanhSach();
</script>

</body>
</html>
