<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh sách thành viên</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-add { background-color: #28a745; }
        .btn-edit { background-color: #ffc107; color: black; margin-right: 5px; }
        .btn-delete { background-color: #dc3545; }
        .btn-save { background-color: #007bff; margin-right: 5px; }
        
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .member-name { font-size: 16px; }
        .edit-input { display: none; padding: 4px; font-size: 16px; width: 60%; }
        .action-buttons { display: flex; }
    </style>
</head>
<body>

<div class="container">
    <h2>Danh sách thành viên</h2>
    
    <div class="form-group">
        <input type="text" id="member-input" placeholder="Nhập tên thành viên...">
        <button class="btn-add" id="btn-add-member">Thêm mới</button>
    </div>

    <ul id="member-list">
        <li>
            <span class="member-name">Nguyễn Văn A</span>
            <input type="text" class="edit-input" value="Nguyễn Văn A">
            <div class="action-buttons">
                <button class="btn-edit">Sửa</button>
                <button class="btn-delete">Xóa</button>
            </div>
        </li>
    </ul>
</div>

<script src="app.js"></script>
</body>
</html>
