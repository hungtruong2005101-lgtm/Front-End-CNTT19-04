<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Đoán Số</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .container{
            width: 450px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            text-align: center;
        }

        h2{
            color: darkblue;
        }

        input{
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            font-size: 16px;
        }

        button{
            padding: 10px 20px;
            margin-top: 15px;
            margin-right: 10px;
            border: none;
            background: green;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background: darkgreen;
        }

        .message{
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .history{
            margin-top: 15px;
            text-align: left;
            background: #eef;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>🎯 TRÒ CHƠI ĐOÁN SỐ</h2>

        <p>Hãy đoán số từ 1 đến 100</p>

        <input type="number" id="guess" placeholder="Nhập số dự đoán">

        <br>

        <button onclick="kiemTra()">Đoán</button>
        <button onclick="choiLai()">Chơi lại</button>

        <div class="message" id="message"></div>

        <div class="history">
            <p><b>Số lần đoán:</b> <span id="count">0</span></p>
            <p><b>Lịch sử đoán:</b> <span id="history">Chưa có</span></p>
        </div>

    </div>

    <script>

        let soBiMat = Math.floor(Math.random() * 100) + 1;

        let soLanDoan = 0;

        let lichSu = [];

        function kiemTra(){

            let duDoan = parseInt(document.getElementById("guess").value);

            if(isNaN(duDoan)){
                alert("Vui lòng nhập số!");
                return;
            }

            soLanDoan++;

            lichSu.push(duDoan);

            document.getElementById("count").innerText = soLanDoan;
            document.getElementById("history").innerText = lichSu.join(", ");

            if(duDoan > soBiMat){
                document.getElementById("message").innerHTML =
                    "📉 Số bạn đoán lớn hơn!";
            }
            else if(duDoan < soBiMat){
                document.getElementById("message").innerHTML =
                    "📈 Số bạn đoán nhỏ hơn!";
            }
            else{
                document.getElementById("message").innerHTML =
                    "🎉 Chính xác! Bạn đã đoán đúng sau " + soLanDoan + " lần!";
            }

        }

        function choiLai(){

            soBiMat = Math.floor(Math.random() * 100) + 1;

            soLanDoan = 0;

            lichSu = [];

            document.getElementById("guess").value = "";

            document.getElementById("message").innerHTML = "";

            document.getElementById("count").innerText = "0";

            document.getElementById("history").innerText = "Chưa có";

        }

    </script>

</body>
</html>
