<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 12 - Quản lý sinh viên với API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 30px 15px;
            color: #334155;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-top: 0;
            margin-bottom: 25px;
        }
        /* Style cho Form nhập liệu */
        .student-form {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-group input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #3b82f6;
        }
        .btn {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit { background-color: #2563eb; color: white; width: 100%; }
        .btn-submit:hover { background-color: #1d4ed8; }
        
        .btn-delete { background-color: #ef4444; color: white; padding: 6px 12px; font-size: 13px; }
        .btn-delete:hover { background-color: #dc2626; }

        /* Style cho Bảng danh sách sinh viên */
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: #475569;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        /* Thông báo trạng thái */
        .status-message {
            text-align: center;
            font-style: italic;
            color: #64748b;
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG QUẢN LÝ SINH VIÊN (CRUD API)</h2>

    <div class="student-form">
        <h3 style="margin-top: 0; margin-bottom: 15px; color: #334155;">Thêm Sinh Viên Mới</h3>
        <form id="student-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="student-name">Họ và Tên</label>
                    <input type="text" id="student-name" placeholder="Ví dụ: Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label for="student-email">Email</label>
                    <input type="email" id="student-email" placeholder="username@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="student-class">Lớp học</label>
                    <input type="text" id="student-class" placeholder="Ví dụ: WD18301" required>
                </div>
            </div>
            <button type="submit" class="btn btn-submit">Lưu thông tin lên máy chủ</button>
        </form>
    </div>

    <h3 style="color: #334155;">Danh Sách Sinh Viên Hiện Tại</h3>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Mã số (ID)</th>
                    <th>Họ và Tên</th>
