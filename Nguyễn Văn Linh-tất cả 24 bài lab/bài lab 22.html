<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài lab 22 - Đăng nhập Responsive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Thêm một chút CSS tùy biến để căn giữa form theo chiều dọc màn hình */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center w-100 m-0">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div class="card border-0 shadow-sm p-4">
                <div class="card-body">
                    <h3 class="text-center mb-4 fw-bold text-primary">ĐĂNG NHẬP</h3>
                    
                    <form>
                        <div class="mb-3">
                            <label for="emailInput" class="form-label fw-semibold">Địa chỉ Email</label>
                            <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="passwordInput" class="form-label fw-semibold">Mật khẩu</label>
                            <input type="password" class="form-control" id="passwordInput" placeholder="••••••••" required>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label text-secondary" for="rememberMe">Ghi nhớ đăng nhập</label>
                            </div>
                            <a href="#" class="text-decoration-none small">Quên mật khẩu?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold text-uppercase">Đăng nhập</button>
                    </form>
                </div>
            </div>
            <p class="text-center text-muted mt-3 small">Chưa có tài khoản? <a href="#" class="text-decoration-none">Đăng ký ngay</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
