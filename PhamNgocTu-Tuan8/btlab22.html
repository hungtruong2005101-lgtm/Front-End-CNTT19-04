<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biểu mẫu đăng nhập</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow p-4 rounded-3">
            <h3 class="text-center md-4 text-primary">Đăng nhập</h3>
            <form bindsubmit="" method="post" action="#">
              <div class="mb-3">
                <label for="inputEmail" class="form-label fw-bold"
                  >Email:
                </label>
                <input
                  type="email"
                  class="form-control"
                  id="inputEmail"
                  placeholder="Nhập địa chỉ Email"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="inputPassword" class="form-label fw-bold"
                  >Mật khẩu:
                </label>
                <input
                  type="password"
                  class="form-control"
                  id="inputPassword"
                  placeholder="Nhập mật khẩu"
                />
              </div class="d-flex justify-content-between alig-items-center mb-4">
              <div class="form-check">
                    <input type="checkbox" class="form-check-input"id="rememberMe">
                    <label for="rememberMe" class="form-check-label">Ghi nhớ thông tin</label> 
              </div>
              <a href="a" class="text-decoration-none smail" >Quên mật khẩu</a>
              </div>
              <button type="submit" class="btn" btn-primary w-100 fw-bold">Đăng nhập</button>  
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
