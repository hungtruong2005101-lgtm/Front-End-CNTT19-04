<!DOCTYPE html>
<html>
<head>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<ul id="list"></ul>

<script>
function loadData(){
  $.get('https://jsonplaceholder.typicode.com/users', function(data){
    $('#list').html('');

    data.forEach(u => {
      $('#list').append(`<li>${u.name}</li>`);
    });
  });
}

loadData();
</script>
</body>
</html>
