<!DOCTYPE html>
<html>
<body>
<input id="name" placeholder="Tên sinh viên">
<button onclick="addStudent()">Thêm</button>

<script>
function addStudent(){
  fetch('https://jsonplaceholder.typicode.com/posts', {
    method:'POST',
    body: JSON.stringify({
      title: name.value
    }),
    headers:{
      'Content-type':'application/json'
    }
  })
  .then(r=>r.json())
  .then(data=>{
    console.log(data);
    alert('Thêm thành công');
  })
}
</script>
</body>
</html>
