<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-5">Danh Sách Sản Phẩm</h2>

    <div class="row g-4">

        <!-- Sản phẩm -->
        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card shadow h-100">
                
                <img src="tai-nghe-bluetooth-chup-tai-cove-pro-300x300.jpg" class="card-img-top">

                <div class="card-body">

                    <span class="badge bg-danger mb-2">Giảm giá</span>

                    <h5 class="card-title">Tai nghe Bluetooth</h5>

                    <p class="text-danger fw-bold">499.000đ</p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>
            </div>
        </div>

        <!-- Copy thêm sản phẩm -->
        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card shadow h-100">
                <img src="lapmoi.jpg" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">Laptop Gaming</h5>
                    <p class="text-danger fw-bold">20.000.000đ</p>
                    <button class="btn btn-success w-100">
                        Xem thêm
                    </button>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card shadow h-100">
                <img src="ban-phim-co-e-dra-ek3287-1.jpg" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">Bàn phím cơ</h5>
                    <p class="text-danger fw-bold">1.200.000đ</p>
                    <button class="btn btn-dark w-100">
                        Đặt hàng
                    </button>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card shadow h-100">
                <img src="chuotgaming.jpg" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">Chuột Gaming</h5>
                    <p class="text-danger fw-bold">700.000đ</p>
                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card shadow h-100">
                <img src="manhinh.jpg" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">Màn hình</h5>
                    <p class="text-danger fw-bold">4.500.000đ</p>
                    <button class="btn btn-warning w-100">
                        Chi tiết
                    </button>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
            <div class="card shadow h-100">
                <img src="Loa-bluetooth.jpg" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">Loa Bluetooth</h5>
                    <p class="text-danger fw-bold">900.000đ</p>
                    <button class="btn btn-danger w-100">
                        Mua ngay
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
