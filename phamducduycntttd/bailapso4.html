<!DOCTYPE html>
<html>
<head>
    <title>Bài 4 - Xử lý dữ liệu điểm sinh viên</title>
</head>
<body>

    <h2>Xử lý điểm sinh viên</h2>

    <div id="ketQua"></div>

    <script>
        // Mảng điểm
        let diem = [8, 7, 9, 6, 10];

        // Tính tổng
        let tong = 0;

        diem.forEach(function(item) {
            tong += item;
        });

        // Tính trung bình
        let trungBinh = tong / diem.length;

        // Xếp loại
        let xepLoai = "";

        if (trungBinh < 5) {
            xepLoai = "Yếu";
        } 
        else if (trungBinh < 7) {
            xepLoai = "Trung bình";
        } 
        else if (trungBinh < 8) {
            xepLoai = "Khá";
        } 
        else {
            xepLoai = "Giỏi";
        }

        // Hiển thị kết quả
        document.getElementById("ketQua").innerHTML = `
            <p>Danh sách điểm: ${diem.join(", ")}</p>
            <p>Tổng điểm: ${tong}</p>
            <p>Điểm trung bình: ${trungBinh.toFixed(2)}</p>
            <p>Xếp loại: ${xepLoai}</p>
        `;
    </script>

</body>
</html>
