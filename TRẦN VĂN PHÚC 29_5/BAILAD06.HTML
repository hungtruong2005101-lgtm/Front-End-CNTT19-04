<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quy trình tính toán Callback</title>

  <style>
    body{
      font-family: Arial;
      background: #f4f4f4;
      padding: 30px;
    }

    .container{
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align: center;
      color: #333;
    }

    input{
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button{
      margin-top: 15px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover{
      background: #0056b3;
    }

    .result{
      margin-top: 20px;
      padding: 15px;
      background: #eee;
      border-radius: 5px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Quy trình tính toán đơn hàng</h1>

  <label>Giá sản phẩm:</label>
  <input type="number" id="price" placeholder="Nhập giá sản phẩm">

  <label>Số lượng:</label>
  <input type="number" id="quantity" placeholder="Nhập số lượng">

  <button onclick="startProcess()">Tính toán</button>

  <div class="result" id="output"></div>

</div>

<script>

  // Hàm tính tiền gốc
  function calculateTotal(price, quantity, callback){
    let total = price * quantity;

    callback(total);
  }

  // Hàm giảm giá
  function applyDiscount(total, callback){
    let discount = total * 0.1;

    let newTotal = total - discount;

    callback(newTotal, discount);
  }

  // Hàm phí vận chuyển
  function shippingFee(total, callback){

    let shipping = 30000;

    let finalTotal = total + shipping;

    callback(finalTotal, shipping);
  }

  // Bắt đầu quy trình
  function startProcess(){

    let price = Number(document.getElementById("price").value);

    let quantity = Number(document.getElementById("quantity").value);

    let output = document.getElementById("output");

    calculateTotal(price, quantity, function(total){

      applyDiscount(total, function(afterDiscount, discount){

        shippingFee(afterDiscount, function(finalTotal, shipping){

          output.innerHTML = `
            <b>Tổng tiền gốc:</b> ${total.toLocaleString()} VNĐ <br>

            <b>Giảm giá 10%:</b> ${discount.toLocaleString()} VNĐ <br>

            <b>Phí vận chuyển:</b> ${shipping.toLocaleString()} VNĐ <br>

            <b>Tổng cuối cùng:</b> ${finalTotal.toLocaleString()} VNĐ
          `;

        });

      });

    });

  }

</script>

</body>
</html>
