<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý sản phẩm</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    .container{
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align: center;
      color: #333;
    }

    .controls{
      margin: 20px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input{
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      flex: 1;
    }

    button{
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover{
      background: #0056b3;
    }

    table{
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table, th, td{
      border: 1px solid #ddd;
    }

    th{
      background: #007bff;
      color: white;
      padding: 12px;
    }

    td{
      padding: 10px;
      text-align: center;
    }

    .total{
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #e63946;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Quản lý danh sách sản phẩm</h1>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Tìm theo tên sản phẩm">
    <button onclick="searchProduct()">Tìm kiếm</button>
  </div>

  <div class="controls">
    <input type="number" id="priceInput" placeholder="Lọc giá nhỏ hơn">
    <button onclick="filterPrice()">Lọc giá</button>
  </div>

  <div class="controls">
    <button onclick="sortAsc()">Sắp xếp giá tăng</button>
    <button onclick="sortDesc()">Sắp xếp giá giảm</button>
    <button onclick="showAll()">Hiển thị tất cả</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>

    <tbody id="productList"></tbody>
  </table>

  <div class="total" id="totalValue"></div>
</div>

<script>

  // Mảng sản phẩm
  const products = [
    {
      name: "Laptop",
      price: 15000000,
      quantity: 5
    },

    {
      name: "Điện thoại",
      price: 8000000,
      quantity: 10
    },

    {
      name: "Tai nghe",
      price: 1200000,
      quantity: 15
    },

    {
      name: "Chuột gaming",
      price: 700000,
      quantity: 20
    },

    {
      name: "Bàn phím cơ",
      price: 1800000,
      quantity: 8
    }
  ];

  // Hiển thị sản phẩm
  function renderProducts(data){
    const productList = document.getElementById("productList");

    productList.innerHTML = "";

    data.forEach(product => {
      productList.innerHTML += `
        <tr>
          <td>${product.name}</td>
          <td>${product.price.toLocaleString()} VNĐ</td>
          <td>${product.quantity}</td>
        </tr>
      `;
    });

    totalInventory(data);
  }

  // Tìm kiếm sản phẩm
  function searchProduct(){
    const keyword = document
      .getElementById("searchInput")
      .value
      .toLowerCase();

    const result = products.filter(product =>
      product.name.toLowerCase().includes(keyword)
    );

    renderProducts(result);
  }

  // Lọc theo giá
  function filterPrice(){
    const maxPrice = Number(
      document.getElementById("priceInput").value
    );

    const result = products.filter(product =>
      product.price <= maxPrice
    );

    renderProducts(result);
  }

  // Sắp xếp tăng dần
  function sortAsc(){
    const sorted = [...products].sort((a, b) =>
      a.price - b.price
    );

    renderProducts(sorted);
  }

  // Sắp xếp giảm dần
  function sortDesc(){
    const sorted = [...products].sort((a, b) =>
      b.price - a.price
    );

    renderProducts(sorted);
  }

  // Hiển thị tất cả
  function showAll(){
    renderProducts(products);
  }

  // Tổng giá trị kho
  function totalInventory(data){
    let total = 0;

    data.forEach(product => {
      total += product.price * product.quantity;
    });

    document.getElementById("totalValue").innerHTML =
      "Tổng giá trị kho: " +
      total.toLocaleString() +
      " VNĐ";
  }

  // Hiển thị ban đầu
  renderProducts(products);

</script>

</body>
</html>
