<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thao Tác DOM Cơ Bản</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 450px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            color: #333;
        }

        p{
            font-size: 18px;
            color: #555;
        }

        img{
            width: 250px;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin: 15px 0;
            transition: 0.3s;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }

        .darkMode{
            background: #333;
            color: white;
        }

        .darkMode p{
            color: #ddd;
        }

    </style>
</head>

<body>

    <div class="container" id="box">

        <h1 id="tieuDe">CHÀO MỪNG BẠN</h1>

        <p id="moTa">
            Đây là ví dụ thao tác với HTML DOM bằng JavaScript.
        </p>

        <img 
            id="hinhAnh"
            src="https://picsum.photos/250/180"
            alt="Hình ảnh">

        <br>

        <button onclick="thayDoiNoiDung()">
            Thay Đổi Nội Dung
        </button>

        <button onclick="khoiPhuc()">
            Khôi Phục
        </button>

    </div>

    <script>

        // Hàm thay đổi nội dung
        function thayDoiNoiDung(){

            // Lấy phần tử bằng ID
            let tieuDe = document.getElementById("tieuDe");

            let moTa = document.querySelector("#moTa");

            let hinhAnh = document.getElementById("hinhAnh");

            let box = document.getElementById("box");

            // Thay đổi nội dung văn bản
            tieuDe.innerText = "DOM ĐÃ ĐƯỢC THAY ĐỔI";

            moTa.textContent =
                "Bạn vừa thay đổi nội dung, hình ảnh và giao diện bằng JavaScript.";

            // Thay đổi thuộc tính ảnh
            hinhAnh.src =
                "https://images.unsplash.com/photo-1506744038136-46273834b3fb";

            // Thay đổi class
            box.classList.add("darkMode");
        }

        // Hàm khôi phục trạng thái ban đầu
        function khoiPhuc(){
let tieuDe = document.getElementById("tieuDe");

            let moTa = document.getElementById("moTa");

            let hinhAnh = document.getElementById("hinhAnh");

            let box = document.getElementById("box");

            // Khôi phục nội dung
            tieuDe.innerText = "CHÀO MỪNG BẠN";

            moTa.textContent =
                "Đây là ví dụ thao tác với HTML DOM bằng JavaScript.";

            // Khôi phục ảnh
            hinhAnh.src =
                "https://picsum.photos/250/180";

            // Xóa class
            box.classList.remove("darkMode");
        }

    </script>

</body>
</html>
