<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Toán Đơn Hàng Callback</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            width: 500px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover{
            background: #0056b3;
        }

        #ketQua{
            margin-top: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            line-height: 1.8;
        }

        .success{
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>QUY TRÌNH TÍNH TOÁN ĐƠN HÀNG</h2>

        <button onclick="xuLyDonHang(donHang1)">
            Kiểm Tra Đơn Hàng 1
        </button>

        <button onclick="xuLyDonHang(donHang2)">
            Kiểm Tra Đơn Hàng 2
        </button>

        <div id="ketQua"></div>

    </div>

    <script>

        // Dữ liệu đơn hàng mẫu
        const donHang1 = {
            ten: "Đơn hàng 1",
            sanPham: [
                { tenSP: "Áo", gia: 200000, soLuong: 2 },
                { tenSP: "Quần", gia: 300000, soLuong: 1 }
            ],
            maGiamGia: true
        };

        const donHang2 = {
            ten: "Đơn hàng 2",
            sanPham: [
                { tenSP: "Giày", gia: 500000, soLuong: 1 },
                { tenSP: "Mũ", gia: 100000, soLuong: 3 }
            ],
            maGiamGia: false
        };

        // Hàm tính tiền hàng
        function tinhTienHang(donHang, callback){

            let tongTien = 0;

            donHang.sanPham.forEach(function(sp){

                tongTien += sp.gia * sp.soLuong;
            });

            callback(tongTien);
        }

        // Hàm áp dụng giảm giá
        function giamGia(tongTien, donHang, callback){

            let tienGiam = 0;

            // Giảm giá theo tổng tiền
            if(tongTien >= 1000000){

                tienGiam = tongTien * 0.15;
            }
            else if(tongTien >= 500000){

                tienGiam = tongTien * 0.10;
            }

            // Giảm thêm nếu có mã khuyến mãi
            if(donHang.maGiamGia){

                tienGiam += 50000;
}

            let tienSauGiam = tongTien - tienGiam;

            callback(tienSauGiam, tienGiam);
        }

        // Hàm tính phí vận chuyển
        function tinhPhiShip(tienSauGiam, callback){

            let phiShip = 30000;

            // Miễn phí ship nếu trên 800k
            if(tienSauGiam >= 800000){

                phiShip = 0;
            }

            callback(phiShip);
        }

        // Hàm tính thuế VAT
        function tinhThue(tienSauGiam, callback){

            let thueVAT = tienSauGiam * 0.08;

            callback(thueVAT);
        }

        // Hàm xử lý toàn bộ đơn hàng bằng callback
        function xuLyDonHang(donHang){

            let ketQua = document.getElementById("ketQua");

            tinhTienHang(donHang, function(tongTien){

                giamGia(tongTien, donHang, function(tienSauGiam, tienGiam){

                    tinhPhiShip(tienSauGiam, function(phiShip){

                        tinhThue(tienSauGiam, function(thueVAT){

                            let tongThanhToan =
                                tienSauGiam + phiShip + thueVAT;

                            ketQua.className = "success";

                            ketQua.innerHTML = `
                                <h3>${donHang.ten}</h3>

                                <strong>Tổng tiền hàng:</strong>
                                ${tongTien.toLocaleString()} VNĐ <br>

                                <strong>Tiền giảm giá:</strong>
                                ${tienGiam.toLocaleString()} VNĐ <br>

                                <strong>Tiền sau giảm:</strong>
                                ${tienSauGiam.toLocaleString()} VNĐ <br>

                                <strong>Phí vận chuyển:</strong>
                                ${phiShip.toLocaleString()} VNĐ <br>

                                <strong>Thuế VAT (8%):</strong>
                                ${thueVAT.toLocaleString()} VNĐ <br>

                                <strong>Tổng thanh toán:</strong>
                                ${tongThanhToan.toLocaleString()} VNĐ
                            `;
                        });
                    });
                });
            });
        }

    </script>

</body>
</html>
