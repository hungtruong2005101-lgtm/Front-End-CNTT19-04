<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thêm Dữ Liệu Bằng Ajax</title>

    <!-- Nhúng jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f6;
            padding: 20px;
        }

        .container{
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .form-group{
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input{
            flex: 1;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        button{
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover{
            background-color: #1d4ed8;
        }

        .message{
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td{
            border: 1px solid #ddd;
        }

        th{
            background-color: #2563eb;
            color: white;
        }

        th, td{
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even){
            background-color: #f9fafb;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>THÊM MỚI SINH VIÊN</h1>

        <!-- Thông báo -->
        <div id="message" class="message"></div>

        <!-- Form -->
        <form id="studentForm">

            <div class="form-group">

                <input
                    type="text"
                    id="name"
                    placeholder="Nhập họ tên"
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Nhập email"
                >

                <input
                    type="text"
                    id="className"
                    placeholder="Nhập lớp"
                >

                <button type="submit">
                    Thêm
                </button>

            </div>

        </form>

        <!-- Bảng -->
        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Họ tên</th>
<th>Email</th>
                    <th>Lớp</th>

                </tr>

            </thead>

            <tbody id="studentList">

            </tbody>

        </table>

    </div>

    <script>

        // API MockAPI
        const API_URL =
            "https://6826e799397e48c91315f7f4.mockapi.io/students";

        // Render danh sách
        function renderStudents(students){

            let html = "";

            $.each(students, function(index, student){

                html += `
                    <tr>

                        <td>${student.id}</td>

                        <td>${student.name}</td>

                        <td>${student.email}</td>

                        <td>${student.className}</td>

                    </tr>
                `;

            });

            $("#studentList").html(html);

        }

        // Load dữ liệu
        function loadStudents(){

            $.ajax({

                url: API_URL,

                method: "GET",

                success: function(data){

                    renderStudents(data);

                },

                error: function(){

                    $("#message")

                        .text(
                            "Không thể tải dữ liệu!"
                        )

                        .css("color", "red");

                }

            });

        }

        // Submit form
        $("#studentForm").submit(function(event){

            // Chặn reload trang
            event.preventDefault();

            // Lấy dữ liệu
            let name =
                $("#name").val().trim();

            let email =
                $("#email").val().trim();

            let className =
                $("#className").val().trim();

            // Kiểm tra rỗng
            if(
                name === "" ||
                email === "" ||
                className === ""
            ){

                $("#message")

                    .text(
                        "Vui lòng nhập đầy đủ thông tin!"
                    )

                    .css("color", "red");

                return;

            }

            // Object dữ liệu
            let student = {

                name: name,

                email: email,

                className: className

            };

            // Ajax POST
            $.ajax({

                url: API_URL,

                method: "POST",

                contentType: "application/json",

                data: JSON.stringify(student),

                success: function(){

                    $("#message")

                        .text(
                            "Thêm sinh viên thành công!"
                        )

                        .css("color", "green");

                    // Reset form
                    $("#studentForm")[0].reset();

                    // Load lại danh sách
                    loadStudents();

                },
error: function(){

                    $("#message")

                        .text(
                            "Lỗi khi thêm dữ liệu!"
                        )

                        .css("color", "red");

                }

            });

        });

        // Gọi lần đầu
        loadStudents();

    </script>

</body>
</html>
