<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 22 - Biểu mẫu đăng nhập responsive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-4">
                <div class="card shadow border-0 p-4 rounded-3">
                    <div class="card-body">
                        <h3 class="card-title text-center fw-bold mb-4 text-primary">ĐĂNG NHẬP</h3>
                        
                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Địa chỉ Email</label>
                                <input type="email" class="form-control py-2" id="email" placeholder="name@example.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" class="form-control py-2" id="password" placeholder="••••••••" required>
                            </div>
                            
                            <div class="mb-3 d-flex justify-content-between align-items-center">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label text-muted small" for="remember">Ghi nhớ</label>
                                </div>
                                <a href="#" class="text-decoration-none small">Quên mật khẩu?</a>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Đăng Nhập</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
