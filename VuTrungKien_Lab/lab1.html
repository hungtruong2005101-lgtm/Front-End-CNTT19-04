<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 01 - Tính BMI</title>
    <style>
        body { font-family: sans-serif; margin: 30px; }
        .container { 
            max-width: 350px; 
            padding: 20px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            background-color: #f9f9f9;
        }
        input { 
            width: 100%; 
            margin-bottom: 15px; 
            padding: 8px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 10px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        button:hover { background-color: #0056b3; }
        #result { 
            margin-top: 15px; 
            font-weight: bold; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h3 style="text-align: center;">Tính Chỉ Số BMI</h3>
        
        <label for="height">Chiều cao (m):</label>
        <input type="number" id="height" step="0.01" placeholder="Ví dụ: 1.75">

        <label for="weight">Cân nặng (kg):</label>
        <input type="number" id="weight" placeholder="Ví dụ: 65">

        <button onclick="calculateBMI()">Tính toán</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateBMI() {
            // Bước 1: Lấy dữ liệu và ép kiểu Number
            let height = Number(document.getElementById('height').value);
            let weight = Number(document.getElementById('weight').value);
            let resultDiv = document.getElementById('result');
            if (height <= 0 || weight <= 0) {
                resultDiv.innerHTML = "Vui lòng nhập số hợp lệ lớn hơn 0!";
                resultDiv.style.color = "red";
                return;
            }
            let bmi = weight / (height * height);
            bmi = bmi.toFixed(2); 
            let category = "";
            let color = "";

            if (bmi < 18.5) {
                category = "Gầy";
                color = "#17a2b8"; 
            } else if (bmi >= 18.5 && bmi < 24.9) {
                category = "Bình thường";
                color = "#28a745"; 
            } else if (bmi >= 25 && bmi < 29.9) {
                category = "Thừa cân";
                color = "#fd7e14"; 
            } else {
                category = "Béo phì";
                color = "#dc3545"; 
            }
            resultDiv.innerHTML = `Chỉ số BMI của bạn: ${bmi} <br> Thể trạng: ${category}`;
            resultDiv.style.color = color;
        }
    </script>

</body>
</html>
