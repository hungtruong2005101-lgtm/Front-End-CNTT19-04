<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài lab số 13 - jQuery Cơ Bản</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <style>
        /* CSS thiết kế giao diện đơn giản để dễ quan sát */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            margin-right: 10px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f8f9fa;
        }
        button:hover {
            background-color: #e2e6ea;
        }
        /* Khối nội dung cần điều khiển */
        #content-box {
            width: 300px;
            height: 200px;
            background-color: #007bff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h2>Bài lab 13: Thao tác ẩn và hiện nội dung bằng jQuery</h2>

    <div class="controls">
        <button id="btnShow">Hiện nội dung</button>
        <button id="btnHide">Ẩn nội dung</button>
        
        <button id="btnToggle">Trạng thái: Đang Hiện (Click để Toggle)</button>
    </div>

    <div id="content-box">
        Khối nội dung jQuery
    </div>

    <script>
        // Đảm bảo DOM đã tải xong trước khi chạy jQuery
        $(document).ready(function() {
            
            // Bước 3 & 4: Dùng selector gắn sự kiện click và áp dụng hàm show/hide
            
            // Xử lý khi bấm nút "Hiện"
            $("#btnShow").click(function() {
                $("#content-box").show(); // Hàm show()
                $("#btnToggle").text("Trạng thái: Đang Hiện (Click để Toggle)");
            });

            // Xử lý khi bấm nút "Ẩn"
            $("#btnHide").click(function() {
                $("#content-box").hide(); // Hàm hide()
                $("#btnToggle").text("Trạng thái: Đang Ẩn (Click để Toggle)");
            });

            // Xử lý Yêu cầu mở rộng: Dùng toggle và thay đổi nhãn nút
            $("#btnToggle").click(function() {
                $("#content-box").toggle(); // Hàm toggle() đảo ngược trạng thái
                
                // Kiểm tra trạng thái hiện tại của khối nội dung để đổi text cho nút
                if ($("#content-box").is(":visible")) {
                    $(this).text("Trạng thái: Đang Hiện (Click để Toggle)");
                } else {
                    $(this).text("Trạng thái: Đang Ẩn (Click để Toggle)");
                }
            });
            
        });
    </script>

</body>
</html>
