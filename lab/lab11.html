<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 11 - Tra Cứu Theo Mã</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; }
        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 12px 25px;
            background: #2575fc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            min-height: 100px;
        }
        .success { background: #e8f5e9; border: 1px solid #28a745; }
        .error { background: #ffebee; border: 1px solid #dc3545; color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Tra Cứu Thông Tin Theo Mã</h1>
        
        <div class="search-box">
            <input type="text" id="searchId" placeholder="Nhập mã (ví dụ: 1, 2, 3...)" />
            <button onclick="searchById()">Tra Cứu</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');

        async function searchById() {
            const id = document.getElementById('searchId').value.trim();
            resultDiv.innerHTML = '<p>Đang tìm kiếm...</p>';

            if (!id) {
                showError("Vui lòng nhập mã định danh!");
                return;
            }

            try {
                // Sử dụng JSONPlaceholder (không cần tạo API)
                const response = await fetch(`https://jsonplaceholder.typicode.com/users/${id}`);
                
                if (!response.ok) {
                    throw new Error("Không tìm thấy thông tin!");
                }

                const user = await response.json();

                // Hiển thị kết quả
                resultDiv.className = "success";
                resultDiv.innerHTML = `
                    <h2> Thông tin người dùng mã <strong>#${id}</strong></h2>
                    <p><strong>Họ tên:</strong> ${user.name}</p>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Điện thoại:</strong> ${user.phone}</p>
                    <p><strong>Website:</strong> ${user.website}</p>
                    <p><strong>Thành phố:</strong> ${user.address.city}</p>
                    <p><strong>Công ty:</strong> ${user.company.name}</p>
                `;

            } catch (error) {
                showError(error.message);
            }
        }

        function showError(message) {
            resultDiv.className = "error";
            resultDiv.innerHTML = `
                <h3>❌ ${message}</h3>
                <p>Vui lòng thử lại với mã khác (1 đến 10).</p>
            `;
        }

        // Cho phép nhấn Enter để tra cứu
        document.getElementById('searchId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchById();
            }
        });
    </script>
</body>
</html>
