<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 09 - Quản Lý Công Việc</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-bottom: 20px; }
        .input-area { display: flex; margin-bottom: 20px; }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 5px; margin-left: 5px; }
        ul { list-style: none; padding: 0; }
        li {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        li.completed span { text-decoration: line-through; color: #888; }
        .delete-btn { margin-left: auto; background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Công Việc Của Tôi</h1>
        
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Nhập công việc mới...">
            <button onclick="addTask()">Thêm</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        let tasks = [];

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                if (task.completed) li.classList.add('completed');

                li.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} 
                           onchange="toggleComplete(${index})">
                    <span>${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">Xóa</button>
                `;
                list.appendChild(li);
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();

            if (text === '') return;

            tasks.push({ text: text, completed: false });
            input.value = '';
            renderTasks();
        }

        function toggleComplete(index) {
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        // Nhấn Enter để thêm
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Khởi động
        window.onload = renderTasks;
    </script>
</body>
</html>
