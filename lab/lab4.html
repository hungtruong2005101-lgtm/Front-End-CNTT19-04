<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xử Lý Điểm Sinh Viên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        th { background: #f8f9fa; }
        .result {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 18px;
        }
        input {
            padding: 10px;
            width: 100px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-primary { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-info { background: #17a2b8; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Xử Lý Điểm Sinh Viên</h1>
        
        <h3>Danh sách điểm hiện tại:</h3>
        <table id="gradeTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Điểm</th>
                </tr>
            </thead>
            <tbody id="gradeBody"></tbody>
        </table>

        <div class="result" id="result"></div>

        <h3>Thao tác:</h3>
        <input type="number" id="newGrade" placeholder="Nhập điểm" min="0" max="10" step="0.1">
        <button class="btn-primary" onclick="addGrade()">Thêm điểm</button>
        <button class="btn-danger" onclick="removeLowest()">Xóa điểm thấp nhất</button>
        <button class="btn-info" onclick="calculateAverage()">Tính Trung Bình</button>
        <button onclick="resetData()">Reset dữ liệu</button>
    </div>

    <script>
        // Mảng điểm mẫu (ít nhất 5 giá trị)
        let grades = [7.5, 8.0, 6.5, 9.0, 5.5, 8.5];

        // Hiển thị danh sách điểm
        function displayGrades() {
            const tbody = document.getElementById('gradeBody');
            tbody.innerHTML = '';

            grades.forEach((point, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td><strong>${point}</strong></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        // Tính trung bình và phân loại
        function calculateAverage() {
            if (grades.length === 0) {
                alert("Danh sách điểm trống!");
                return;
            }

            let sum = 0;
            for (let i = 0; i < grades.length; i++) {
                sum += grades[i];
            }

            const average = (sum / grades.length).toFixed(2);

            let classification = "";
            if (average >= 9.0) classification = "Xuất sắc";
            else if (average >= 8.0) classification = "Giỏi";
            else if (average >= 7.0) classification = "Khá";
            else if (average >= 5.0) classification = "Trung bình";
            else classification = "Yếu";

            document.getElementById('result').innerHTML = `
                <strong>Tổng số điểm:</strong> ${grades.length} môn<br>
                <strong>Tổng điểm:</strong> ${sum.toFixed(2)}<br>
                <strong>Điểm trung bình:</strong> ${average}<br>
                <strong>Xếp loại:</strong> <span style="color:#28a745; font-size:20px">${classification}</span>
            `;
        }

        // Thêm điểm mới
        function addGrade() {
            const input = document.getElementById('newGrade');
            const point = parseFloat(input.value);

            if (isNaN(point) || point < 0 || point > 10) {
                alert("Vui lòng nhập điểm hợp lệ (từ 0 đến 10)!");
                return;
            }

            grades.push(point);
            input.value = "";
            displayGrades();
            alert(`Đã thêm điểm ${point}`);
        }

        // Xóa điểm thấp nhất
        function removeLowest() {
            if (grades.length === 0) {
                alert("Danh sách trống!");
                return;
            }

            let min = Math.min(...grades);
            let index = grades.indexOf(min);
            grades.splice(index, 1);

            displayGrades();
            alert(`Đã xóa điểm thấp nhất: ${min}`);
        }

        // Reset dữ liệu gốc
        function resetData() {
            if (confirm("Bạn có chắc muốn reset dữ liệu về mặc định?")) {
                grades = [7.5, 8.0, 6.5, 9.0, 5.5, 8.5];
                document.getElementById('result').innerHTML = "";
                displayGrades();
            }
        }

        // Khởi chạy khi tải trang
        window.onload = function() {
            displayGrades();
        };
    </script>
</body>
</html>
