<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Chỉ Số BMI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #5a6fd8;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            display: none;
        }
        .underweight { background: #a3d8ff; color: #0c4a6e; }
        .normal { background: #a3f4c8; color: #14532d; }
        .overweight { background: #fde047; color: #854d0e; }
        .obese { background: #fecaca; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📏 Tính Chỉ Số BMI</h1>
        
        <div class="form-group">
            <label for="height">Chiều cao (mét)</label>
            <input type="number" id="height" step="0.01" placeholder="Ví dụ: 1.75" min="0">
        </div>

        <div class="form-group">
            <label for="weight">Cân nặng (kg)</label>
            <input type="number" id="weight" step="0.1" placeholder="Ví dụ: 68" min="0">
        </div>

        <button onclick="calculateBMI()">Tính BMI</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateBMI() {
            const heightInput = document.getElementById('height');
            const weightInput = document.getElementById('weight');
            const resultDiv = document.getElementById('result');

            const height = parseFloat(heightInput.value);
            const weight = parseFloat(weightInput.value);

            // Kiểm tra dữ liệu đầu vào
            if (!height || !weight) {
                showResult("Vui lòng nhập đầy đủ chiều cao và cân nặng!", "red");
                return;
            }

            if (height <= 0 || weight <= 0) {
                showResult("Chiều cao và cân nặng phải lớn hơn 0!", "red");
                return;
            }

            // Tính BMI
            const bmi = weight / (height * height);
            const bmiRounded = bmi.toFixed(2);

            // Phân loại
            let category = "";
            let className = "";

            if (bmi < 18.5) {
                category = "Gầy (Thiếu cân)";
                className = "underweight";
            } else if (bmi < 25) {
                category = "Bình thường";
                className = "normal";
            } else if (bmi < 30) {
                category = "Thừa cân";
                className = "overweight";
            } else {
                category = "Béo phì";
                className = "obese";
            }

            // Hiển thị kết quả
            resultDiv.innerHTML = `
                <h2>Chỉ số BMI: <strong>${bmiRounded}</strong></h2>
                <h3>Phân loại: <strong>${category}</strong></h3>
            `;
            resultDiv.className = `result ${className}`;
            resultDiv.style.display = "block";
        }

        function showResult(message, color) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<strong>${message}</strong>`;
            resultDiv.style.background = "#fee2e2";
            resultDiv.style.color = color;
            resultDiv.style.display = "block";
        }
    </script>
</body>
</html>
