<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 13 - Ẩn/Hiện bằng jQuery</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 { color: #333; }
        #content {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            min-height: 150px;
            border: 2px solid #ddd;
            transition: all 0.4s;
        }
        button {
            padding: 12px 20px;
            margin: 8px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-hide { background: #e74c3c; color: white; }
        .btn-show { background: #27ae60; color: white; }
        .btn-toggle { background: #3498db; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Thao Tác Ẩn / Hiện bằng jQuery</h1>
        
        <div id="content">
            <h2>Thông tin sinh viên</h2>
            <p><strong>Họ tên:</strong> Nguyễn Hải An</p>
            <p><strong>Mã SV:</strong> 2251123456</p>
            <p><strong>Lớp:</strong> CNTT K18</p>
            <p>Đây là nội dung sẽ được ẩn hoặc hiện bằng jQuery.</p>
            <img src="https://picsum.photos/id/64/200/150" alt="Hình minh họa" style="border-radius:8px;">
        </div>

        <div>
            <button class="btn-hide" onclick="hideContent()">Ẩn Nội Dung</button>
            <button class="btn-show" onclick="showContent()">Hiện Nội Dung</button>
            <button class="btn-toggle" onclick="toggleContent()">Toggle (Chuyển đổi)</button>
        </div>

        <p style="margin-top: 20px;">
            Trạng thái hiện tại: <strong id="status">Đang hiển thị</strong>
        </p>
    </div>

    <script>
        // Kiểm tra jQuery đã load chưa
        $(document).ready(function() {
            console.log("jQuery đã sẵn sàng!");

            // Cập nhật trạng thái ban đầu
            updateStatus();
        });

        function hideContent() {
            $("#content").hide(500);  // Ẩn trong 0.5 giây
            updateStatus();
        }

        function showContent() {
            $("#content").show(500);  // Hiện trong 0.5 giây
            updateStatus();
        }

        function toggleContent() {
            $("#content").toggle(400); // Chuyển đổi trạng thái
            updateStatus();
        }

        // Cập nhật thông báo trạng thái
        function updateStatus() {
            setTimeout(() => {
                if ($("#content").is(":visible")) {
                    $("#status").text("Đang hiển thị").css("color", "green");
                } else {
                    $("#status").text("Đang ẩn").css("color", "red");
                }
            }, 500);
        }
    </script>
</body>
</html>
