<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 16 - Bộ Đếm Tương Tác</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        #count {
            font-size: 80px;
            font-weight: bold;
            margin: 30px 0;
            padding: 20px;
            border-radius: 12px;
            min-height: 100px;
            transition: all 0.3s;
        }
        .buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        button {
            padding: 14px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-width: 80px;
        }
        .btn-increase { background: #28a745; color: white; }
        .btn-decrease { background: #dc3545; color: white; }
        .btn-reset { background: #6c757d; color: white; }
        .btn-quick { background: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Bộ Đếm Tương Tác</h1>
        
        <div id="count">0</div>
        
        <div class="buttons">
            <button class="btn-decrease" onclick="changeCount(-1)">-1</button>
            <button class="btn-decrease" onclick="changeCount(-10)">-10</button>
            
            <button class="btn-reset" onclick="resetCount()">Đặt lại</button>
            
            <button class="btn-increase" onclick="changeCount(1)">+1</button>
            <button class="btn-increase" onclick="changeCount(10)">+10</button>
        </div>
    </div>

    <script>
        let count = 0;

        function updateDisplay() {
            $("#count").text(count);

            // Đổi màu theo giá trị (yêu cầu mở rộng)
            if (count > 0) {
                $("#count").css({
                    "color": "#28a745",
                    "background": "#e8f5e9"
                });
            } 
            else if (count < 0) {
                $("#count").css({
                    "color": "#dc3545",
                    "background": "#f8d7da"
                });
            } 
            else {
                $("#count").css({
                    "color": "#333",
                    "background": "#f8f9fa"
                });
            }
        }

        function changeCount(value) {
            count += value;
            updateDisplay();
        }

        function resetCount() {
            count = 0;
            updateDisplay();
        }

        // Khởi tạo khi trang tải xong
        $(document).ready(function() {
            updateDisplay();
        });
    </script>
</body>
</html>
