<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 06 - Tính Đơn Hàng bằng Callback</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; }
        .step {
            background: #f8f9fa;
            padding: 15px;
            margin: 12px 0;
            border-radius: 8px;
            border-left: 5px solid #2575fc;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            background: #2575fc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
        #result { margin-top: 20px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Tính Toán Đơn Hàng (Sử dụng Callback)</h1>
        <p><strong>Dữ liệu đơn hàng mẫu:</strong></p>
        
        <button onclick="startOrderCalculation()">🚀 Bắt đầu Tính Toán Đơn Hàng</button>
        
        <div id="result"></div>
    </div>

    <script>
        // Dữ liệu đơn hàng
        const order = {
            customer: "Hải An",
            items: [
                { name: "iPhone 15", price: 24900000, qty: 1 },
                { name: "Tai nghe AirPods", price: 4500000, qty: 2 },
                { name: "Sạc dự phòng", price: 850000, qty: 1 }
            ],
            discountCode: "SALE20"
        };

        // Bước 1: Tính tiền hàng gốc
        function calculateBaseAmount(order, callback) {
            let baseAmount = 0;
            order.items.forEach(item => {
                baseAmount += item.price * item.qty;
            });
            
            document.getElementById('result').innerHTML += `
                <div class="step">
                    <strong>Bước 1:</strong> Tính tiền hàng gốc<br>
                    → Tổng tiền tạm tính: <strong>${baseAmount.toLocaleString('vi-VN')} ₫</strong>
                </div>
            `;
            
            callback(baseAmount);
        }

        // Bước 2: Áp dụng giảm giá
        function applyDiscount(baseAmount, discountCode, callback) {
            let discountRate = 0;
            
            if (discountCode === "SALE20") discountRate = 20;
            else if (discountCode === "SALE10") discountRate = 10;
            
            const discountAmount = Math.round(baseAmount * discountRate / 100);
            const amountAfterDiscount = baseAmount - discountAmount;
            
            document.getElementById('result').innerHTML += `
                <div class="step">
                    <strong>Bước 2:</strong> Áp dụng mã giảm giá "${discountCode}"<br>
                    → Giảm ${discountRate}%: <strong>-${discountAmount.toLocaleString('vi-VN')} ₫</strong><br>
                    → Còn lại: <strong>${amountAfterDiscount.toLocaleString('vi-VN')} ₫</strong>
                </div>
            `;
            
            callback(amountAfterDiscount);
        }

        // Bước 3: Tính phí vận chuyển
        function calculateShipping(amountAfterDiscount, callback) {
            let shippingFee = 50000; // phí mặc định
            
            if (amountAfterDiscount > 2000000) {
                shippingFee = 0; // miễn phí ship cho đơn > 2 triệu
            }
            
            document.getElementById('result').innerHTML += `
                <div class="step">
                    <strong>Bước 3:</strong> Tính phí vận chuyển<br>
                    → Phí ship: <strong>${shippingFee === 0 ? 'Miễn phí' : shippingFee.toLocaleString('vi-VN') + ' ₫'}</strong>
                </div>
            `;
            
            callback(shippingFee);
        }

        // Bước 4: Tính tổng thanh toán cuối cùng
        function calculateFinalTotal(amountAfterDiscount, shippingFee, callback) {
            const finalTotal = amountAfterDiscount + shippingFee;
            
            document.getElementById('result').innerHTML += `
                <div class="step" style="background:#e9f7ef; border-left-color:#28a745;">
                    <strong>✅ KẾT QUẢ CUỐI CÙNG</strong><br>
                    Tổng thanh toán: <strong style="font-size:20px; color:#28a745;">
                        ${finalTotal.toLocaleString('vi-VN')} ₫
                    </strong>
                </div>
            `;
            
            if (callback) callback(finalTotal);
        }

        // ====================== CHẠY QUY TRÌNH ======================
        function startOrderCalculation() {
            document.getElementById('result').innerHTML = `<h3>Đang xử lý đơn hàng của ${order.customer}...</h3>`;
            
            // Sử dụng Callback Hell (cách viết callback lồng nhau)
            calculateBaseAmount(order, function(baseAmount) {
                applyDiscount(baseAmount, order.discountCode, function(amountAfterDiscount) {
                    calculateShipping(amountAfterDiscount, function(shippingFee) {
                        calculateFinalTotal(amountAfterDiscount, shippingFee);
                    });
                });
            });
        }
    </script>
</body>
</html>
