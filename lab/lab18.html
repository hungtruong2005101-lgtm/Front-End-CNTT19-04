<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 18 - Quản Lý Thành Viên</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-add { background: #28a745; color: white; }
        .btn-search { background: #17a2b8; color: white; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            color: #333;
        }
        .action-btn {
            padding: 6px 12px;
            margin: 0 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-edit { background: #ffc107; color: #333; }
        .btn-delete { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 Quản Lý Danh Sách Thành Viên</h1>
        
        <div class="input-area">
            <input type="text" id="memberName" placeholder="Nhập tên thành viên...">
            <button class="btn-add" onclick="addMember()">Thêm</button>
            <button class="btn-search" onclick="searchMember()">Tìm</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Tên Thành Viên</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="memberList"></tbody>
        </table>
    </div>

    <script>
        let members = [];
        let editId = null;

        function renderList(data) {
            const tbody = $("#memberList");
            tbody.html('');

            data.forEach((member, index) => {
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td><span class="member-name">${member}</span></td>
                        <td>
                            <button class="action-btn btn-edit" onclick="editMember(${index})">Sửa</button>
                            <button class="action-btn btn-delete" onclick="deleteMember(${index})">Xóa</button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        // Thêm thành viên mới
        function addMember() {
            const name = $("#memberName").val().trim();
            
            if (name === "") {
                alert("Vui lòng nhập tên thành viên!");
                return;
            }

            if (editId !== null) {
                // Chế độ sửa
                members[editId] = name;
                editId = null;
                $("#memberName").val('');
            } else {
                // Chế độ thêm mới
                members.push(name);
            }

            renderList(members);
            $("#memberName").val('');
        }

        // Sửa thành viên
        function editMember(index) {
            editId = index;
            $("#memberName").val(members[index]);
            $("#memberName").focus();
        }

        // Xóa thành viên
        function deleteMember(index) {
            if (confirm("Bạn có chắc muốn xóa thành viên này?")) {
                members.splice(index, 1);
                renderList(members);
            }
        }

        // Tìm kiếm theo tên
        function searchMember() {
            const keyword = $("#memberName").val().trim().toLowerCase();
            
            if (keyword === "") {
                renderList(members);
                return;
            }

            const filtered = members.filter(name => 
                name.toLowerCase().includes(keyword)
            );
            
            renderList(filtered);
        }

        // Cho phép nhấn Enter để thêm / tìm
        $("#memberName").keypress(function(e) {
            if (e.key === "Enter") {
                if ($("#memberName").val().trim() !== "") {
                    addMember();
                }
            }
        });

        // Khởi tạo dữ liệu mẫu
        $(document).ready(function() {
            members = [
                "Nguyễn Văn An",
                "Trần Thị Lan",
                "Lê Minh Quân",
                "Phạm Thị Hương",
                "Đỗ Hoàng Nam"
            ];
            renderList(members);
        });
    </script>
</body>
</html>
