<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 14 - Hiệu ứng jQuery</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { 
            color: #333; 
            margin-bottom: 25px; 
        }
        .box {
            width: 320px;
            height: 180px;
            margin: 25px auto;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        .buttons {
            margin: 20px 0;
        }
        button {
            padding: 12px 18px;
            margin: 6px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-fade { background: #17a2b8; color: white; }
        .btn-slide { background: #28a745; color: white; }
        .btn-chain { background: #ffc107; color: #333; }
        .btn-reset { background: #6c757d; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Hiệu Ứng Giao Diện với jQuery</h1>
        
        <div id="demoBox" class="box">
            Khối Nội Dung Demo
        </div>

        <div class="buttons">
            <button class="btn-fade" onclick="fadeInBox()">Fade In</button>
            <button class="btn-fade" onclick="fadeOutBox()">Fade Out</button>
            <button class="btn-slide" onclick="slideDownBox()">Slide Down</button>
            <button class="btn-slide" onclick="slideUpBox()">Slide Up</button>
            <button class="btn-chain" onclick="chainEffects()">Chaining Effects</button>
            <button class="btn-reset" onclick="resetBox()">Reset</button>
        </div>

        <p><strong>Demo các hiệu ứng phổ biến của jQuery</strong></p>
    </div>

    <script>
        $(document).ready(function() {
            console.log("jQuery loaded - Lab 14 ready!");
        });

        function fadeInBox() {
            $("#demoBox").fadeIn(800);
        }

        function fadeOutBox() {
            $("#demoBox").fadeOut(800);
        }

        function slideDownBox() {
            $("#demoBox").slideDown(600);
        }

        function slideUpBox() {
            $("#demoBox").slideUp(600);
        }

        function chainEffects() {
            $("#demoBox")
                .fadeOut(400)
                .slideUp(300)
                .fadeIn(600)
                .slideDown(500);
        }

        function resetBox() {
            $("#demoBox")
                .stop(true, true)
                .fadeIn(400)
                .slideDown(400);
        }

        // Click vào box để highlight
        $("#demoBox").click(function() {
            $(this).css("background", "#28a745");
            setTimeout(() => {
                $(this).css("background", "linear-gradient(45deg, #007bff, #00c6ff)");
            }, 800);
        });
    </script>
</body>
</html>
