<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">
    <div class="container ty-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow p-4 rounded">
                    <h3 class="text-center mb-4 text-primary">Đăng nhập</h3>
                    <form bindsubmit="login" method="post" action="/login">
                        <div class="mb-3">
                            <label for="inputemail" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="inputemail" name="email" placeholder="Nhập địa chỉ email">
                        </div>
                        <div class="mb-3">
                            <label for="inputpassword" class="form-label fw-bold">Mật khẩu</label>
                            <input type="password" class="form-control" id="inputpassword" placeholder="Nhập mật khẩu">
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberme">
                                <label for="rememberme">Ghi nhớ đăng nhập</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Đăng nhập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
