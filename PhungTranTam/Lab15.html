<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bài 3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    .err { color: red; font-size: 13px; display: none; }
    input { display: block; margin: 4px 0 2px; padding: 4px; width: 260px; }
    #success { color: green; display: none; }
  </style>
</head>
<body>
  <h2>Bài 3</h2>
  <form id="form">
    <label>Họ tên:</label>
    <input type="text" id="fullname">
    <span class="err" id="err-fullname"></span>

    <label>Email:</label>
    <input type="text" id="email">
    <span class="err" id="err-email"></span>

    <label>Mật khẩu:</label>
    <input type="password" id="password">
    <span class="err" id="err-password"></span>

    <label>Xác nhận mật khẩu:</label>
    <input type="password" id="confirm">
    <span class="err" id="err-confirm"></span>

    <br>
    <button type="submit">Đăng ký</button>
  </form>
  <p id="success">Đăng ký thành công!</p>
  <script>
    var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    function showErr(id, msg) {
      $('#err-' + id).text(msg).show();
    }
    function clearErr(id) {
      $('#err-' + id).hide();
    }
    $('#form').on('submit', function (e) {
      e.preventDefault();
      var ok = true;
      var name = $('#fullname').val().trim();
      var email = $('#email').val().trim();
      var pw = $('#password').val();
      var cfm = $('#confirm').val();

      clearErr('fullname'); clearErr('email');
      clearErr('password'); clearErr('confirm');
      $('#success').hide();

      if (!name) { showErr('fullname', 'Họ tên không được để trống.'); ok = false; }
      if (!email) { showErr('email', 'Email không được để trống.'); ok = false; }
      else if (!emailRegex.test(email)) { showErr('email', 'Email không đúng định dạng.'); ok = false; }
      if (!pw) { showErr('password', 'Mật khẩu không được để trống.'); ok = false; }
      else if (pw.length < 8) { showErr('password', 'Mật khẩu phải có ít nhất 8 ký tự.'); ok = false; }
      if (!cfm) { showErr('confirm', 'Vui lòng xác nhận mật khẩu.'); ok = false; }
      else if (pw !== cfm) { showErr('confirm', 'Mật khẩu xác nhận không khớp.'); ok = false; }
      if (ok) $('#success').fadeIn(400);
    });
  </script>
</body>
</html>
