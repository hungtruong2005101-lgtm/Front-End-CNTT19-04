<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Su Kien</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .hero{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:100px 20px;
        }
        .hero h1{
            font-size:50px;
        }
        .box{
            border-radius:10px;
            padding:20px;
            background:white;
        }
        body{
            background:#f5f5f5;
        }
        form{
            background:white;
            padding:30px;
            border-radius:10px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">
            Su Kien CNTT
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link">Trang Chu</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link">Noi Dung</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link">Dang Ky</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="hero">
    <h1>Hoi Thao Cong Nghe</h1>
    <p>
        Chao mung ban den voi su kien cong nghe
    </p>
    <button class="btn btn-light">
        Dang Ky Ngay
    </button>
</div>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="box shadow">
                <h3>Diem Noi Bat</h3>
                <p>Cong nghe moi</p>
                <p>Giao luu chuyen gia</p>
                <p>Hoc hoi kinh nghiem</p>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="box shadow">
                <h3>Lich Trinh</h3>
                <p>8h00 Khai Mac</p>
                <p>9h00 Thuyet Trinh</p>
                <p>14h00 Thao Luan</p>
            </div>
        </div>
    </div>
</div>
<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4">
        Dang Ky
    </h2>
    <form>
        <div class="mb-3">
            <label>Ho Ten</label>
            <input type="text" class="form-control">
        </div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control">
        </div>
        <div class="mb-3">
            <label>So Dien Thoai</label>
            <input type="text" class="form-control">
        </div>
        <button class="btn btn-success" id="MyButton">
            Gui Dang Ky
        </button>
    </form>
</div>
<script>
    $(document).ready(function(){
        $("#MyButton").click(function(){
            alert("Da gui dang ky thanh cong!");
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
