<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <h2 class="text-center mb-5 fw-bold text-uppercase">Sản Phẩm Nổi Bật</h2>        
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            
            <div class="col">
                <div class="card h-100 shadow-sm border-0 position-relative">
                    <span class="position-absolute top-0 start-0 badge bg-danger m-3 fs-6">-20%                       
                    </span>                   
                    <img src="gaiy.webp"card-img-top" alt="Ảnh sản phẩm">      
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">Giày Thể Thao Sneaker X</h5>
                        <p class="card-text text-muted flex-grow-1">Phiên bản giới hạn với chất liệu thoáng khí, êm ái.</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="text-danger fw-bold fs-5">1.200.000 đ</span>
                        <button class="btn btn-outline-primary btn-sm">Mua ngay</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 shadow-sm border-0 position-relative">
                    <img src="chạybo.jpg" class="card-img-top" alt="Ảnh sản phẩm">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">Giày Chạy Bộ Run Pro</h5>
                        <p class="card-text text-muted flex-grow-1">Hỗ trợ đệm chân tối đa cho các buổi chạy dài.</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="text-danger fw-bold fs-5">950.000 đ</span>
                        <button class="btn btn-outline-primary btn-sm">Mua ngay</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 shadow-sm border-0 position-relative">
                    <img src="aothethao.jpg" class="card-img-top" alt="Ảnh sản phẩm">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">Áo Khoác Thể Thao</h5>
                        <p class="card-text text-muted flex-grow-1">Chống gió tốt, thời trang và năng động.</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="text-danger fw-bold fs-5">450.000 đ</span>
                            <button class="btn btn-outline-primary btn-sm">Mua ngay</button>
                        </div>
                    </div>
                </div>
            </div>

            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
