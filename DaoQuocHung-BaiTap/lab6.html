<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 06 - Callback</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        .container{
            width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        .box{
            border: 1px solid gray;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
        }

        button{
            padding: 10px 20px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: blue;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>LAB 06 - TÍNH TOÁN ĐƠN HÀNG CALLBACK</h1>

        <button onclick="xuLyDonHang()">Tính đơn hàng</button>

        <div id="output"></div>

    </div>

    <script>

        let donHang = {
            tenSanPham: "Laptop Dell",
            gia: 1500,
            soLuong: 2
        };

        function tinhTienGoc(donHang, callback){

            let tongTien = donHang.gia * donHang.soLuong;

            callback(tongTien);

        }

        function giamGia(tongTien, callback){

            let giam = tongTien * 0.1;

            let tienSauGiam = tongTien - giam;

            callback(tienSauGiam);

        }

        function phiVanChuyen(tienSauGiam, callback){

            let phiShip = 50;

            let tongThanhToan = tienSauGiam + phiShip;

            callback(tongThanhToan);

        }

        function xuLyDonHang(){

            tinhTienGoc(donHang, function(tongTien){

                giamGia(tongTien, function(tienSauGiam){

                    phiVanChuyen(tienSauGiam, function(tongThanhToan){

                        document.getElementById("output").innerHTML = `

                            <div class="box">

                                <p><b>Sản phẩm:</b> ${donHang.tenSanPham}</p>

                                <p><b>Giá:</b> ${donHang.gia}$</p>

                                <p><b>Số lượng:</b> ${donHang.soLuong}</p>

                                <hr>

                                <p><b>Tổng tiền gốc:</b> ${tongTien}$</p>

                                <p><b>Sau giảm giá 10%:</b> ${tienSauGiam}$</p>

                                <p><b>Phí vận chuyển:</b> 50$</p>

                                <h3>Tổng thanh toán: ${tongThanhToan}$</h3>

                            </div>

                        `;

                    });

                });

            });

        }

    </script>

</body>
</html>
