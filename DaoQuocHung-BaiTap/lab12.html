<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 12 - Quản lý sinh viên</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        .container{
            width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        .form-group{
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input{
            padding: 10px;
            flex: 1;
            font-size: 16px;
        }

        button{
            padding: 10px 15px;
            border: none;
            background: darkblue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: blue;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td{
            border: 1px solid #ccc;
        }

        th{
            background: darkblue;
            color: white;
        }

        th, td{
            padding: 10px;
            text-align: center;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>QUẢN LÝ SINH VIÊN</h1>

        <div class="form-group">

            <input 
                type="text"
                id="name"
                placeholder="Tên sinh viên"
            >

            <input 
                type="text"
                id="email"
                placeholder="Email"
            >

            <input 
                type="text"
                id="lop"
                placeholder="Lớp"
            >

            <button onclick="themSinhVien()">
                Thêm
            </button>

        </div>

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Email</th>
                    <th>Lớp</th>
                    <th>Hành động</th>
                </tr>

            </thead>

            <tbody id="studentList">

            </tbody>

        </table>

    </div>

    <script>

        let api = "https://jsonplaceholder.typicode.com/users";

        async function loadStudents(){

            let response = await fetch(api);

            let students = await response.json();

            let html = "";

            students.forEach(function(student){

                html += `

                    <tr>

                        <td>${student.id}</td>

                        <td>${student.name}</td>

                        <td>${student.email}</td>

                        <td>${student.username}</td>

                        <td>

                            <button onclick="xoaSinhVien(${student.id})">
                                Xóa
                            </button>

                        </td>

                    </tr>

                `;

            });

            document.getElementById("studentList").innerHTML = html;

        }

        async function themSinhVien(){

            let name = document.getElementById("name").value;

            let email = document.getElementById("email").value;

            let lop = document.getElementById("lop").value;

            if(name === "" || email === "" || lop === ""){

                alert("Vui lòng nhập đầy đủ thông tin!");

                return;

            }

            let newStudent = {
                name: name,
                email: email,
                username: lop
            };

            await fetch(api, {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(newStudent)

            });

            alert("Thêm sinh viên thành công!");

            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("lop").value = "";

            loadStudents();

        }

        async function xoaSinhVien(id){

            await fetch(`${api}/${id}`, {

                method: "DELETE"

            });

            alert("Xóa sinh viên thành công!");

            loadStudents();

        }

        loadStudents();

    </script>

</body>
</html>
