<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 11 - Tra cứu thông tin</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        .container{
            width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        .search-box{
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input{
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button{
            padding: 10px 15px;
            border: none;
            background: darkblue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: blue;
        }

        .card{
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
            background: #fafafa;
        }

        .error{
            color: red;
            font-weight: bold;
            text-align: center;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>LAB 11 - TRA CỨU THÔNG TIN</h1>

        <div class="search-box">

            <input 
                type="number"
                id="userId"
                placeholder="Nhập ID người dùng..."
            >

            <button onclick="timKiem()">
                Tra cứu
            </button>

            <button onclick="xoaNoiDung()">
                Xóa
            </button>

        </div>

        <div id="output"></div>

    </div>

    <script>

        async function timKiem(){

            let id = document.getElementById("userId").value;

            let output = document.getElementById("output");

            if(id === ""){

                output.innerHTML = `
                    <p class="error">
                        Vui lòng nhập ID!
                    </p>
                `;

                return;

            }

            output.innerHTML = "Đang tải dữ liệu...";

            try{

                let response = await fetch(
                    `https://jsonplaceholder.typicode.com/users/${id}`
                );

                if(!response.ok){

                    throw new Error("Không tìm thấy dữ liệu");

                }

                let user = await response.json();

                output.innerHTML = `

                    <div class="card">

                        <p><b>ID:</b> ${user.id}</p>

                        <p><b>Tên:</b> ${user.name}</p>

                        <p><b>Email:</b> ${user.email}</p>

                        <p><b>Số điện thoại:</b> ${user.phone}</p>

                        <p><b>Website:</b> ${user.website}</p>

                        <p><b>Thành phố:</b> ${user.address.city}</p>

                    </div>

                `;

            }
            catch(error){

                output.innerHTML = `
                    <p class="error">
                        Không tìm thấy người dùng!
                    </p>
                `;

            }

        }

        function xoaNoiDung(){

            document.getElementById("userId").value = "";

            document.getElementById("output").innerHTML = "";

        }

    </script>

</body>
</html>
