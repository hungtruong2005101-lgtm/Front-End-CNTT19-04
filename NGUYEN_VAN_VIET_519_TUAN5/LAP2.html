<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAP2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-5">
            Danh Sách Sản Phẩm
        </h1>
        <div class="row g-4">
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow rounded">
                    <img src="tainghe.png" class="card-img-top">
                    <div class="card-body">
                        <span class="badge bg-danger mb-2">
                            Giảm giá
                        </span>
                        <h5 class="card-title">
                            Tai nghe Bluetooth
                        </h5>
                        <p class="card-text text-danger fw-bold">
                            500.000đ
                        </p>
                        <button class="btn btn-primary">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow rounded">
                    <img src="banphim.png" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">
                            Bàn phím cơ
                        </h5>
                        <p class="card-text text-danger fw-bold">
                            1.200.000đ
                        </p>
                        <button class="btn btn-success">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow rounded">
                    <img src="chuot.png" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">
                            Chuột gaming
                        </h5>
                        <p class="card-text text-danger fw-bold">
                            700.000đ
                        </p>
                        <button class="btn btn-warning">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow rounded">
                    <img src="maytinh.png" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">
                            Laptop ASUS
                        </h5>
                        <p class="card-text text-danger fw-bold">
                            18.000.000đ
                        </p>
                        <button class="btn btn-dark">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow rounded">
                    <img src="dienthoai.png" class="card-img-top">

                    <div class="card-body">
                        <h5 class="card-title">
                            Điện thoại iPhone
                        </h5>

                        <p class="card-text text-danger fw-bold">
                            25.000.000đ
                        </p>

                        <button class="btn btn-info">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow rounded">
                    <img src="dongho.png" class="card-img-top">

                    <div class="card-body">
                        <h5 class="card-title">
                            Đồng hồ thông minh
                        </h5>
                        <p class="card-text text-danger fw-bold">
                            3.000.000đ
                        </p>
                        <button class="btn btn-secondary">
                            Mua ngay
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
