<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bài Lab 18 – Quản Lý Thành Viên</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      padding: 32px 36px;
      width: 500px;
    }

    h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #2196F3; }

    .input-row button {
      padding: 10px 18px;
      background: #2196F3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .search-row {
      margin-bottom: 16px;
    }

    .search-row input {
      width: 100%;
      padding: 9px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-row input:focus { border-color: #2196F3; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr { background: #f5f5f5; }

    th, td {
      padding: 10px 12px;
      font-size: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th { color: #555; font-weight: 600; }
    td { color: #333; }

    td:first-child { color: #999; width: 36px; text-align: center; }

    .action-group { display: flex; gap: 8px; }

    .btn-edit, .btn-delete {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-edit   { background: #ff9800; color: #fff; }
    .btn-delete { background: #e53935; color: #fff; }
    .btn-edit:active, .btn-delete:active { opacity: 0.8; }

    .edit-input {
      width: 100%;
      padding: 4px 8px;
      border: 1px solid #2196F3;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    .btn-save {
      padding: 5px 12px;
      background: #43a047;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .empty-msg {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Quản Lý Thành Viên</h2>

  <div class="input-row">
    <input type="text" id="nameInput" placeholder="Nhập tên thành viên..." />
    <button id="btnAdd">Thêm</button>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên..." />
  </div>

  <table>
    <thead>
      <tr>
        <th>STT</th>
        <th>Tên thành viên</th>
        <th>Thao tác</th>
      </tr>
    </thead>
    <tbody id="memberList">
      <tr class="empty-row">
        <td colspan="3" class="empty-msg">Chưa có thành viên nào.</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  var stt = 0;

  function reIndex() {
    $('#memberList tr[data-id]').each(function (i) {
      $(this).find('.stt').text(i + 1);
    });
  }

  function checkEmpty() {
    if ($('#memberList tr[data-id]').length === 0) {
      if ($('#memberList .empty-row').length === 0) {
        $('#memberList').append('<tr class="empty-row"><td colspan="3" class="empty-msg">Chưa có thành viên nào.</td></tr>');
      }
    } else {
      $('#memberList .empty-row').remove();
    }
  }

  function addMember(name) {
    stt++;
    var row = $(
      '<tr data-id="' + stt + '">' +
        '<td class="stt">' + $('#memberList tr[data-id]').length + '</td>' +
        '<td class="name-cell">' + $('<span>').text(name).html() + '</td>' +
        '<td>' +
          '<div class="action-group">' +
            '<button class="btn-edit">Sửa</button>' +
            '<button class="btn-delete">Xóa</button>' +
          '</div>' +
        '</td>' +
      '</tr>'
    );
    $('#memberList').append(row);
    checkEmpty();
    reIndex();
  }

  addMember('Nguyễn Văn An');
  addMember('Trần Thị Bình');
  addMember('Lê Minh Khoa');

  $('#btnAdd').click(function () {
    var name = $.trim($('#nameInput').val());
    if (!name) return;
    addMember(name);
    $('#nameInput').val('');
  });

  $('#nameInput').keydown(function (e) {
    if (e.key === 'Enter') $('#btnAdd').click();
  });

  $('#memberList').on('click', '.btn-delete', function () {
    $(this).closest('tr').remove();
    checkEmpty();
    reIndex();
  });

  $('#memberList').on('click', '.btn-edit', function () {
    var row      = $(this).closest('tr');
    var nameCell = row.find('.name-cell');
    var oldName  = nameCell.text();

    nameCell.html('<input class="edit-input" type="text" value="' + $('<span>').text(oldName).html() + '" />');
    $(this).replaceWith('<button class="btn-save">Lưu</button>');
    nameCell.find('.edit-input').focus();
  });

  $('#memberList').on('click', '.btn-save', function () {
    var row      = $(this).closest('tr');
    var nameCell = row.find('.name-cell');
    var newName  = $.trim(nameCell.find('.edit-input').val());
    if (!newName) return;

    nameCell.text(newName);
    $(this).replaceWith('<button class="btn-edit">Sửa</button>');
  });

  $('#searchInput').on('input', function () {
    var keyword = $.trim($(this).val()).toLowerCase();
    $('#memberList tr[data-id]').each(function () {
      var name = $(this).find('.name-cell').text().toLowerCase();
      $(this).toggle(name.indexOf(keyword) !== -1);
    });
  });
</script>

</body>
</html>
