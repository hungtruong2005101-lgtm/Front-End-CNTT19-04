<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 15 - Validate Form jQuery</title>

    <!-- Nhúng jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        .container{
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        .form-group{
            margin-bottom: 15px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .success{
            border-color: green;
        }

        .error-input{
            border-color: red;
        }

        .error{
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        .success-message{
            color: green;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        button{
            width: 100%;
            padding: 12px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background: blue;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>ĐĂNG KÝ TÀI KHOẢN</h1>

        <form id="registerForm">

            <div class="form-group">

                <label>Họ và tên</label>

                <input type="text" id="fullname">

                <div class="error" id="nameError"></div>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="text" id="email">

                <div class="error" id="emailError"></div>

            </div>

            <div class="form-group">

                <label>Mật khẩu</label>

                <input type="password" id="password">

                <div class="error" id="passwordError"></div>

            </div>

            <div class="form-group">

                <label>Xác nhận mật khẩu</label>

                <input type="password" id="confirmPassword">

                <div class="error" id="confirmError"></div>

            </div>

            <button type="submit">
                Đăng ký
            </button>

        </form>

        <div class="success-message" id="successMessage"></div>

    </div>

    <script>

        $("#registerForm").submit(function(event){

            event.preventDefault();

            $(".error").text("");

            $("input").removeClass("error-input success");

            $("#successMessage").text("");

            let fullname = $("#fullname").val().trim();

            let email = $("#email").val().trim();

            let password = $("#password").val().trim();

            let confirmPassword = $("#confirmPassword").val().trim();

            let isValid = true;

            // Kiểm tra họ tên
            if(fullname === ""){

                $("#nameError").text("Vui lòng nhập họ tên");

                $("#fullname").addClass("error-input");

                isValid = false;

            }
            else{

                $("#fullname").addClass("success");

            }

            // Kiểm tra email
            let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(email === ""){

                $("#emailError").text("Vui lòng nhập email");

                $("#email").addClass("error-input");

                isValid = false;

            }
            else if(!emailRegex.test(email)){

                $("#emailError").text("Email không đúng định dạng");

                $("#email").addClass("error-input");

                isValid = false;

            }
            else{

                $("#email").addClass("success");

            }

            // Kiểm tra mật khẩu
            if(password.length < 6){

                $("#passwordError").text(
                    "Mật khẩu phải có ít nhất 6 ký tự"
                );

                $("#password").addClass("error-input");

                isValid = false;

            }
            else{

                $("#password").addClass("success");

            }

            // Kiểm tra xác nhận mật khẩu
            if(confirmPassword === ""){

                $("#confirmError").text(
                    "Vui lòng xác nhận mật khẩu"
                );

                $("#confirmPassword").addClass("error-input");

                isValid = false;

            }
            else if(confirmPassword !== password){

                $("#confirmError").text(
                    "Mật khẩu xác nhận không khớp"
                );

                $("#confirmPassword").addClass("error-input");

                isValid = false;

            }
            else{

                $("#confirmPassword").addClass("success");

            }

            // Thành công
            if(isValid){

                $("#successMessage").text(
                    "Đăng ký thành công!"
                );

                $("#registerForm")[0].reset();

                $("input").removeClass("success");

            }

        });

    </script>

</body>
</html>
