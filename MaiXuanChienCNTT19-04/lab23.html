<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 23 - Danh sách sản phẩm</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <!-- Tiêu đề -->
        <h2 class="text-center mb-5">Danh sách sản phẩm</h2>

        <!-- Grid sản phẩm -->
        <div class="row g-4">

            <!-- Sản phẩm 1 -->
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100 shadow rounded">
                    <img src="Anh dien thoai Samsung.webp" class="card-img-top" alt="Sản phẩm 1">
                    <div class="card-body text-center">
                        <span class="badge bg-danger mb-2">-20%</span>
                        <h5 class="card-title">Điện thoại Samsung</h5>
                        <p class="card-text text-danger fw-bold">5.990.000 VNĐ</p>
                        <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#modal1">
                            Xem nhanh
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 2 -->
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100 shadow rounded">
                    <img src="Laptop dell.jpg" class="card-img-top" alt="Sản phẩm 2">
                    <div class="card-body text-center">
                        <span class="badge bg-success mb-2">Mới</span>
                        <h5 class="card-title">Laptop Dell</h5>
                        <p class="card-text text-danger fw-bold">15.500.000 VNĐ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 3 -->
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100 shadow rounded">
                    <img src="Tai nghe bluetooth.jpg" class="card-img-top" alt="Sản phẩm 3">
                    <div class="card-body text-center">
                        <span class="badge bg-warning text-dark mb-2">Hot</span>
                        <h5 class="card-title">Tai nghe Bluetooth</h5>
                        <p class="card-text text-danger fw-bold">890.000 VNĐ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 4 -->
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100 shadow rounded">
                    <img src="Đồng hồ thông minh.webp" class="card-img-top" alt="Sản phẩm 4">
                    <div class="card-body text-center">
                        <h5 class="card-title">Đồng hồ thông minh</h5>
                        <p class="card-text text-danger fw-bold">2.490.000 VNĐ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 5 -->
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100 shadow rounded">
                    <img src="Chuột Gaming.jpg" class="card-img-top" alt="Sản phẩm 5">
                    <div class="card-body text-center">
                        <h5 class="card-title">Chuột Gaming</h5>
                        <p class="card-text text-danger fw-bold">450.000 VNĐ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

            <!-- Sản phẩm 6 -->
            <div class="col-12 col-sm-6 col-md-4">
                <div class="card h-100 shadow rounded">
                    <img src="Bàn phím cơ.jpg" class="card-img-top" alt="Sản phẩm 6">
                    <div class="card-body text-center">
                        <h5 class="card-title">Bàn phím cơ</h5>
                        <p class="card-text text-danger fw-bold">1.290.000 VNĐ</p>
                        <button class="btn btn-primary w-100">Mua ngay</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal xem nhanh -->
    <div class="modal fade" id="modal1" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Điện thoại Samsung</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Sản phẩm giảm giá 20%, cấu hình mạnh, pin tốt.
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
