<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section>
    <h1>Quản lí sinh viên</h1>
    <form id="studentForm">
        <input type="text" id="maSinhvien" placeholder="Mã Sinh Viên" required>
        <input type="text" id="ten" placeholder="Họ tên" required>
        <input type="number" placeholder="Tuổi" required>
        <input type="text" id="chuyenNganh" placeholder="Chuyên ngành" required>
        <input type="number" step="0.1" id="diemTrungBinh" placeholder="Điểm Trung Bình" required>
        <button type="submit">Thêm sinh viên</button>
    </form>
</section>
<section>
    <h2>Danh sách sinh viên</h2>
    <table>
        <thead>
            <tr>
                <th>Mã sinh viên</th>
                <th>Họ và tên</th>
                <th>Tuổi</th>
                <th>Chuyên ngành</th>
                <th>Điểm TB</th>
                <th>Học bổng</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</section>
</body>
</html>
